<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Inspeção de Saúde CBA X</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f2f4f8; margin:0; padding:0; }
    .box { max-width:1200px; margin:30px auto; background:#fff; padding:20px; border-radius:12px; }
    h2 { margin:0 0 10px 0; }
    input, select, button { padding:10px; border-radius:10px; font-size:14px; border:1px solid #ccc; box-sizing:border-box; }
    button { border:none; background:#0b3c5d; color:#fff; cursor:pointer; font-weight:bold; }
    button:hover { background:#092f49; }
    .danger { background:#c0392b; }
    .gray { background:#555; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:10px 0; }
    .hidden { display:none; }
    
    #pinArea { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; }
    .login-container { width: 100%; max-width: 320px; text-align: center; }
    .logo-admin { max-width: 150px; margin-bottom: 20px; }
    
    .password-wrapper { position: relative; width: 100%; margin-bottom: 15px; }
    .password-wrapper input { width: 100%; padding-right: 45px; height: 45px; }
    .toggle-pass { 
      position: absolute; right: 5px; top: 50%; transform: translateY(-50%); 
      background: none; border: none; font-size: 20px; cursor: pointer; color: #666;
    }
    #btnEntrar { width: 100%; height: 45px; font-size: 16px; }

    table { width:100%; border-collapse:collapse; font-size:12px; margin-top:15px; }
    th, td { border:1px solid #e4e4e4; padding:10px; text-align:left; }
    th { background:#f6f8fb; }
    .ok { background:#eef9f0; color:#1f5b2b; padding:10px; margin:10px 0; border-radius:8px; display:none; }
    .mono { font-family: monospace; font-weight: bold; }
  </style>
</head>
<body>

  <div class="box">
    <div id="pinArea">
      <div class="login-container">
        <img src="logo_cba_x.png" alt="Logo CBA X" class="logo-admin">
        <h2>Acesso Administrativo</h2>
        <div class="password-wrapper">
          <input type="password" id="pin" placeholder="Digite o PIN">
          <button type="button" class="toggle-pass" id="btnTogglePass">👁️</button>
        </div>
        <button type="button" id="btnEntrar">Entrar</button>
        <p style="font-size:12px; color:#999; margin-top:15px;">PIN padrão: <span class="mono">B6CBAX2023</span></p>
      </div>
    </div>

    <div id="adminArea" class="hidden">
      <h2>Painel de Controle CBA X</h2>
      <div class="row">
        <select id="filtroUnidade" style="min-width:280px;">
          <option value="">Todas as unidades</option>
          <option>1º GMar - Botafogo</option>
          <option>2º GMar - Barra da Tijuca</option>
          <option>3º GMar - Copacabana</option>
          <option>4º GMar - Itaipu</option>
          <option>CBA X</option>
          <option>CER</option>
          <option>DBM 1/M - Paquetá</option>
          <option>DBM 2/M - Piscinão de Ramos</option>
        </select>
        <button id="btnAtualizar">Atualizar Dados</button>
        <button id="btnExportar" class="gray">Exportar Excel</button>
        <button id="btnExcluirSelecionados" class="danger" disabled>Excluir Selecionados</button>
      </div>
      <div id="msgOk" class="ok"></div>
      
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" id="checkAll"></th>
            <th>Data</th>
            <th>Turno</th>
            <th>Local Inspeção</th>
            <th>Unidade Serve</th>
            <th>Nome</th>
            <th>RG</th>
            <th>Posto/Grad</th>
            <th>Telefone</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
      authDomain: "inspecao-saude-cbax.firebaseapp.com",
      projectId: "inspecao-saude-cbax",
      storageBucket: "inspecao-saude-cbax.firebasestorage.app",
      messagingSenderId: "1011281662526",
      appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const pinEl = document.getElementById("pin");
    const btnEntrar = document.getElementById("btnEntrar");
    const btnToggle = document.getElementById("btnTogglePass");
    const tbody = document.getElementById("tbody");
    let cacheDados = []; // Guarda os dados para o Excel

    // Lógica do Olho
    btnToggle.addEventListener("click", () => {
      const isPass = pinEl.type === "password";
      pinEl.type = isPass ? "text" : "password";
      btnToggle.textContent = isPass ? "🙈" : "👁️";
    });

    // Entrar
    btnEntrar.addEventListener("click", () => {
      if (pinEl.value === "B6CBAX2023") {
        document.getElementById("pinArea").classList.add("hidden");
        document.getElementById("adminArea").classList.remove("hidden");
        carregarTabela();
      } else {
        alert("PIN Incorreto!");
      }
    });

    // Enter no teclado
    pinEl.addEventListener("keypress", (e) => { if (e.key === "Enter") btnEntrar.click(); });

    // CARREGAR TABELA
    async function carregarTabela() {
      tbody.innerHTML = "<tr><td colspan='9'>Carregando registros...</td></tr>";
      cacheDados = [];
      
      const uni = document.getElementById("filtroUnidade").value;
      let q = query(collection(db, "agendamentos"), orderBy("data", "asc"));
      
      if(uni) {
        q = query(collection(db, "agendamentos"), where("unidade", "==", uni), orderBy("data", "asc"));
      }

      const snap = await getDocs(q);
      tbody.innerHTML = "";
      
      if (snap.empty) {
        tbody.innerHTML = "<tr><td colspan='9'>Nenhum agendamento encontrado.</td></tr>";
        return;
      }

      snap.forEach(d => {
        const v = d.data();
        cacheDados.push(v); // Salva para o Excel
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input type="checkbox" class="sel" data-id="${d.id}"></td>
          <td>${v.data_br || v.data}</td>
          <td>${v.turno || "-"}</td>
          <td>${v.unidade}</td>
          <td>${v.unidadeServe || "-"}</td>
          <td>${v.nome}</td>
          <td class="mono">${v.rg}</td>
          <td>${v.posto}</td>
          <td>${v.telefone || "-"}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    document.getElementById("btnAtualizar").addEventListener("click", carregarTabela);

    // FUNÇÃO EXPORTAR PARA EXCEL
    document.getElementById("btnExportar").addEventListener("click", () => {
      if (cacheDados.length === 0) {
        alert("Não há dados na tabela para exportar!");
        return;
      }

      // Organiza os dados para o Excel com as novas colunas
      const dadosExcel = cacheDados.map(item => ({
        "Data": item.data_br || item.data,
        "Turno": item.turno || "N/A",
        "Local da Inspeção": item.unidade,
        "Unidade que Serve": item.unidadeServe || "N/A",
        "Nome Completo": item.nome,
        "RG": item.rg,
        "Posto/Graduação": item.posto,
        "Telefone": item.telefone || "N/A",
        "E-mail": item.email || "N/A"
      }));

      const worksheet = XLSX.utils.json_to_sheet(dadosExcel);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "Agendamentos");
      
      // Gera o arquivo
      XLSX.writeFile(workbook, "Relatorio_Inspecao_CBAX.xlsx");
    });

    // Checkbox selecionar todos
    document.getElementById("checkAll").addEventListener("change", (e) => {
      const checkboxes = document.querySelectorAll(".sel");
      checkboxes.forEach(cb => cb.checked =
