<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>INSPEÇÃO DE SAÚDE – CBA X</title>
 
<style>
  body { font-family: Arial, sans-serif; background:#f2f4f8; margin:0; padding:0; }
  .container { max-width: 720px; margin: 30px auto; background:#fff; padding:20px; border-radius:12px; text-align:center; }
  .logo { max-width:180px; width:100%; margin-bottom:10px; }
  input, select, button { width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid #ccc; font-size:14px; box-sizing:border-box; }
  button { background:#0b3c5d; color:#fff; border:none; cursor:pointer; font-weight:bold; }
  button:hover { background:#092f49; }
  button:disabled { opacity:0.6; cursor:not-allowed; }
  #campoTurno { display:none; }
  .msg { display:none; margin-top:10px; padding:10px; border-radius:10px; font-weight:bold; text-align:center; }
  .ok { background:#eef9f0; border:1px solid #cfe9d3; color:#1f5b2b; }
  .err { background:#fff2f2; border:1px solid #f2c2c2; color:#8a1f1f; }
  #avisoAgenda { display:none; background:#fff3cd; border:1px solid #ffeeba; padding:12px; border-radius:10px; margin:10px 0; font-size:13px; color:#856404; text-align:left; line-height:1.4; }
  #contadorVagas { display:none; background:#eef4ff; border:1px solid #cfe0ff; padding:12px; border-radius:10px; margin:-2px 0 10px 0; font-size:13px; color:#163a7a; text-align:left; line-height:1.4; }
  .mono { font-family: ui-monospace, monospace; }
  #comprovanteBox{ display:none; text-align:left; background:#f8fafc; border:1px solid #dbe3ee; border-radius:12px; padding:14px; margin-top:14px; }
  .btnRow{ display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
  .btnSecondary{ background:#4b5563; }
  @media print{
    body{ background:#fff; }
    .container{ max-width:100%; margin:0; border-radius:0; }
    form, .small, #msgOk, #msgErr, #avisoAgenda, #contadorVagas, #btnNovo{ display:none !important; }
    #comprovanteBox{ display:block !important; border:none; }
  }
</style>
</head>
 
<body>
<div class="container">
  <img src="logo_cba_x.png" alt="Logo CBA X" class="logo" />
  <h2>INSPEÇÃO DE SAÚDE – CBA X</h2>
  <p>Sistema de Agendamento</p>
 
  <form id="formAgendamento" autocomplete="off">
    <input type="text" id="nome" placeholder="Nome completo" required />
    <input type="text" id="rg" placeholder="RG" required />
    <input type="tel" id="telefone" placeholder="Telefone / WhatsApp" required />

    <select id="unidadeServe" required>
      <option value="">Unidade em que serve</option>
      <option>CBA X (Sede)</option>
      <option>1º GMar - Botafogo</option>
      <option>2º GMar - Barra da Tijuca</option>
      <option>3º GMar - Copacabana</option>
      <option>4º GMar - Itaipu</option>
      <option>DBM 1/M - Paquetá</option>
      <option>DBM 2/M - Piscinão de Ramos</option>
      <option>DBM 3/M - Recreio dos Bandeirantes</option>
      <option>DBM 4/M - Barra de Guaratiba</option>
      <option>DBM 5/M - Sepetiba</option>
      <option>DBM 6/M - Itaipu</option>
      <option>CER</option>
      <option>OUTRA (Não listada)</option>
    </select>
    
    <input type="email" id="email" placeholder="E-mail" required />
 
    <select id="posto" required>
      <option value="">Selecione o Posto / Graduação</option>
      <option>SD BM</option><option>CB BM</option><option>3º SGT BM</option>
      <option>2º SGT BM</option><option>1º SGT BM</option><option>SUBTEN BM</option>
      <option>2º TEN BM</option><option>1º TEN BM</option><option>CAP BM</option>
      <option>MAJ BM</option><option>TEN CEL BM</option><option>CEL BM</option>
    </select>
 
    <select id="unidade" required>
      <option value="">Selecione o Local da Inspeção</option>
      <option>1º GMar - Botafogo</option>
      <option>DBM 1/M - Paquetá</option>
      <option>DBM 2/M - Piscinão de Ramos</option>
      <option>CER</option>
      <option>2º GMar - Barra da Tijuca</option>
      <option>3º GMar - Copacabana</option>
      <option>4º GMar - Itaipu</option>
      <option>DBM 6/M - Itaipu</option>
      <option>CBA X</option>
      <option>DBM 3/M - Recreio dos Bandeirantes</option>
      <option>DBM 4/M - Barra de Guaratiba</option>
      <option>DBM 5/M - Sepetiba</option>
    </select>
 
    <div id="avisoAgenda">
      ⚠️ <b>ATENÇÃO – DIAS ESPECÍFICOS</b><br>
      • Inspeção apenas às <b>TERÇAS e S
