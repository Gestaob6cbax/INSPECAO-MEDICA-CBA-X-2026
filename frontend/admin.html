<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Inspeção de Saúde CBA X</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f2f4f8; margin:0; padding:0; }
    .box { max-width:1200px; margin:30px auto; background:#fff; padding:20px; border-radius:12px; }
    h2 { margin:0 0 10px 0; }
    input, select, button { padding:10px; border-radius:10px; font-size:14px; border:1px solid #ccc; box-sizing:border-box; }
    button { border:none; background:#0b3c5d; color:#fff; cursor:pointer; font-weight:bold; }
    button:hover { background:#092f49; }
    .danger { background:#c0392b; }
    .gray { background:#555; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:10px 0; }
    .hidden { display:none; }
    #pinArea { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
    .login-container { width: 100%; max-width: 320px; text-align: center; }
    .logo-admin { max-width: 150px; margin-bottom: 20px; }
    .password-wrapper { position: relative; width: 100%; margin-bottom: 10px; }
    .password-wrapper input { width: 100%; padding-right: 40px; }
    .toggle-pass { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; background: none; border: none; font-size: 18px; }
    table { width:100%; border-collapse:collapse; font-size:12px; margin-top:10px; }
    th, td { border:1px solid #e4e4e4; padding:8px; text-align:left; }
    th { background:#f6f8fb; }
    .mono { font-family: monospace; }
    .ok { background:#eef9f0; color:#1f5b2b; padding:10px; margin-bottom:10px; border-radius:10px; display:none; }
  </style>
</head>
<body>
  <div class="box">
    <div id="pinArea">
      <div class="login-container">
        <img src="logo_cba_x.png" alt="Logo CBA X" class="logo-admin">
        <h2>Painel Admin</h2>
        <div class="password-wrapper">
          <input type="password" id="pin" placeholder="PIN de Acesso">
          <button type="button" class="toggle-pass" id="btnTogglePass">👁️</button>
        </div>
        <button type="button" id="btnEntrar" style="width: 100%;">Entrar</button>
        <p style="font-size:11px; color:#999; margin-top:10px;">PIN: B6CBAX2023</p>
      </div>
    </div>

    <div id="adminArea" class="hidden">
      <h2>Agendamentos – CBA X</h2>
      <div class="row">
        <select id="filtroUnidade" style="min-width:250px;">
          <option value="">Todas as unidades</option>
          <option>1º GMar - Botafogo</option><option>DBM 1/M - Paquetá</option><option>DBM 2/M - Piscinão de Ramos</option>
          <option>CER</option><option>2º GMar - Barra da Tijuca</option><option>3º GMar - Copacabana</option>
          <option>4º GMar - Itaipu</option><option>DBM 6/M - Itaipu</option><option>CBA X</option>
        </select>
        <button id="btnAtualizar">Atualizar</button>
        <button id="btnExportar" class="gray">Exportar Excel</button>
        <button id="btnExcluirSelecionados" class="danger" disabled>Excluir Selecionados</button>
      </div>
      <div id="msgOk" class="ok"></div>
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" id="checkAll"></th>
            <th>Data</th>
            <th>Turno</th>
            <th>Local</th>
            <th>Unid. Serve</th>
            <th>Nome</th>
            <th>RG</th>
            <th>Posto</th>
            <th>Telefone</th>
            <th>Ação</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script type="module">
    // Lógica do Firebase (Login, Tabela, Excel e Exclusão com as novas colunas)
    // O botão de toggle pass já está configurado para alternar entre 👁️ e 🙈
    const pinEl = document.getElementById("pin");
    const btnToggle = document.getElementById("btnTogglePass");
    btnToggle.addEventListener("click", () => {
        const isPass = pinEl.type === "password";
        pinEl.type = isPass ? "text" : "password";
        btnToggle.textContent = isPass ? "🙈" : "👁️";
    });
    // ... restante da lógica conforme os códigos anteriores ...
  </script>
</body>
</html>
