<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Inspeção de Saúde CBA X</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f2f4f8; margin:0; padding:0; }
    .box { max-width:1300px; margin:20px auto; background:#fff; padding:20px; border-radius:12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { margin:0 0 15px 0; color: #0b3c5d; }
    input, select, button { padding:10px; border-radius:10px; font-size:14px; border:1px solid #ccc; box-sizing:border-box; }
    button { border:none; background:#0b3c5d; color:#fff; cursor:pointer; font-weight:bold; transition: 0.3s; }
    button:hover { background:#092f49; }
    .danger { background:#c0392b; }
    .danger:hover { background:#a93226; }
    .gray { background:#555; }
    
    /* Login Centralizado */
    #pinArea { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
    .login-container { width: 100%; max-width: 320px; text-align: center; background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .logo-admin { max-width: 140px; margin-bottom: 20px; }
    
    .password-wrapper { position: relative; width: 100%; margin-bottom: 15px; }
    .password-wrapper input { width: 100%; padding-right: 45px; height: 45px; }
    .toggle-pass { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 20px; cursor: pointer; color: #666; }
    #btnEntrar { width: 100%; height: 45px; font-size: 16px; }

    /* Área da Tabela */
    .hidden { display:none !important; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
    table { width:100%; border-collapse:collapse; font-size:13px; background: #fff; }
    th, td { border:1px solid #e4e4e4; padding:12px; text-align:left; }
    th { background:#f6f8fb; color: #333; }
    tr:hover { background: #f9f9f9; }
    .mono { font-family: ui-monospace, monospace; font-weight: bold; }
    .ok { background:#eef9f0; color:#1f5b2b; padding:15px; margin-bottom:15px; border-radius:8px; display:none; border: 1px solid #cfe9d3; }
  </style>
</head>
<body>

  <div class="box">
    <div id="pinArea">
      <div class="login-container">
        <img src="logo_cba_x.png" alt="Logo CBA X" class="logo-admin">
        <h2>Painel Administrativo</h2>
        <div class="password-wrapper">
          <input type="password" id="pin" placeholder="Digite o PIN de acesso">
          <button type="button" class="toggle-pass" id="btnTogglePass">👁️</button>
        </div>
        <button type="button" id="btnEntrar">Acessar Sistema</button>
        <p style="font-size:11px; color:#999; margin-top:15px;">Acesso Restrito - CBA X</p>
      </div>
    </div>

    <div id="adminArea" class="hidden">
      <div class="row">
        <div style="flex-grow: 1;">
          <h2>Agendamentos Realizados</h2>
        </div>
        <select id="filtroUnidade" style="min-width:260px;">
          <option value="">Todas as unidades</option>
          <option>1º GMar - Botafogo</option>
          <option>2º GMar - Barra da Tijuca</option>
          <option>3º GMar - Copacabana</option>
          <option>4º GMar - Itaipu</option>
          <option>CBA X</option>
          <option>CER</option>
          <option>DBM 1/M - Paquetá</option>
          <option>DBM 2/M - Piscinão de Ramos</option>
        </select>
        <button id="btnAtualizar">🔄 Atualizar</button>
        <button id="btnExportar" class="gray">📥 Exportar Excel</button>
        <button id="btnExcluirSelecionados" class="danger" disabled>🗑️ Excluir Selecionados</button>
      </div>

      <div id="msgOk" class="ok"></div>
      
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" id="checkAll"></th>
            <th>Data</th>
            <th>Turno</th>
            <th>Local Inspeção</th>
            <th>Unidade Serve</th>
            <th>Nome</th>
            <th>RG</th>
            <th>Posto/Grad</th>
            <th>Telefone</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, getDocs, doc, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
      authDomain: "inspecao-saude-cbax.firebaseapp.com",
      projectId: "inspecao-saude-cbax",
      storageBucket: "inspecao-saude-cbax.firebasestorage.app",
      messagingSenderId: "1011281662526",
      appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const pinEl = document.getElementById("pin");
    const btnEntrar = document.getElementById("btnEntrar");
    const btnToggle = document.getElementById("btnTogglePass");
    const adminArea = document.getElementById("adminArea");
    const pinArea = document.getElementById("pinArea");
    const tbody = document.getElementById("tbody");
    let cacheDados = [];

    // Ver/Esconder Senha
    btnToggle.addEventListener("click", () => {
      const isPass = pinEl.type === "password";
      pinEl.type = isPass ? "text" : "password";
      btnToggle.textContent = isPass ? "🙈" : "👁️";
    });

    // Função de Login
    function realizarLogin() {
      if (pinEl.value === "B6CBAX2023") {
        pinArea.remove(); // Remove o login da tela completamente
        adminArea.classList.remove("hidden"); // Mostra a tabela
        carregarTabela();
      } else {
        alert("PIN Incorreto!");
      }
    }

    btnEntrar.addEventListener("click", realizarLogin);
    pinEl.addEventListener("keypress", (e) => { if (e.key === "Enter") realizarLogin(); });

    async function carregarTabela() {
      tbody.innerHTML = "<tr><td colspan='9' style='text-align:center;'>Buscando dados no Firebase...</td></tr>";
      cacheDados = [];
      const uni = document.getElementById("filtroUnidade").value;
      
      let q = query(collection(db, "agendamentos"), orderBy("data", "asc"));
      if(uni) q = query(collection(db, "agendamentos"), where("unidade", "==", uni), orderBy("data", "asc"));

      const snap = await getDocs(q);
      tbody.innerHTML = "";
      
      if (snap.empty) {
        tbody.innerHTML = "<tr><td colspan='9' style='text-align:center;'>Nenhum agendamento encontrado.</td></tr>";
        return;
      }

      snap.forEach(d => {
        const v = d.data();
        v.id = d.id;
        cacheDados.push(v);
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input type="checkbox" class="sel" data-id="${d.id}"></td>
          <td>${v.data_br || v.data}</td>
          <td>${v.turno || "Fixo"}</td>
          <td>${v.unidade}</td>
          <td>${v.unidadeServe || "-"}</td>
          <td>${v.nome}</td>
          <td class="mono">${v.rg}</td>
          <td>${v.posto}</td>
          <td>${v.telefone || "-"}</td>
        `;
        tbody.appendChild(tr);
      });
      atualizarBotaoExcluir();
    }

    // Exportar Excel
    document.getElementById("btnExportar").addEventListener("click", () => {
      if (!cacheDados.length) return alert("Não há dados.");
      const dadosExcel = cacheDados.map(item => ({
        "Data": item.data_br, "Turno": item.turno, "Local": item.unidade, "Unidade Serve": item.unidadeServe,
        "Nome": item.nome, "RG": item.rg, "Posto": item.posto, "Telefone": item.telefone
      }));
      const ws = XLSX.utils.json_to_sheet(dadosExcel);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Agendamentos");
      XLSX.writeFile(wb, "Relatorio_CBAX.xlsx");
    });

    // Selecionar Todos
    document.getElementById("checkAll").addEventListener("change", (e) => {
      document.querySelectorAll(".sel").forEach(cb => cb.checked = e.target.checked);
      atualizarBotaoExcluir();
    });

    // Habilitar/Desabilitar botão de excluir
    tbody.addEventListener("change", atualizarBotaoExcluir);
    function atualizarBotaoExcluir() {
      const selecionados = document.querySelectorAll(".sel:checked").length;
      const btn = document.getElementById("btnExcluirSelecionados");
      btn.disabled = selecionados === 0;
      btn.textContent = selecionados > 0 ? `🗑️ Excluir (${selecionados})` : "🗑️ Excluir Selecionados";
    }

    document.getElementById("btnAtualizar").addEventListener("click", carregarTabela);
  </script>
</body>
</html>
