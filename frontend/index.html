<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspeção de Saúde 2026 - CBA X</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        
        /* ✅ CABEÇALHO VERMELHO (Substituindo o Azul) */
        .header { background-color: #8b0000; color: white; padding: 35px 0; text-align: center; border-bottom: 5px solid #ff0000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .header img { width: 90px; margin-bottom: 12px; filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.3)); }
        .header h1 { margin: 0; font-size: 22px; text-transform: uppercase; letter-spacing: 1.5px; }
        .header p { margin: 8px 0 0; font-size: 14px; opacity: 0.9; font-weight: bold; }
        
        .container { max-width: 550px; margin: -30px auto 50px; background: white; padding: 35px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); border-top: 5px solid #8b0000; }
        
        /* ✅ TÍTULOS EM VERMELHO */
        .section-title { color: #8b0000; font-size: 14px; font-weight: bold; border-bottom: 2px solid #f8d7da; padding-bottom: 5px; margin: 25px 0 15px; text-transform: uppercase; display: flex; align-items: center; }
        .section-title::before { content: "🚨"; margin-right: 8px; }
        
        label { display: block; margin-top: 15px; font-size: 13px; font-weight: bold; color: #333; }
        input, select { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 15px; transition: 0.3s; background-color: #fff; }
        
        /* Foco do input em vermelho */
        input:focus, select:focus { border-color: #8b0000; outline: none; box-shadow: 0 0 8px rgba(139,0,0,0.2); }
        
        .aviso-alerta { background-color: #f8d7da; color: #721c24; padding: 12px; border-radius: 6px; font-size: 13px; margin-top: 15px; border: 1px solid #f5c6cb; display: none; font-weight: 500; }
        
        /* ✅ BOTÃO VERMELHO */
        button { width: 100%; background-color: #8b0000; color: white; padding: 16px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 30px; text-transform: uppercase; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:hover { background-color: #a00000; transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.2); }
        button:active { transform: translateY(0); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        #sucesso { display: none; text-align: center; }
        .resumo { text-align: left; background: #fffafa; padding: 20px; border-radius: 8px; border-left: 5px solid #8b0000; margin-top: 20px; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); }
        .resumo p { margin: 10px 0; color: #333; font-size: 15px; }
        .resumo b { color: #8b0000; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-ODONTOLOGICA-CBA-X-2026/main/logo-cbax.png" alt="Brasão CBA X">
    <h1>Agendamento Inspeção de Saúde 2026</h1>
    <p>CBA X - COMANDO DE BOMBEIROS DE ÁREA</p>
</div>

<div class="container">
    <form id="formInspecao">
        <div class="section-title">Identificação do Militar</div>
        
        <label>Nome Completo (Sem abreviações):</label>
        <input type="text" id="nome" placeholder="Digite seu nome conforme o RG" required>

        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <label>RG Militar:</label>
                <input type="text" id="rg" placeholder="Somente números" required>
            </div>
            <div style="flex: 1;">
                <label>Posto / Graduação:</label>
                <select id="posto" required>
                    <option value="">Selecione...</option>
                    <option>CEL BM</option><option>TC BM</option><option>MAJ BM</option><option>CAP BM</option>
                    <option>1º TEN BM</option><option>2º TEN BM</option><option>SUBTEN BM</option>
                    <option>1º SGT BM</option><option>2º SGT BM</option><option>3º SGT BM</option>
                    <option>CB BM</option><option>SD BM</option>
                </select>
            </div>
        </div>

        <div class="section-title">Local e Data da Inspeção</div>

        <label>Local da Inspeção:</label>
        <select id="unidade" required>
            <option value="">Selecione o local disponível...</option>
            <option value="CER">CER / 2º GMar (Segunda a Sexta)</option>
            <option value="CBA X">CBA X (Terças e Sextas)</option>
            <option value="DBM 5/M - Sepetiba">DBM 5/M - Sepetiba (Terças e Sextas)</option>
            <option value="GMARS-SEDE">GMARS SEDE (Terças e Sextas)</option>
        </select>

        <div id="avisoTS" class="aviso-alerta">
            ⚠️ <b>IMPORTANTE:</b> Esta unidade atende apenas às <b>TERÇAS e SEXTAS</b>. <br>Limite de 7 vagas por turno.
        </div>

        <div style="display: flex; gap: 15px;">
            <div style="flex: 1;">
                <label>Data Escolhida:</label>
                <select id="data" required>
                    <option value="">Aguardando local...</option>
                </select>
            </div>
            <div style="flex: 1; display: none;" id="boxTurno">
                <label>Turno:</label>
                <select id="turno">
                    <option value="Manhã">Manhã (07:30 - 12:00)</option>
                    <option value="Tarde">Tarde (13:00 - 17:30)</option>
                </select>
            </div>
        </div>

        <button type="submit" id="btnAcao">Finalizar Agendamento</button>
    </form>

    <div id="sucesso">
        <h2 style="color: #8b0000;">✅ Agendamento Confirmado!</h2>
        <div class="resumo">
            <p><b>Militar:</b> <span id="resNome"></span></p>
            <p><b>Local:</b> <span id="resLocal"></span></p>
            <p><b>Data:</b> <span id="resData"></span></p>
            <p><b>Turno:</b> <span id="resTurno"></span></p>
        </div>
        <button onclick="window.print()" style="background-color: #28a745;">🖨️ Imprimir Comprovante</button>
        <button onclick="location.reload()" style="background-color: #666; margin-top: 10px;">Fazer Novo Agendamento</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxuNjVbW1FJ5l23Syh9UJJM5xeCpw0H5pOFAHPSO5txkZ1p0LizvJdrtlvyxoKS0Gy6SQ/exec';
    
    const regrasUnidades = {
        "CER": { tipo: "MF", inicio: "2026-03-04", fim: "2026-07-31" },
        "CBA X": { tipo: "TS", inicio: "2026-03-10", fim: "2026-03-13" },
        "DBM 5/M - Sepetiba": { tipo: "TS", inicio: "2026-03-04", fim: "2026-03-06" },
        "GMARS-SEDE": { tipo: "TS", inicio: "2026-03-17", fim: "2026-05-15" }
    };

    document.getElementById('unidade').addEventListener('change', function() {
        const local = this.value;
        const dataSelect = document.getElementById('data');
        const avisoTS = document.getElementById('avisoTS');
        const boxTurno = document.getElementById('boxTurno');
        
        dataSelect.innerHTML = '<option value="">Carregando...</option>';
        
        if (!regrasUnidades[local]) {
            dataSelect.innerHTML = '<option value="">Selecione o local</option>';
            boxTurno.style.display = "none";
            avisoTS.style.display = "none";
            return;
        }

        const config = regrasUnidades[local];
        avisoTS.style.display = (config.tipo === "TS") ? "block" : "none";
        boxTurno.style.display = (config.tipo === "TS") ? "block" : "none";

        let d = new Date(config.inicio + "T12:00:00");
        let fim = new Date(config.fim + "T12:00:00");
        dataSelect.innerHTML = '<option value="">Selecione a data</option>';

        while (d <= fim) {
            let diaSemana = d.getDay();
            let disponivel = (config.tipo === "TS" && (diaSemana === 2 || diaSemana === 5)) || (config.tipo === "MF" && (diaSemana >= 1 && diaSemana <= 5));
            
            if (disponivel) {
                let iso = d.toISOString().split('T')[0];
                let formatada = iso.split('-').reverse().join('/');
                dataSelect.innerHTML += `<option value="${iso}">${formatada}</option>`;
            }
            d.setDate(d.getDate() + 1);
        }
    });

    document.getElementById('formInspecao').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('btnAcao');
        btn.innerText = "ENVIANDO DADOS...";
        btn.disabled = true;

        const dados = {
            nome: document.getElementById('nome').value.toUpperCase(),
            rg: document.getElementById('rg').value,
            posto: document.getElementById('posto').value,
            unidade: document.getElementById('unidade').value,
            data: document.getElementById('data').value,
            turno: document.getElementById('boxTurno').style.display === "block" ? document.getElementById('turno').value : "Livre Demanda"
        };

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(dados)})
        .then(() => {
            document.getElementById('formInspecao').style.display = 'none';
            document.getElementById('sucesso').style.display = 'block';
            document.getElementById('resNome').innerText = dados.nome;
            document.getElementById('resLocal').innerText = dados.unidade;
            document.getElementById('resData').innerText = dados.data.split('-').reverse().join('/');
            document.getElementById('resTurno').innerText = dados.turno;
        })
        .catch(() => {
            alert("Erro ao enviar. Tente novamente.");
            btn.disabled = false;
            btn.innerText = "Finalizar Agendamento";
        });
    });
</script>

</body>
</html>
