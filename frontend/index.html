<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>INSPEÇÃO DE SAÚDE – CBA X</title>

<style>
  body { font-family: Arial, sans-serif; background:#f2f4f8; margin:0; padding:0; }
  .container { max-width: 650px; margin: 30px auto; background:#fff; padding:20px; border-radius:10px; text-align:center; }
  .logo { max-width:180px; width:100%; margin-bottom: 10px; }

  input, select, button {
    width:100%; padding:10px; margin-bottom:10px; border-radius:8px;
    border:1px solid #ccc; font-size:14px; box-sizing:border-box;
  }
  button { background:#0b3c5d; color:#fff; border:none; cursor:pointer; }
  button:hover { background:#092f49; }

  #campoTurno { display:none; }
  .msg { display:none; margin-top:10px; padding:10px; border-radius:8px; font-weight:bold; text-align:center; }
  .ok { background:#eef9f0; border:1px solid #cfe9d3; color:#1f5b2b; }
  .err { background:#fff2f2; border:1px solid #f2c2c2; color:#8a1f1f; }

  .small { font-size:12px; color:#666; margin-top:6px; }
</style>
</head>

<body>
<div class="container">
  <img src="logo-cbax.png" alt="Logo CBA X" class="logo" />
  <h2>INSPEÇÃO DE SAÚDE – CBA X</h2>
  <p>Sistema de Agendamento</p>

  <form id="formAgendamento">
    <input type="text" id="nome" placeholder="Nome completo" required />
    <input type="text" id="rg" placeholder="RG" required />
    <input type="email" id="email" placeholder="E-mail" required />

    <select id="posto" required>
      <option value="">Selecione o Posto / Graduação</option>
      <option>SDBM</option>
      <option>CB BM</option>
      <option>3º SGT BM</option>
      <option>2º SGT BM</option>
      <option>1º SGT BM</option>
      <option>SUBTEN BM</option>
      <option>2º TEN BM</option>
      <option>1º TEN BM</option>
      <option>CAP BM</option>
      <option>MAJ BM</option>
      <option>TEN CEL BM</option>
      <option>CEL BM</option>
    </select>

    <select id="unidade" required>
      <option value="">Selecione a Unidade</option>
      <option>1º GMar - Botafogo</option>
      <option>DBM 1/M - Paquetá</option>
      <option>DBM 2/M - Piscinão de Ramos</option>

      <option>2º GMar - Barra da Tijuca</option>
      <option>CER</option>

      <option>3º GMar - Copacabana</option>

      <option>4º GMar - Itaipu</option>
      <option>DBM 6/M - Itaipu</option>

      <option>CBA X</option>

      <option>DBM 3/M - Recreio dos Bandeirantes</option>
      <option>DBM 4/M - Barra de Guaratiba</option>

      <option>DBM 5/M - Sepetiba</option>
    </select>

    <select id="dataSelect" required>
      <option value="">Selecione a Data</option>
    </select>

    <div id="campoTurno">
      <select id="turno">
        <option value="">Selecione o Turno</option>
        <option>Manhã</option>
        <option>Tarde</option>
      </select>
      <div class="small">Obs.: Turno só aparece nas agendas de terça e sexta.</div>
    </div>

    <button type="submit" id="btnAgendar">Agendar</button>

    <div id="msgOk" class="msg ok">✅ Agendamento realizado com sucesso.</div>
    <div id="msgErr" class="msg err">❌ Não foi possível agendar. Tente novamente.</div>
  </form>

  <div class="small">
    Cancelamento: acesse <b>cancelar.html</b> com o código recebido no e-mail.
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
    getFirestore, collection, doc, getDoc, setDoc, runTransaction
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  // Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
    authDomain: "inspecao-saude-cbax.firebaseapp.com",
    projectId: "inspecao-saude-cbax",
    storageBucket: "inspecao-saude-cbax.firebasestorage.app",
    messagingSenderId: "1011281662526",
    appId: "1:1011281662526:web:1028e8a8d140684e98376f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ----------------------------
  // 1) DEFINIÇÃO DAS AGENDAS (1 a 7)
  // ----------------------------
  // tipo:
  // - "TS" = Terça/Sexta (20/dia => 10 manhã + 10 tarde) + feriados bloqueados
  // - "MF" = Segunda a Sexta (5/dia) + feriados liberados

  const AGENDAS = [
    // AGENDA 1: 1ºGMar + DBM1 + DBM2 (uma só agenda) 17/03 a 15/05 - Ter/Sex
    { id:"A1", tipo:"TS", inicio:"2026-03-17", fim:"2026-05-15",
      unidades:[
        "1º GMar - Botafogo",
        "DBM 1/M - Paquetá",
        "DBM 2/M - Piscinão de Ramos"
      ]
    },

    // AGENDA 2: 4ºGMar + DBM6 (uma só agenda) 19/05 a 26/06 - Ter/Sex
    { id:"A2", tipo:"TS", inicio:"2026-05-19", fim:"2026-06-26",
      unidades:[
        "4º GMar - Itaipu",
        "DBM 6/M - Itaipu"
      ]
    },

    // AGENDA 3: CER + 2ºGMAR (Barra) 23/02 a 31/07 - Seg/Sex (5 por dia)
    { id:"A3", tipo:"MF", inicio:"2026-02-23", fim:"2026-07-31",
      unidades:[
        "CER",
        "2º GMar - Barra da Tijuca"
      ]
    },

    // AGENDA 4: 3ºGMAR Copacabana 23/02 a 31/07 - Seg/Sex (5 por dia)
    { id:"A4", tipo:"MF", inicio:"2026-02-23", fim:"2026-07-31",
      unidades:[
        "3º GMar - Copacabana"
      ]
    },

    // AGENDA 5: CBA X 10/03 a 13/03 - Ter/Sex
    { id:"A5", tipo:"TS", inicio:"2026-03-10", fim:"2026-03-13",
      unidades:[
        "CBA X"
      ]
    },

    // AGENDA 6: DBM4 + DBM3 30/06 a 31/07 - Ter/Sex
    { id:"A6", tipo:"TS", inicio:"2026-06-30", fim:"2026-07-31",
      unidades:[
        "DBM 4/M - Barra de Guaratiba",
        "DBM 3/M - Recreio dos Bandeirantes"
      ]
    },

    // AGENDA 7: DBM5 Sepetiba 23/02 a 05/03 - Ter/Sex
    { id:"A7", tipo:"TS", inicio:"2026-02-23", fim:"2026-03-05",
      unidades:[
        "DBM 5/M - Sepetiba"
      ]
    },
  ];

  function acharAgendaPorUnidade(unidade){
    return AGENDAS.find(a => a.unidades.includes(unidade)) || null;
  }

  // ----------------------------
  // 2) FERIADOS (para bloquear APENAS nas agendas TS)
  // ----------------------------
  // Sem web aqui, então usamos:
  // - fixos nacionais
  // - e alguns comuns RJ (São Sebastião e São Jorge)
  // - + móveis calculados (Carnaval, Sexta Santa, Corpus Christi)
  function easterDate(year){
    // algoritmo de Butcher
    const a = year % 19;
    const b = Math.floor(year / 100);
    const c = year % 100;
    const d = Math.floor(b / 4);
    const e = b % 4;
    const f = Math.floor((b + 8) / 25);
    const g = Math.floor((b - f + 1) / 3);
    const h = (19*a + b - d - g + 15) % 30;
    const i = Math.floor(c / 4);
    const k = c % 4;
    const l = (32 + 2*e + 2*i - h - k) % 7;
    const m = Math.floor((a + 11*h + 22*l) / 451);
    const month = Math.floor((h + l - 7*m + 114) / 31); // 3=Mar, 4=Apr
    const day = ((h + l - 7*m + 114) % 31) + 1;
    return new Date(Date.UTC(year, month-1, day));
  }

  function ymd(d){
    return d.toISOString().slice(0,10);
  }

  function feriadosAno(year){
    const fixed = [
      `${year}-01-01`, // Confraternização
      `${year}-04-21`, // Tiradentes
      `${year}-05-01`, // Trabalho
      `${year}-09-07`, // Independência
      `${year}-10-12`, // N. Sra Aparecida
      `${year}-11-02`, // Finados
      `${year}-11-15`, // Proclamação
      `${year}-12-25`, // Natal

      // municipais/estaduais comuns no RJ:
      `${year}-01-20`, // São Sebastião (Rio)
      `${year}-04-23`, // São Jorge (RJ)
    ];

    const easter = easterDate(year);
    const carnivalMon = new Date(easter); carnivalMon.setUTCDate(easter.getUTCDate() - 48);
    const carnivalTue = new Date(easter); carnivalTue.setUTCDate(easter.getUTCDate() - 47);
    const goodFriday = new Date(easter);  goodFriday.setUTCDate(easter.getUTCDate() - 2);
    const corpusChristi = new Date(easter); corpusChristi.setUTCDate(easter.getUTCDate() + 60);

    const movable = [ ymd(carnivalMon), ymd(carnivalTue), ymd(goodFriday), ymd(corpusChristi) ];
    return new Set([...fixed, ...movable]);
  }

  const FERIADOS_2026 = feriadosAno(2026);

  // ----------------------------
  // 3) CONTROLE DE VAGAS (counters)
  // ----------------------------
  // counters/{agendaId_data}
  // TS: {manha, tarde}
  // MF: {total}
  function counterId(agendaId, dataYmd){
    return `${agendaId}_${dataYmd}`;
  }

  function isDiaUtilMF(dateObj){
    const day = dateObj.getUTCDay(); // 0 dom .. 6 sab
    return day >= 1 && day <= 5; // seg-sex
  }
  function isDiaTS(dateObj){
    const day = dateObj.getUTCDay();
    return day === 2 || day === 5; // terça=2, sexta=5
  }

  function formatBR(ymdStr){
    const d = new Date(ymdStr + "T00:00:00Z");
    return d.toLocaleDateString("pt-BR");
  }

  // ----------------------------
  // 4) UI: carregar datas conforme a unidade
  // ----------------------------
  const unidadeEl = document.getElementById("unidade");
  const dataSelect = document.getElementById("dataSelect");
  const campoTurno = document.getElementById("campoTurno");
  const turnoEl = document.getElementById("turno");

  const msgOk = document.getElementById("msgOk");
  const msgErr = document.getElementById("msgErr");
  const btnAgendar = document.getElementById("btnAgendar");

  let agendaAtual = null;

  unidadeEl.addEventListener("change", async () => {
    msgOk.style.display="none";
    msgErr.style.display="none";

    agendaAtual = acharAgendaPorUnidade(unidadeEl.value);

    // limpa datas
    dataSelect.innerHTML = `<option value="">Selecione a Data</option>`;

    if (!agendaAtual) return;

    // mostra/oculta turno baseado NO TIPO DA AGENDA
    if (agendaAtual.tipo === "TS"){
      campoTurno.style.display = "block";
      turnoEl.required = true;
    } else {
      campoTurno.style.display = "none";
      turnoEl.required = false;
      turnoEl.value = "";
    }

    // gera opções de datas e filtra as lotadas consultando counters
    await preencherDatasDisponiveis(agendaAtual);
  });

  async function preencherDatasDisponiveis(agenda){
    const ini = new Date(agenda.inicio + "T00:00:00Z");
    const fim = new Date(agenda.fim + "T00:00:00Z");

    // Vamos montar lista de datas primeiro
    const datas = [];
    for (let d = new Date(ini); d <= fim; d.setUTCDate(d.getUTCDate()+1)){
      if (agenda.tipo === "MF"){
        if (!isDiaUtilMF(d)) continue; // seg-sex
        // feriados liberados
      } else {
        if (!isDiaTS(d)) continue; // ter/sex
        const dayYmd = ymd(d);
        // feriados BLOQUEADOS só nas TS
        if (FERIADOS_2026.has(dayYmd)) continue;
      }
      datas.push(ymd(d));
    }

    // Agora: para cada data, checar se lotou (counters)
    // (Simples e confiável — pode demorar alguns segundos na primeira carga)
    btnAgendar.disabled = true;

    for (const dataYmd of datas){
      const cRef = doc(db, "counters", counterId(agenda.id, dataYmd));
      const cSnap = await getDoc(cRef);
      const c = cSnap.exists() ? cSnap.data() : null;

      let temVaga = true;

      if (agenda.tipo === "MF"){
        const total = c?.total || 0;
        temVaga = total < 5;
      } else {
        const manha = c?.manha || 0;
        const tarde = c?.tarde || 0;
        // data aparece se existir vaga em pelo menos um turno
        temVaga = (manha < 10) || (tarde < 10);
      }

      if (temVaga){
        const opt = document.createElement("option");
        opt.value = dataYmd;

        // dica visual (TS): mostra se ainda tem manhã/tarde
        if (agenda.tipo === "TS"){
          const manha = c?.manha || 0;
          const tarde = c?.tarde || 0;
          const label = `${formatBR(dataYmd)} (Manhã: ${Math.max(0,10-manha)} | Tarde: ${Math.max(0,10-tarde)})`;
          opt.textContent = label;
        } else {
          opt.textContent = `${formatBR(dataYmd)} (vagas: ${Math.max(0,5-(c?.total||0))})`;
        }

        dataSelect.appendChild(opt);
      }
    }

    btnAgendar.disabled = false;
  }

  // ----------------------------
  // 5) SUBMIT: registrar agendamento + atualizar counters
  // ----------------------------
  document.getElementById("formAgendamento").addEventListener("submit", async (e) => {
    e.preventDefault();
    msgOk.style.display="none";
    msgErr.style.display="none";

    const agenda = agendaAtual;
    if (!agenda){
      msgErr.textContent = "❌ Selecione a unidade.";
      msgErr.style.display="block";
      return;
    }

    const nome = document.getElementById("nome").value.trim();
    const rg = document.getElementById("rg").value.trim();
    const email = document.getElementById("email").value.trim();
    const posto = document.getElementById("posto").value;
    const unidade = unidadeEl.value;
    const data = dataSelect.value;
    const turno = (agenda.tipo === "TS") ? (turnoEl.value || "") : "";

    if (!data){
      msgErr.textContent = "❌ Selecione a data.";
      msgErr.style.display="block";
      return;
    }

    if (agenda.tipo === "TS" && !turno){
      msgErr.textContent = "❌ Selecione o turno (Manhã ou Tarde).";
      msgErr.style.display="block";
      return;
    }

    btnAgendar.disabled = true;

    try {
      const agRef = doc(collection(db, "agendamentos"));
      const cRef = doc(db, "counters", counterId(agenda.id, data));

      await runTransaction(db, async (tx) => {
        const cSnap = await tx.get(cRef);
        const c = cSnap.exists() ? cSnap.data() : { total:0, manha:0, tarde:0 };

        if (agenda.tipo === "MF"){
          const total = c.total || 0;
          if (total >= 5) throw new Error("LOTADO");
          tx.set(cRef, { total: total + 1 }, { merge:true });
        } else {
          const manha = c.manha || 0;
          const tarde = c.tarde || 0;

          if (turno === "Manhã"){
            if (manha >= 10) throw new Error("LOTADO");
            tx.set(cRef, { manha: manha + 1 }, { merge:true });
          } else {
            if (tarde >= 10) throw new Error("LOTADO");
            tx.set(cRef, { tarde: tarde + 1 }, { merge:true });
          }
        }

        tx.set(agRef, {
          agendaId: agenda.id,
          tipoAgenda: agenda.tipo,
          nome, rg, email, posto, unidade,
          data,
          data_br: formatBR(data),
          turno: turno || ""
        });
      });

      msgOk.style.display="block";
      e.target.reset();
      campoTurno.style.display = (agenda.tipo === "TS") ? "block" : "none";

      // recarrega datas para “sumir” se lotou
      dataSelect.innerHTML = `<option value="">Selecione a Data</option>`;
      await preencherDatasDisponiveis(agenda);

    } catch(err){
      console.error(err);
      msgErr.textContent = (String(err?.message).includes("LOTADO"))
        ? "❌ Essa data/turno acabou de lotar. Selecione outra opção."
        : "❌ Não foi possível agendar. Tente novamente.";
      msgErr.style.display="block";
    } finally {
      btnAgendar.disabled = false;
    }
  });

</script>
</body>
</html>
