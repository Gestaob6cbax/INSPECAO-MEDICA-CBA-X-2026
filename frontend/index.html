<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Inspeção Médica 2026 - CBA X</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #8b0000; --secondary: #f4f4f4; --success: #28a745; --error: #dc3545; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 550px; background: white; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--primary); }
        header { text-align: center; margin-bottom: 25px; }
        h2 { color: var(--primary); margin: 0; text-transform: uppercase; font-size: 20px; letter-spacing: 1px; }
        p { color: #666; font-size: 14px; margin-top: 5px; }
        
        label { display: block; margin: 15px 0 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--primary); outline: none; background: #fffcfc; }
        
        button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: #660000; transform: translateY(-1px); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .msg { padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; display: none; font-size: 14px; line-height: 1.5; }
        .error { background: #fce4e4; color: var(--error); border: 1px solid #f5c6cb; }
        .success { background: #d4edda; color: var(--success); border: 1px solid #c3e6cb; }
        
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; margin-right: 10px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Inspeção Médica 2026</h2>
        <p>Comando de Bombeiros de Área - CBA X</p>
    </header>
    
    <div id="statusMsg" class="msg"></div>

    <form id="formAgendamento">
        <label>Local da Inspeção (Onde quer ser atendido)</label>
        <select id="unidade" required>
            <option value="">Selecione o local...</option>
            <option>1º GMar - Botafogo</option>
            <option>2º GMar - Barra da Tijuca</option>
            <option>3º GMar - Copacabana</option>
            <option>4º GMar - Itaipu</option>
            <option>CBA X</option>
            <option>CER</option>
            <option>DBM 1/M - Paquetá</option>
            <option>DBM 2/M - Piscinão de Ramos</option>
            <option>DBM 3/M - Recreio</option>
            <option>DBM 5/M - Sepetiba</option>
            <option>DBM 6/M - Itaipu</option>
        </select>

        <label>Unidade de Origem (Onde você serve)</label>
        <input type="text" id="unidadeServe" placeholder="Ex: 2º GMar, CBA X, DBM 3/M" required>

        <label>Data da Inspeção</label>
        <input type="date" id="data" required>

        <label>Turno desejado</label>
        <select id="turno" required>
            <option value="Manhã">Manhã (08h às 12h)</option>
            <option value="Tarde">Tarde (13h às 17h)</option>
        </select>

        <label>Nome Completo</label>
        <input type="text" id="nome" placeholder="Seu nome completo" required>

        <label>Posto ou Graduação</label>
        <input type="text" id="posto" placeholder="Ex: SUBTEN BM, 1º SGT BM" required>

        <label>RG Militar</label>
        <input type="number" id="rg" placeholder="Apenas os números do RG" required>

        <button type="submit" id="btnEnviar">Confirmar Agendamento</button>
    </form>
</div>

<script>
    // CONFIGURAÇÃO DO GOOGLE APPS SCRIPT (Sincronização com Planilha)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxuNjVbW1FJ5l23Syh9UJJM5xeCpw0H5pOFAHPSO5txkZ1p0LizvJdrtlvyxoKS0Gy6SQ/exec";

    // CONFIGURAÇÃO DO FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const form = document.getElementById("formAgendamento");
    const statusMsg = document.getElementById("statusMsg");
    const btn = document.getElementById("btnEnviar");

    form.onsubmit = async (e) => {
        e.preventDefault();
        const rgValue = document.getElementById("rg").value;

        // Inicia carregamento
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> Verificando dados...';
        statusMsg.style.display = "none";

        try {
            // 1. VERIFICA NO FIREBASE SE JÁ EXISTE AGENDAMENTO PELO SITE
            const queryFirebase = await db.collection("agendamentos").where("rg", "==", rgValue).get();
            if (!queryFirebase.empty) {
                mostrarMsg("Atenção: Este RG já possui um agendamento realizado através do site.", "error");
                resetBotao();
                return;
            }

            // 2. VERIFICA NA SUA PLANILHA EXCEL (VIA APPS SCRIPT)
            const response = await fetch(`${SCRIPT_URL}?action=checkRG&rg=${rgValue}`);
            const result = await response.json();

            if (result.exists) {
                mostrarMsg(`O militar de RG ${rgValue} já consta como agendado na planilha de controle da administração.`, "error");
                resetBotao();
                return;
            }

            // 3. SE NÃO EXISTIR EM LUGAR NENHUM, SALVA NO FIREBASE
            await db.collection("agendamentos").add({
                unidade: document.getElementById("unidade").value,
                unidadeServe: document.getElementById("unidadeServe").value,
                data: document.getElementById("data").value,
                turno: document.getElementById("turno").value,
                nome: document.getElementById("nome").value.toUpperCase(),
                posto: document.getElementById("posto").value.toUpperCase(),
                rg: rgValue,
                dataRegistro: new Date().toISOString()
            });

            mostrarMsg("Agendamento confirmado com sucesso! Compareça ao local na data escolhida.", "success");
            form.reset();

        } catch (err) {
            console.error("Erro:", err);
            mostrarMsg("Ocorreu um erro de conexão. Por favor, tente novamente em instantes.", "error");
        } finally {
            resetBotao();
        }
    };

    function mostrarMsg(texto, tipo) {
        statusMsg.innerText = texto;
        statusMsg.className = `msg ${tipo}`;
        statusMsg.style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetBotao() {
        btn.disabled = false;
        btn.innerText = "Confirmar Agendamento";
    }
</script>

</body>
</html>
