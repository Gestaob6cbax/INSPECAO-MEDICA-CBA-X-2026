<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Inspeção de Saúde CBA X</title>

  <style>
    body { font-family: Arial, sans-serif; background:#f2f4f8; margin:0; padding:0; }
    .box { max-width:1100px; margin:30px auto; background:#fff; padding:20px; border-radius:10px; }
    h2 { margin:0 0 12px 0; }
    input, select, button { padding:10px; border-radius:8px; font-size:14px; border:1px solid #ccc; box-sizing:border-box; }
    button { border:none; background:#0b3c5d; color:#fff; cursor:pointer; }
    button:hover { background:#092f49; }
    .danger { background:#c0392b; }
    .danger:hover { background:#a93226; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:10px 0; }
    .hidden { display:none; }
    table { width:100%; border-collapse:collapse; font-size:13px; margin-top:10px; }
    th, td { border:1px solid #e4e4e4; padding:8px; text-align:left; vertical-align:top; }
    th { background:#f6f8fb; }
    .ok { display:none; margin-top:10px; padding:10px; border-radius:8px; background:#eef9f0; border:1px solid #cfe9d3; color:#1f5b2b; font-weight:bold; }
    .err { display:none; margin-top:10px; padding:10px; border-radius:8px; background:#fff2f2; border:1px solid #f2c2c2; color:#8a1f1f; font-weight:bold; }
    .muted { color:#6b7280; font-size:12px; }
  </style>
</head>

<body>
  <div class="box">
    <h2>Área Administrativa – Inspeção de Saúde CBA X</h2>
    <div class="muted">Use para consultar e excluir agendamentos (ao excluir, a vaga retorna automaticamente quando houver controle).</div>

    <!-- LOGIN PIN -->
    <div class="row" id="pinArea">
      <input type="password" id="pin" placeholder="Digite o PIN" style="max-width:240px;">
      <button type="button" id="btnEntrar">Entrar</button>
    </div>

    <div id="adminArea" class="hidden">
      <div class="row">
        <select id="filtroUnidade" style="min-width:300px;">
          <option value="">Todas as unidades</option>
          <option>1º GMar - Botafogo</option>
          <option>DBM 1/M - Paquetá</option>
          <option>DBM 2/M - Piscinão de Ramos</option>
          <option>2º GMar - Barra da Tijuca</option>
          <option>CER</option>
          <option>3º GMar - Copacabana</option>
          <option>4º GMar - Itaipu</option>
          <option>DBM 6/M - Itaipu</option>
          <option>CBA X</option>
          <option>DBM 3/M - Recreio</option>
          <option>DBM 4/M - Barra de Guaratiba</option>
          <option>DBM 5/M - Sepetiba</option>
        </select>

        <button type="button" id="btnAtualizar">Atualizar tabela</button>
      </div>

      <div class="ok" id="msgOk">✅ Operação realizada com sucesso.</div>
      <div class="err" id="msgErr">❌ Não foi possível realizar a operação.</div>

      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Turno</th>
            <th>Unidade</th>
            <th>Nome</th>
            <th>RG</th>
            <th>Posto/Grad</th>
            <th>E-mail</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

 <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore, collection, query, where, orderBy, limit, getDocs,
      doc, runTransaction, deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    // ✅ PIN
    const PIN_CORRETO = "B6CBAX2023";

    // ✅ Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
      authDomain: "inspecao-saude-cbax.firebaseapp.com",
      projectId: "inspecao-saude-cbax",
      storageBucket: "inspecao-saude-cbax.firebasestorage.app",
      messagingSenderId: "1011281662526",
      appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // UI
    const pinArea = document.getElementById("pinArea");
    const adminArea = document.getElementById("adminArea");
    const btnEntrar = document.getElementById("btnEntrar");
    const pinEl = document.getElementById("pin");
    const filtroUnidade = document.getElementById("filtroUnidade");
    const btnAtualizar = document.getElementById("btnAtualizar");
    const tbody = document.getElementById("tbody");
    const msgOk = document.getElementById("msgOk");
    const msgErr = document.getElementById("msgErr");

    function showOk(text){
      msgErr.style.display="none";
      msgOk.textContent = text;
      msgOk.style.display="block";
      setTimeout(()=> msgOk.style.display="none", 4000);
    }
    function showErr(text){
      msgOk.style.display="none";
      msgErr.textContent = text;
      msgErr.style.display="block";
      setTimeout(()=> msgErr.style.display="none", 6000);
    }

    function counterDocId(agendaId, ymd){
      return `${agendaId}_${ymd}`;
    }

    function formatarDataBR(ymd){
      if (!ymd || typeof ymd !== "string" || !ymd.includes("-")) return "";
      const [y,m,d] = ymd.split("-");
      if (!y || !m || !d) return "";
      return `${d}/${m}/${y}`;
    }

    btnEntrar.addEventListener("click", async () => {
      if (pinEl.value !== PIN_CORRETO){
        alert("PIN incorreto.");
        return;
      }
      pinArea.classList.add("hidden");
      adminArea.classList.remove("hidden");
      await carregarTabela();
    });

    btnAtualizar.addEventListener("click", async () => {
      await carregarTabela();
    });

    async function carregarTabela(){
      tbody.innerHTML = "";
      const uni = filtroUnidade.value;

      // Puxa muitos (ajuste se precisar)
      let qAg;
      if (uni){
        qAg = query(
          collection(db, "agendamentos"),
          where("unidade","==",uni),
          orderBy("data","asc"),
          limit(2000)
        );
      } else {
        qAg = query(
          collection(db, "agendamentos"),
          orderBy("data","asc"),
          limit(2000)
        );
      }

      let snap;
      try {
        snap = await getDocs(qAg);
      } catch (e) {
        console.error(e);
        showErr("❌ Erro ao carregar. (Verifique regras do Firestore ou índice)");
        return;
      }

      if (!snap.size){
        const tr = document.createElement("tr");
        tr.innerHTML = `<td colspan="8">Nenhum agendamento encontrado.</td>`;
        tbody.appendChild(tr);
        return;
      }

      snap.forEach((d) => {
        const v = d.data() || {};

        // Alguns registros antigos podem ter campos diferentes. Vamos tratar.
        const dataYMD = v.data || ""; // esperado: YYYY-MM-DD
        const dataBR = v.data_br || formatarDataBR(dataYMD);

        // unidade antiga pode estar errada (ex.: "turno"). Ainda assim mostramos.
        const unidade = v.unidade || "";
        const turno = v.turno || "";
        const nome = v.nome || "";
        const rg = v.rg || "";
        const posto = v.posto || "";
        const email = v.email || "";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${dataBR}</td>
          <td>${turno}</td>
          <td>${unidade}</td>
          <td>${nome}</td>
          <td>${rg}</td>
          <td>${posto}</td>
          <td>${email}</td>
          <td><button class="danger" type="button">Excluir</button></td>
        `;

        tr.querySelector("button").addEventListener("click", async () => {
          const ok = confirm("Tem certeza que deseja excluir este agendamento?\n\n✅ Se houver controle de vagas, a vaga voltará automaticamente.");
          if (!ok) return;
          await excluirAgendamentoSeguro(d.id);
        });

        tbody.appendChild(tr);
      });
    }

    // ✅ Exclui com segurança:
    // - Se tiver agendaId+data => devolve vaga em counters e exclui
    // - Se NÃO tiver => só exclui (limpa registros antigos)
    async function excluirAgendamentoSeguro(docId){
      const agRef = doc(db, "agendamentos", docId);

      try {
        await runTransaction(db, async (tx) => {
          const agSnap = await tx.get(agRef);
          if (!agSnap.exists()) throw new Error("NAO_EXISTE");

          const ag = agSnap.data() || {};
          const agendaId = ag.agendaId;
          const data = ag.data;       // YYYY-MM-DD
          const turno = ag.turno;     // "Manhã" / "Tarde" ou vazio

          // Se faltar agendaId ou data, é registro antigo/incompleto: só apaga.
          if (!agendaId || !data) {
            tx.delete(agRef);
            return;
          }

          // Tenta devolver vaga
          const cRef = doc(db, "counters", counterDocId(agendaId, data));
          const cSnap = await tx.get(cRef);
          const c = cSnap.exists() ? (cSnap.data() || {}) : { total:0, manha:0, tarde:0 };

          let total = Number(c.total || 0);
          let manha = Number(c.manha || 0);
          let tarde = Number(c.tarde || 0);

          // Se esse counter usa manha/tarde (TS), devolve no turno correto
          const usaTurno = (manha > 0 || tarde > 0);

          if (usaTurno && (turno === "Manhã" || turno === "Tarde")) {
            if (turno === "Manhã") manha = Math.max(0, manha - 1);
            if (turno === "Tarde") tarde = Math.max(0, tarde - 1);
          } else {
            // Caso SD/SS (sem turno): devolve no total
            total = Math.max(0, total - 1);
          }

          tx.set(cRef, { total, manha, tarde }, { merge:true });
          tx.delete(agRef);
        });

        showOk("✅ Agendamento excluído (e vaga devolvida quando aplicável).");
        await carregarTabela();
      } catch(e){
        console.error(e);
        showErr("❌ Não foi possível excluir. Se persistir, verifique as Regras do Firestore.");
      }
    }
  </script>
</body>
</html>
