<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Médica 2026</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f2f4f8; margin: 0; padding: 0; }
        .header-admin { background: #003366; color: white; text-align: center; padding: 20px; }
        .container { max-width: 95%; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #003366; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .btn-export { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { background: #e7eff6; padding: 15px; border-radius: 8px; flex: 1; text-align: center; border: 1px solid #003366; }
    </style>
</head>
<body>

<div class="header-admin">
    <h1>PAINEL DE CONTROLE - INSPEÇÃO MÉDICA 2026</h1>
    <p>CBA X - Gestão de Agendamentos</p>
</div>

<div class="container">
    <div class="stats">
        <div class="card">
            <strong style="color: #003366;">Total de Agendados</strong>
            <div id="totalAgendados" style="font-size: 24px; font-weight: bold;">Carregando...</div>
        </div>
    </div>

    <button class="btn-export" onclick="exportarTabela()">📊 Baixar Lista (Excel)</button>

    <table id="tabelaAgendamentos">
        <thead>
            <tr>
                <th>Data</th>
                <th>Posto</th>
                <th>Nome</th>
                <th>RG</th>
                <th>Unidade Serve</th>
                <th>Local Inspeção</th>
                <th>Turno</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Buscar dados em tempo real
    const q = query(collection(db, "agendamentos"), orderBy("criadoEm", "desc"));

    onSnapshot(q, (snapshot) => {
        const corpoTabela = document.getElementById("corpoTabela");
        corpoTabela.innerHTML = "";
        let total = 0;

        snapshot.forEach((doc) => {
            const d = doc.data();
            total++;
            const row = `<tr>
                <td>${d.data_br}</td>
                <td>${d.posto}</td>
                <td>${d.nome}</td>
                <td>${d.rg}</td>
                <td>${d.unidadeServe}</td>
                <td>${d.unidade}</td>
                <td>${d.turno}</td>
            </tr>`;
            corpoTabela.innerHTML += row;
        });
        document.getElementById("totalAgendados").textContent = total;
    });
</script>

<script>
    function exportarTabela() {
        const table = document.getElementById("tabelaAgendamentos");
        let html = table.outerHTML;
        window.open('data:application/vnd.ms-excel,' + encodeURIComponent(html));
    }
</script>

</body>
</html>
