<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Inspeção de Saúde CBA X</title>

  <style>
    body { font-family: Arial, sans-serif; background:#f2f4f8; margin:0; padding:0; }
    .box { max-width:1200px; margin:30px auto; background:#fff; padding:20px; border-radius:12px; }
    h2 { margin:0 0 10px 0; }
    input, select, button { padding:10px; border-radius:10px; font-size:14px; border:1px solid #ccc; box-sizing:border-box; }
    button { border:none; background:#0b3c5d; color:#fff; cursor:pointer; font-weight:bold; }
    button:hover { background:#092f49; }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .danger { background:#c0392b; }
    .danger:hover { background:#a93226; }
    .gray { background:#555; }
    .gray:hover { background:#444; }

    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:10px 0; }
    .hidden { display:none; }

    /* Estilo para a área de Login Centralizada */
    #pinArea { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      padding: 40px 20px;
    }
    .login-container { width: 100%; max-width: 320px; text-align: center; }
    .logo-admin { max-width: 150px; margin-bottom: 20px; }
    
    .password-wrapper { position: relative; width: 100%; margin-bottom: 10px; }
    .password-wrapper input { width: 100%; padding-right: 40px; }
    .toggle-pass { 
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%); 
      cursor: pointer; background: none; border: none; color: #666; font-size: 18px; padding: 0;
    }

    table { width:100%; border-collapse:collapse; font-size:13px; margin-top:10px; }
    th, td { border:1px solid #e4e4e4; padding:8px; text-align:left; vertical-align:top; }
    th { background:#f6f8fb; }

    .ok, .err { display:none; margin-top:10px; padding:10px; border-radius:10px; font-weight:bold; }
    .ok  { background:#eef9f0; border:1px solid #cfe9d3; color:#1f5b2b; }
    .err { background:#fff2f2; border:1px solid #f2c2c2; color:#8a1f1f; }

    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace; }
    .small { font-size:12px; color:#666; margin-top:8px; }
    .nowrap { white-space:nowrap; }
  </style>
</head>

<body>
  <div class="box">
    
    <div id="pinArea">
      <div class="login-container">
        <img src="logo-cbax.png" alt="Logo CBA X" class="logo-admin">

        <div class="password-wrapper">
          <input type="password" id="pin" placeholder="Digite o PIN">
          <button type="button" class="toggle-pass" id="btnTogglePass" title="Ver senha">👁️</button>
        </div>
        
        <button type="button" id="btnEntrar" style="width: 100%;">Entrar</button>
        <div class="small" style="margin-top: 15px;">PIN: <span class="mono">B6CBAX2023</span></div>
      </div>
    </div>

    <div id="adminArea" class="hidden">
      <h2>Painel de Controle</h2>
      <div class="row">

        <button type="button" class="gray" id="btnExportar">Exportar Excel</button>
        <button type="button" class="danger" id="btnExcluirSelecionados" disabled>Excluir selecionados</button>
      </div>

      <div class="ok" id="msgOk"></div>
      <div class="err" id="msgErr"></div>

      <table>
        <thead>

            <th>Data</th>
