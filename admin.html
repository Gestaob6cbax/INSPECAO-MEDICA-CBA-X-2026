<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – Inspeção de Saúde CBA X</title>

  <style>
    body { font-family: Arial, sans-serif; background:#f2f4f8; margin:0; padding:0; }
    .box { max-width:1200px; margin:30px auto; background:#fff; padding:20px; border-radius:12px; }
    h2 { margin:0 0 10px 0; }
    input, select, button { padding:10px; border-radius:10px; font-size:14px; border:1px solid #ccc; box-sizing:border-box; }
    button { border:none; background:#0b3c5d; color:#fff; cursor:pointer; font-weight:bold; }
    button:hover { background:#092f49; }
    button:disabled { opacity:.6; cursor:not-allowed; }
    .danger { background:#c0392b; }
    .danger:hover { background:#a93226; }
    .gray { background:#555; }
    .gray:hover { background:#444; }

    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin:10px 0; }
    .hidden { display:none; }

    table { width:100%; border-collapse:collapse; font-size:13px; margin-top:10px; }
    th, td { border:1px solid #e4e4e4; padding:8px; text-align:left; vertical-align:top; }
    th { background:#f6f8fb; }

    .ok, .err { display:none; margin-top:10px; padding:10px; border-radius:10px; font-weight:bold; }
    .ok  { background:#eef9f0; border:1px solid #cfe9d3; color:#1f5b2b; }
    .err { background:#fff2f2; border:1px solid #f2c2c2; color:#8a1f1f; }

    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace; }
    .small { font-size:12px; color:#666; margin-top:8px; }
    .nowrap { white-space:nowrap; }
  </style>
</head>

<body>
  <div class="box">
    <h2>Área Administrativa – Inspeção de Saúde CBA X</h2>

    <!-- LOGIN PIN -->
    <div class="row" id="pinArea">
      <input type="password" id="pin" placeholder="Digite o PIN" style="max-width:260px;">
      <button type="button" id="btnEntrar">Entrar</button>
      <span class="small">PIN: <span class="mono">B6CBAX2023</span></span>
    </div>

    <div id="adminArea" class="hidden">

      <div class="row">
        <select id="filtroUnidade" style="min-width:320px;">
          <option value="">Todas as unidades</option>
          <option>1º GMar - Botafogo</option>
          <option>DBM 1/M - Paquetá</option>
          <option>DBM 2/M - Piscinão de Ramos</option>
          <option>CER</option>
          <option>2º GMar - Barra da Tijuca</option>
          <option>3º GMar - Copacabana</option>
          <option>4º GMar - Itaipu</option>
          <option>DBM 6/M - Itaipu</option>
          <option>CBA X</option>
          <option>DBM 3/M - Recreio dos Bandeirantes</option>
          <option>DBM 4/M - Barra de Guaratiba</option>
          <option>DBM 5/M - Sepetiba</option>
        </select>

        <button type="button" id="btnAtualizar">Atualizar tabela</button>
        <button type="button" class="gray" id="btnExportar">Exportar Excel</button>

        <button type="button" class="danger" id="btnExcluirSelecionados" disabled>
          Excluir selecionados
        </button>
      </div>

      <div class="ok" id="msgOk">✅ Operação realizada com sucesso.</div>
      <div class="err" id="msgErr">❌ Não foi possível realizar a operação.</div>

      <div class="small">
        Dica: marque vários itens na primeira coluna e clique em <b>Excluir selecionados</b>.
      </div>

      <table>
        <thead>
          <tr>
            <th class="nowrap"><input type="checkbox" id="checkAll"> Todos</th>
            <th>Data</th>
            <th>Turno</th>
            <th>Unidade</th>
            <th>Nome</th>
            <th>RG</th>
            <th>Posto/Grad</th>
            <th>E-mail</th>
            <th class="nowrap">Ações</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- XLSX para exportar Excel -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore, collection, query, where, orderBy, limit, getDocs,
      doc, runTransaction
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    // ✅ PIN
    const PIN_CORRETO = "B6CBAX2023";

    // Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
      authDomain: "inspecao-saude-cbax.firebaseapp.com",
      projectId: "inspecao-saude-cbax",
      storageBucket: "inspecao-saude-cbax.firebasestorage.app",
      messagingSenderId: "1011281662526",
      appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const pinArea = document.getElementById("pinArea");
    const adminArea = document.getElementById("adminArea");
    const btnEntrar = document.getElementById("btnEntrar");
    const pinEl = document.getElementById("pin");

    const filtroUnidade = document.getElementById("filtroUnidade");
    const btnAtualizar = document.getElementById("btnAtualizar");
    const btnExportar = document.getElementById("btnExportar");
    const btnExcluirSelecionados = document.getElementById("btnExcluirSelecionados");

    const tbody = document.getElementById("tbody");
    const msgOk = document.getElementById("msgOk");
    const msgErr = document.getElementById("msgErr");
    const checkAll = document.getElementById("checkAll");

    let cacheAgendamentos = []; // usado para exportar excel
    let selectedIds = new Set();

    function showOk(text){
      msgErr.style.display="none";
      msgOk.textContent = text;
      msgOk.style.display="block";
      setTimeout(()=> msgOk.style.display="none", 4000);
    }
    function showErr(text){
      msgOk.style.display="none";
      msgErr.textContent = text;
      msgErr.style.display="block";
      setTimeout(()=> msgErr.style.display="none", 6000);
    }

    function counterDocId(agendaId, ymd){
      return `${agendaId}_${ymd}`;
    }

    btnEntrar.addEventListener("click", async () => {
      if (pinEl.value !== PIN_CORRETO){
        alert("PIN incorreto.");
        return;
      }
      pinArea.classList.add("hidden");
      adminArea.classList.remove("hidden");
      await carregarTabela();
    });

    btnAtualizar.addEventListener("click", async () => {
      await carregarTabela();
    });

    checkAll.addEventListener("change", () => {
      const checked = checkAll.checked;
      selectedIds.clear();
      tbody.querySelectorAll('input[type="checkbox"][data-id]').forEach(cb => {
        cb.checked = checked;
        if (checked) selectedIds.add(cb.dataset.id);
      });
      atualizarBotaoExcluirSelecionados();
    });

    function atualizarBotaoExcluirSelecionados(){
      btnExcluirSelecionados.disabled = selectedIds.size === 0;
      btnExcluirSelecionados.textContent = selectedIds.size
        ? `Excluir selecionados (${selectedIds.size})`
        : "Excluir selecionados";
    }

    async function carregarTabela(){
      tbody.innerHTML = "";
      cacheAgendamentos = [];
      selectedIds.clear();
      checkAll.checked = false;
      atualizarBotaoExcluirSelecionados();

      const uni = filtroUnidade.value;

      let qAg;
      if (uni){
        qAg = query(
          collection(db, "agendamentos"),
          where("unidade","==",uni),
          orderBy("data","asc"),
          limit(2000)
        );
      } else {
        qAg = query(
          collection(db, "agendamentos"),
          orderBy("data","asc"),
          limit(2000)
        );
      }

      const snap = await getDocs(qAg);

      if (!snap.size){
        const tr = document.createElement("tr");
        tr.innerHTML = `<td colspan="9">Nenhum agendamento encontrado.</td>`;
        tbody.appendChild(tr);
        return;
      }

      snap.forEach((d) => {
        const v = d.data();
        cacheAgendamentos.push({ id: d.id, ...v });

        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td class="nowrap">
            <input type="checkbox" data-id="${d.id}">
          </td>
          <td class="nowrap">${v.data_br || ""}</td>
          <td class="nowrap">${v.turno || ""}</td>
          <td>${v.unidade || ""}</td>
          <td>${v.nome || ""}</td>
          <td class="mono">${v.rg || ""}</td>
          <td class="nowrap">${v.posto || ""}</td>
          <td>${v.email || ""}</td>
          <td class="nowrap">
            <button class="danger" data-del="${d.id}">Excluir</button>
          </td>
        `;

        // checkbox select
        tr.querySelector('input[type="checkbox"][data-id]').addEventListener("change", (ev) => {
          const id = ev.target.dataset.id;
          if (ev.target.checked) selectedIds.add(id);
          else selectedIds.delete(id);
          atualizarBotaoExcluirSelecionados();
        });

        // excluir 1
        tr.querySelector("button[data-del]").addEventListener("click", async () => {
          const ok = confirm("Tem certeza que deseja excluir este agendamento?\n(A vaga voltará e o RG será liberado)");
          if (!ok) return;
          await excluirEDevolverVagaELiberarRG(d.id);
        });

        tbody.appendChild(tr);
      });
    }

    // 🔥 Excluir: devolve vaga + libera RG (deleta rg_locks/{rg_norm})
    async function excluirEDevolverVagaELiberarRG(docId){
      const agRef = doc(db, "agendamentos", docId);

      try {
        await runTransaction(db, async (tx) => {
          const agSnap = await tx.get(agRef);
          if (!agSnap.exists()) throw new Error("NAO_EXISTE");

          const ag = agSnap.data();

          const agendaId = ag.agendaId;
          const data = ag.data;           // YYYY-MM-DD
          const turno = ag.turno || "";   // Manhã/Tarde/"" (MF)
          const rgLockId = ag.rg_lock_id || ag.rg_norm || ""; // ✅ importante

          if (!agendaId || !data) throw new Error("DADOS_INVALIDOS");

          // 1) devolve vaga no counter
          const cRef = doc(db, "counters", counterDocId(agendaId, data));
          const cSnap = await tx.get(cRef);
          const c = cSnap.exists() ? cSnap.data() : { total:0, manha:0, tarde:0 };

          let total = c.total || 0;
          let manha = c.manha || 0;
          let tarde = c.tarde || 0;

          const temControlePorTurno =
            (typeof c.manha === "number" || typeof c.tarde === "number") &&
            (ag.tipoAgenda === "TS" || turno === "Manhã" || turno === "Tarde");

          if (temControlePorTurno && (turno === "Manhã" || turno === "Tarde")) {
            if (turno === "Manhã") manha = Math.max(0, manha - 1);
            if (turno === "Tarde") tarde = Math.max(0, tarde - 1);
            tx.set(cRef, { manha, tarde }, { merge:true });
          } else {
            total = Math.max(0, total - 1);
            tx.set(cRef, { total }, { merge:true });
          }

          // 2) deleta lock do RG
          if (rgLockId){
            const lockRef = doc(db, "rg_locks", String(rgLockId));
            tx.delete(lockRef);
          }

          // 3) deleta agendamento
          tx.delete(agRef);
        });

        showOk("✅ Agendamento excluído, vaga devolvida e RG liberado.");
        await carregarTabela();
      } catch(e){
        console.error(e);
        showErr("❌ Não foi possível excluir.");
      }
    }

    // Excluir vários (em sequência, com feedback)
    btnExcluirSelecionados.addEventListener("click", async () => {
      if (selectedIds.size === 0) return;

      const ok = confirm(`Excluir ${selectedIds.size} agendamento(s)?\n(A vaga voltará e o RG será liberado)`);
      if (!ok) return;

      btnExcluirSelecionados.disabled = true;
      btnExcluirSelecionados.textContent = "Excluindo...";

      let success = 0;
      let fail = 0;

      // processa um a um (seguro e simples)
      for (const id of Array.from(selectedIds)){
        try{
          await excluirEDevolverVagaELiberarRG(id);
          success++;
        }catch{
          fail++;
        }
      }

      selectedIds.clear();
      atualizarBotaoExcluirSelecionados();
      btnExcluirSelecionados.textContent = "Excluir selecionados";

      if (fail === 0) showOk(`✅ ${success} excluído(s).`);
      else showErr(`⚠️ Excluídos: ${success} | Falharam: ${fail}.`);
    });

    // =========================
    // EXPORTAR EXCEL (.xlsx)
    // =========================
    btnExportar.addEventListener("click", () => {
      try{
        if (!cacheAgendamentos.length){
          alert("Não há dados para exportar.");
          return;
        }

        const rows = cacheAgendamentos.map(a => ({
          "Data": a.data_br || "",
          "Turno": a.turno || "",
          "Unidade": a.unidade || "",
          "Nome": a.nome || "",
          "RG": a.rg || "",
          "Posto/Grad": a.posto || "",
          "E-mail": a.email || "",
          "AgendaID": a.agendaId || "",
          "TipoAgenda": a.tipoAgenda || "",
          "Data(YYYY-MM-DD)": a.data || "",
          "DocID": a.id || ""
        }));

        const ws = XLSX.utils.json_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Agendamentos");

        const uni = filtroUnidade.value ? filtroUnidade.value.replace(/[^\w]+/g,"_") : "TODAS_UNIDADES";
        const filename = `agendamentos_${uni}_${new Date().toISOString().slice(0,10)}.xlsx`;

        XLSX.writeFile(wb, filename);
        showOk("✅ Excel exportado com sucesso.");
      } catch(e){
        console.error(e);
        showErr("❌ Não foi possível exportar o Excel.");
      }
    });
  </script>
</body>
</html>
