<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ADM - INSPEÇÃO CBA X (CORRIGIDO)</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #8b0000; --secondary: #b8860b; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; border-radius: 8px; border-bottom: 5px solid var(--secondary); }
        .stat-card { background: white; padding: 20px; border-radius: 12px; border-left: 8px solid var(--primary); text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin: 20px 0; }
        .stat-card strong { display: block; font-size: 32px; color: #333; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        th { background: #f1f1f1; padding: 15px; text-align: left; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        .btn-sync { background: #007bff; color: white; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>PAINEL ADM - CBA X</h1>
    <p>Busca em Agendamentos e Agendamentos_Medica</p>
</header>

<div class="stat-card">
    <span>Total de Registros Encontrados</span>
    <strong id="contador">0</strong>
    <p id="status-conexao" style="color: green; font-weight: bold;">Pronto para sincronizar.</p>
</div>

<div style="margin-bottom: 20px; display: flex; gap: 10px;">
    <button class="btn-sync" onclick="carregarDados()">🔄 BUSCAR TODAS AS MARCAÇÕES</button>
    <button onclick="exportarExcel()" style="background:#28a745; color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:bold;">📊 EXPORTAR EXCEL</button>
</div>

<table>
    <thead>
        <tr>
            <th>Local</th>
            <th>Data</th>
            <th>Nome</th>
            <th>RG</th>
            <th>Unidade</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody id="tabelaCorpo">
        <tr><td colspan="6" style="text-align:center; padding: 40px;">Clique no botão azul para buscar os dados.</td></tr>
    </tbody>
</table>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function carregarDados() {
        const tabela = document.getElementById("tabelaCorpo");
        const status = document.getElementById("status-conexao");
        const contador = document.getElementById("contador");
        
        status.innerText = "Buscando em todas as coleções...";
        tabela.innerHTML = "";
        let total = 0;

        try {
            // Buscamos nas duas pastas que você tem no Firebase
            const colecoes = ["agendamentos", "agendamentos_medica"];
            
            for (const col of colecoes) {
                const snap = await db.collection(col).get();
                snap.forEach(doc => {
                    const d = doc.data();
                    total++;
                    tabela.innerHTML += `
                        <tr>
                            <td><span style="font-size:10px; color:gray;">[${col}]</span> ${d.localInspecao || '---'}</td>
                            <td>${d.data_br || '---'}</td>
                            <td><strong>${(d.nome || '---').toUpperCase()}</strong></td>
                            <td>${d.rg || '---'}</td>
                            <td>${d.unidadeMilitar || '---'}</td>
                            <td><button onclick="excluirRegistro('${col}', '${doc.id}', '${d.rg}')" style="color:red; background:none; border:none; cursor:pointer;">🗑️</button></td>
                        </tr>
                    `;
                });
            }

            contador.innerText = total;
            status.innerText = "Sincronização concluída!";
            if(total === 0) tabela.innerHTML = "<tr><td colspan='6' style='text-align:center;'>Nenhum dado encontrado nas pastas agendamentos ou agendamentos_medica.</td></tr>";

        } catch (error) {
            status.innerText = "Erro: " + error.message;
        }
    }

    async function excluirRegistro(colecao, id, rg) {
        if (confirm("Excluir definitivamente?")) {
            await db.collection(colecao).doc(id).delete();
            if(rg) await db.collection("rg_locks").doc(rg).delete(); // Ajustado para sua pasta rg_locks
            carregarDados();
        }
    }

    function exportarExcel() {
        const wb = XLSX.utils.table_to_book(document.querySelector("table"));
        XLSX.writeFile(wb, "Relatorio_Geral_CBAX.xlsx");
    }

    window.onload = carregarDados;
</script>
</body>
</html>
