<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADM - Inspeção Médica 2026</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
    :root { 
        --primary: #8b0000; 
        --secondary: #b8860b;
        --bg: #f8f9fa;
    }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
    header { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--secondary); }
    .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    .stats-row { display: flex; gap: 20px; margin-bottom: 25px; }
    .stat-card { background: white; padding: 20px; border-radius: 12px; flex: 1; border-left: 8px solid var(--primary); text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .stat-card span { font-size: 13px; color: #666; font-weight: bold; }
    .stat-card strong { display: block; font-size: 32px; color: #333; margin-top: 5px; }
    .controls { background: white; padding: 15px 25px; border-radius: 12px; display: flex; gap: 15px; align-items: center; margin-bottom: 20px; }
    button { padding: 10px 18px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .btn-refresh { background: #007bff; color: white; }
    .btn-export { background: #28a745; color: white; }
    .btn-danger { background: #dc3545; color: white; display: none; }
    .table-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f1f1f1; padding: 15px; text-align: left; font-size: 11px; color: #444; border-bottom: 2px solid #ddd; }
    td { padding: 12px 15px; font-size: 14px; border-bottom: 1px solid #eee; }
    .badge-local { background: #fff3cd; color: #856404; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 10px; }
    .btn-delete { color: #dc3545; background: none; border: none; cursor: pointer; font-size: 18px; }
</style>
</head>
<body>

<header>
    <h1>Painel de Controle CBA X</h1>
    <p>Gestão de Agendamentos - Inspeção de Saúde 2026</p>
</header>

<div class="container">
    <div class="stats-row">
        <div class="stat-card">
            <span>Total de Inscritos</span>
            <strong id="contador">0</strong>
        </div>
        <div class="stat-card">
            <span>Status da Conexão</span>
            <strong id="db-status" style="color:green; font-size: 18px;">CONECTADO</strong>
        </div>
    </div>

    <div class="controls">
        <button class="btn-refresh" onclick="carregarDados()">🔄 Sincronizar Banco</button>
        <button id="btnExcluirMassa" class="btn-danger" onclick="excluirSelecionados()">
            🗑️ Excluir Selecionados (<span id="numSel">0</span>)
        </button>
        <div style="flex-grow:1;"></div>
        <button class="btn-export" onclick="exportarExcel()">📊 Exportar Planilha</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th><input type="checkbox" id="selecionarTodos" onclick="toggleTodos()"></th>
                    <th>Local</th>
                    <th>Data</th>
                    <th>Turno</th>
                    <th>Nome do Militar</th>
                    <th>RG</th>
                    <th>Lotação</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela">
                <tr><td colspan="8" style="text-align:center; padding: 50px;">Aguardando sincronização...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    async function carregarDados() {
        const tabela = document.getElementById("tabela");
        const contador = document.getElementById("contador");
        const status = document.getElementById("db-status");
        
        tabela.innerHTML = "<tr><td colspan='8' style='text-align:center;'>Lendo Firebase...</td></tr>";

        try {
            // Lendo a coleção principal
            const snap = await db.collection("agendamentos_inspecao").get();
            
            let docs = [];
            snap.forEach(doc => {
                docs.push({ id: doc.id, ...doc.data() });
            });

            // Ordenar por data (DD/MM/AAAA)
            docs.sort((a, b) => {
                const dateA = a.data_br ? a.data_br.split('/').reverse().join('') : '';
                const dateB = b.data_br ? b.data_br.split('/').reverse().join('') : '';
                return dateA.localeCompare(dateB);
            });

            tabela.innerHTML = "";
            let total = 0;

            docs.forEach(d => {
                total++;
                tabela.innerHTML += `
                    <tr>
                        <td><input type="checkbox" class="checkItem" value="${d.id}" data-rg="${d.rg}" onchange="atualizarBotaoMassa()"></td>
                        <td><span class="badge-local">${d.localInspecao || "N/A"}</span></td>
                        <td>${d.data_br || "---"}</td>
                        <td>${d.turno || "Geral"}</td>
                        <td><strong>${(d.nome || "SEM NOME").toUpperCase()}</strong></td>
                        <td>${d.rg || "---"}</td>
                        <td>${d.unidadeMilitar || "---"}</td>
                        <td>
                            <button class="btn-delete" onclick="excluirIndividual('${d.id}','${d.nome}', '${d.rg}')">🗑️</button>
                        </td>
                    </tr>
                `;
            });

            contador.innerText = total;
            status.innerText = "CONECTADO (" + total + ")";
            status.style.color = "green";

            if (total === 0) {
                tabela.innerHTML = "<tr><td colspan='8' style='text-align:center;'>Nenhum registro encontrado no banco.</td></tr>";
            }

        } catch (e) {
            console.error(e);
            status.innerText = "ERRO DE LEITURA";
            status.style.color = "red";
            alert("Erro ao ler banco: Verifique se as Regras do Firestore permitem leitura.");
        }
    }

    function toggleTodos() {
        const master = document.getElementById("selecionarTodos");
        document.querySelectorAll(".checkItem").forEach(cb => cb.checked = master.checked);
        atualizarBotaoMassa();
    }

    function atualizarBotaoMassa() {
        const selecionados = document.querySelectorAll(".checkItem:checked").length;
        const btn = document.getElementById("btnExcluirMassa");
        document.getElementById("numSel").innerText = selecionados;
        btn.style.display = selecionados > 0 ? "flex" : "none";
    }

    async function excluirIndividual(id, nome, rg) {
        if (confirm("Excluir " + nome + "? O RG " + rg + " será liberado para novo agendamento.")) {
            try {
                await db.collection("agendamentos_inspecao").doc(id).delete();
                if(rg) await db.collection("rg_locks_inspecao").doc(rg).delete();
                carregarDados();
            } catch (e) { alert("Erro: " + e.message); }
        }
    }

    async function excluirSelecionados() {
        const checks = document.querySelectorAll(".checkItem:checked");
        if (confirm("Excluir " + checks.length + " registros?")) {
            for (let cb of checks) {
                const id = cb.value;
                const rg = cb.getAttribute('data-rg');
                await db.collection("agendamentos_inspecao").doc(id).delete();
                if(rg) await db.collection("rg_locks_inspecao").doc(rg).delete();
            }
            carregarDados();
        }
    }

    function exportarExcel() {
        const table = document.querySelector("table");
        const wb = XLSX.utils.table_to_book(table);
        XLSX.writeFile(wb, "Relatorio_CBAX_2026.xlsx");
    }

    window.onload = carregarDados;
</script>
</body>
</html>
