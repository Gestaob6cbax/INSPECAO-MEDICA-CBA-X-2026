<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM - Inspeção Médica 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        header { background: #d32f2f; color: white; padding: 20px; text-align: center; border-bottom: 5px solid #0a2c6d; }
        .container { max-width: 1400px; margin: 25px auto; padding: 0 20px; }
        .stats-row { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; flex: 1; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 6px solid #d32f2f; text-align: center; }
        .controls { background: white; padding: 15px; border-radius: 10px; display: flex; gap: 10px; align-items: center; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-box { padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 250px; }
        button { padding: 10px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-refresh { background: #0a2c6d; color: white; }
        .btn-export { background: #2e7d32; color: white; }
        .table-container { background: white; border-radius: 10px; overflow-x: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f3f4; padding: 12px; text-align: left; font-size: 11px; border-bottom: 2px solid #ddd; }
        td { padding: 10px 12px; font-size: 13px; border-bottom: 1px solid #eee; }
        .import-box { margin-top: 30px; padding: 25px; background: #fff3f3; border-radius: 10px; border: 2px dashed #d32f2f; }
        textarea { width: 100%; height: 120px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <h1>Painel ADM - Inspeção Médica 2026</h1>
    <p>CBA X - JUNTA DE SAÚDE MILITAR</p>
</header>

<div class="container">
    <div class="stats-row">
        <div class="stat-card"><span>Total de Inspecionados</span><br><strong id="contador" style="font-size:24px;">0</strong></div>
        <div class="stat-card"><span>Status do Sistema</span><br><strong id="db-status" style="color:green; font-size:16px;">ONLINE</strong></div>
    </div>

    <div class="controls">
        <input type="text" id="busca" class="search-box" placeholder="Buscar Militar ou RG..." onkeyup="filtrar()">
        
        <select id="filtroUnidade" style="padding:10px; border-radius:6px;" onchange="filtrar()">
            <option value="">Todas Unidades</option>
            <option value="CBA X">CBA X</option>
            <option value="1º GMAR">1º GMAR</option>
            <option value="4º GMAR">4º GMAR</option>
            <option value="DBM 4/M">DBM 4/M</option>
            <option value="DBM 5/M">DBM 5/M</option>
        </select>

        <button class="btn-refresh" onclick="carregarDados()">🔄 Atualizar Lista</button>
        <div style="flex-grow: 1;"></div>
        <button class="btn-export" onclick="exportar()">📊 Exportar Excel</button>
    </div>

    <div class="table-container">
        <table id="tabelaDados">
            <thead>
                <tr>
                    <th>Local Inspeção</th>
                    <th>Data / Turno</th>
                    <th>Militar</th>
                    <th>RG</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="corpoTabela">
                <tr><td colspan="5" style="text-align:center; padding:30px;">Carregando dados...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="import-box">
        <h3>📥 Importar do Excel (Sincronizar Vagas)</h3>
        <p style="font-size: 13px; color: #555;">Copie do Excel: <b>Data | Turno | Unidade | Nome | RG</b> e cole abaixo:</p>
        <textarea id="dadosExcelMed" placeholder="Cole os dados aqui..."></textarea>
        <button onclick="importarMed()" style="background: #0a2c6d; color: white; margin-top: 15px; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold;">
            🚀 Sincronizar 531 Militares e Bloquear Vagas
        </button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function carregarDados() {
        const tabela = document.getElementById("corpoTabela");
        try {
            const snap = await db.collection("agendamentos_saude").orderBy("data", "asc").get();
            let html = "";
            let cont = 0;

            snap.forEach(doc => {
                const d = doc.data();
                cont++;
                html += `<tr>
                    <td><span style="background:#ffebee; color:#c62828; padding:3px 6px; border-radius:4px; font-weight:bold; font-size:10px;">${d.unidadeID}</span></td>
                    <td><strong>${d.data}</strong><br><small>${d.turno}</small></td>
                    <td>${d.nome}</td>
                    <td>${d.rg}</td>
                    <td><button style="color:red; background:none; border:none; cursor:pointer;" onclick="excluirUnico('${doc.id}')">🗑️</button></td>
                </tr>`;
            });

            tabela.innerHTML = html || "<tr><td colspan='5' style='text-align:center;'>Nenhum registro.</td></tr>";
            document.getElementById("contador").innerText = cont;
        } catch (e) { console.error(e); }
    }

    async function importarMed() {
        const texto = document.getElementById("dadosExcelMed").value;
        if (!texto.trim()) return alert("Cole os dados primeiro.");
        const linhas = texto.split('\n');
        let importados = 0;

        for (let linha of linhas) {
            const col = linha.split('\t'); 
            if (col.length >= 5) {
                await db.collection("agendamentos_saude").add({
                    data: col[0].trim(),
                    turno: col[1].trim(),
                    unidadeID: col[2].trim(), // DEVE SER EXATAMENTE "CBA X"
                    nome: col[3].trim().toUpperCase(),
                    rg: col[4].trim(),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                importados++;
            }
        }
        alert(`${importados} militares sincronizados!`);
        carregarDados();
        document.getElementById("dadosExcelMed").value = "";
    }

    function filtrar() {
        const busca = document.getElementById("busca").value.toUpperCase();
        const uni = document.getElementById("filtroUnidade").value.toUpperCase();
        const rows = document.querySelectorAll("#corpoTabela tr");
        rows.forEach(r => {
            const texto = r.innerText.toUpperCase();
            r.style.display = (texto.includes(busca) && texto.includes(uni)) ? "" : "none";
        });
    }

    async function excluirUnico(id) {
        if(confirm("Excluir agendamento?")) {
            await db.collection("agendamentos_saude").doc(id).delete();
            carregarDados();
        }
    }

    function exportar() {
        const wb = XLSX.utils.table_to_book(document.getElementById("tabelaDados"));
        XLSX.writeFile(wb, "Relatorio_Inspecao_CBAX.xlsx");
    }

    window.onload = carregarDados;
</script>
</body>
</html>
