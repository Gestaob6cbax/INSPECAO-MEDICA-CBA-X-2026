<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel ADM - Inspeção Médica 2026</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { 
            --cba-red: #b71c1c; 
            --cba-blue: #0a2c6d; 
            --bg: #f4f7f6;
            --success: #27ae60;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 15px; }

        header { 
            background: white; padding: 15px; border-radius: 12px; display: flex; 
            justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-left: 8px solid var(--cba-red); margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
        }

        .header-info h1 { margin: 0; color: var(--cba-blue); font-size: 1.4rem; }
        
        .card-destaque-geral {
            background: var(--cba-blue); color: white; padding: 15px; border-radius: 12px;
            text-align: center; margin-bottom: 20px;
        }
        .card-destaque-geral p { margin: 5px 0 0; font-size: 2.5rem; font-weight: bold; }

        .grid-cards { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 12px; margin-bottom: 20px; 
        }
        
        .card-unidade, .card-polo { 
            background: white; padding: 12px; border-radius: 10px; text-align: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .card-unidade { border-bottom: 4px solid var(--cba-red); }
        .card-polo { border-bottom: 4px solid #0288d1; }
        
        .card-unidade h4, .card-polo h4 { font-size: 0.7rem; color: #777; margin: 0; text-transform: uppercase; }
        .card-unidade p, .card-polo p { font-size: 1.5rem; font-weight: bold; color: #333; margin: 5px 0 0; }

        .controls-box { 
            background: white; padding: 15px; border-radius: 12px; display: flex; 
            gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
        }
        #lupa { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }

        .btn { padding: 10px 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white; }
        .btn-excel { background: var(--success); }
        .btn-refresh { background: var(--cba-blue); }
        .btn-danger { background: var(--cba-red); }

        .table-container { background: white; border-radius: 12px; overflow-x: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; font-size: 0.75rem; color: #666; border-bottom: 2px solid #eee; }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 0.85rem; }

        .badge-turno { padding: 3px 7px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .manha { background: #fff3e0; color: #e65100; }
        .tarde { background: #e3f2fd; color: #0d47a1; }

        .import-box { background: #fff; padding: 20px; border-radius: 12px; margin-top: 30px; border: 2px dashed #bbb; }
        textarea { width: 100%; height: 80px; margin: 10px 0; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" width="50">
        <div class="header-info">
            <h1>Gestão de Inspeção Médica</h1>
            <p style="margin:0; color:#888; font-size:0.8rem;">CBA X - 2026</p>
        </div>
    </div>
    <div style="display: flex; gap: 8px;">
        <button class="btn btn-excel" onclick="baixarPlanilha()">📥 Excel</button>
        <button class="btn btn-danger" onclick="resetarTudo()">⚠️ Resetar</button>
    </div>
</header>

<div class="card-destaque-geral">
    <h3>Total de Militares em Inspeção</h3>
    <p id="totalGeral">0</p>
</div>

<div id="gridUnidades" class="grid-cards"></div>
<div id="gridPolos" class="grid-cards"></div>

<div class="controls-box">
    <input type="text" id="lupa" placeholder="🔍 Pesquisar por Posto, Nome, RG ou Unidade..." onkeyup="filtrar()">
    <button class="btn btn-refresh" onclick="carregarDados()">🔄 Atualizar</button>
</div>

<div class="table-container">
    <table id="tabelaADM">
        <thead>
            <tr>
                <th>Data</th>
                <th>Turno</th>
                <th>Posto/Grad</th>
                <th>Militar (Nome)</th>
                <th>RG</th>
                <th>Origem</th>
                <th>Telefone</th>
                <th>E-mail</th>
                <th>Local Inspeção</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            <tr><td colspan="10" style="text-align:center; padding:20px;">Sincronizando registros...</td></tr>
        </tbody>
    </table>
</div>

<div class="import-box">
    <h4 style="margin:0; color: var(--success);">📥 Importar Dados do Excel</h4>
    <p style="font-size:0.75rem; color:#666;">Ordem esperada: Data | Turno | Local | Origem | Nome | Posto | RG | Tel | Email</p>
    <textarea id="textoExcel" placeholder="Cole as linhas aqui..."></textarea>
    <button class="btn btn-refresh" style="width: 100%; background: var(--success);" onclick="importarDados()">🚀 Sincronizar Agora</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function carregarDados() {
        const corpo = document.getElementById("corpoTabela");
        try {
            const snap = await db.collection("agendamentos_saude").get();
            let lista = [];
            let unidadesMap = {};
            let polosMap = {};

            snap.forEach(doc => {
                const d = doc.data();
                lista.push({id: doc.id, ...d});
                unidadesMap[d.unidadeOrigem] = (unidadesMap[d.unidadeOrigem] || 0) + 1;
                polosMap[d.unidadeDestino] = (polosMap[d.unidadeDestino] || 0) + 1;
            });

            lista.sort((a,b) => b.data.localeCompare(a.data));

            let html = "";
            lista.forEach(d => {
                const classeTurno = d.turno === "Manhã" ? "manha" : "tarde";
                html += `<tr>
                    <td><b>${d.data}</b></td>
                    <td><span class="badge-turno ${classeTurno}">${d.turno}</span></td>
                    <td><b>${d.posto || 'N/I'}</b></td>
                    <td>${d.nome}</td>
                    <td><code>${d.rg}</code></td>
                    <td>${d.unidadeOrigem}</td>
                    <td>${d.telefone || '-'}</td>
                    <td><small>${d.email || '-'}</small></td>
                    <td>${d.unidadeDestino}</td>
                    <td><button style="cursor:pointer; border:none; background:none;" onclick="excluirRegistro('${d.id}')">🗑️</button></td>
                </tr>`;
            });

            corpo.innerHTML = html || '<tr><td colspan="10" style="text-align:center;">Nenhum registro encontrado.</td></tr>';
            document.getElementById("totalGeral").innerText = lista.length;

            renderCards("gridUnidades", unidadesMap, "card-unidade");
            renderCards("gridPolos", polosMap, "card-polo");

        } catch (e) { console.error(e); }
    }

    function renderCards(id, map, classe) {
        let html = "";
        Object.keys(map).sort().forEach(key => {
            if(key !== "undefined") html += `<div class="${classe}"><h4>${key}</h4><p>${map[key]}</p></div>`;
        });
        document.getElementById(id).innerHTML = html;
    }

    async function importarDados() {
        const texto = document.getElementById("textoExcel").value;
        const linhas = texto.split('\n');
        let contador = 0;

        for(let l of linhas) {
            const c = l.split('\t');
            if(c.length >= 7) {
                await db.collection("agendamentos_saude").add({
                    data: c[0]?.trim(),
                    turno: c[1]?.trim(),
                    unidadeDestino: c[2]?.trim(),
                    unidadeOrigem: c[3]?.trim(),
                    nome: c[4]?.trim().toUpperCase(),
                    posto: c[5]?.trim().toUpperCase(),
                    rg: c[6]?.trim(),
                    telefone: c[7]?.trim() || "N/I",
                    email: c[8]?.trim() || "N/I",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                contador++;
            }
        }
        alert(contador + " militares adicionados com sucesso!");
        document.getElementById("textoExcel").value = "";
        carregarDados();
    }

    async function excluirRegistro(id) {
        if(confirm("Deseja excluir este registro permanentemente?")) {
            await db.collection("agendamentos_saude").doc(id).delete();
            carregarDados();
        }
    }

    async function resetarTudo() {
        if(confirm("🚨 ALERTA: Esta ação apagará TODOS os dados. Deseja continuar?")) {
            const snap = await db.collection("agendamentos_saude").get();
            const batch = db.batch();
            snap.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
            alert("Banco de dados resetado.");
            carregarDados();
        }
    }

    function filtrar() {
        const busca = document.getElementById("lupa").value.toUpperCase();
        const rows = document.querySelectorAll("#corpoTabela tr");
        rows.forEach(r => r.style.display = r.innerText.toUpperCase().includes(busca) ? "" : "none");
    }

    function baixarPlanilha() {
        const wb = XLSX.utils.table_to_book(document.getElementById("tabelaADM"));
        XLSX.writeFile(wb, "Relatorio_Inspecao_Medica_2026.xlsx");
    }

    window.onload = carregarDados;
</script>
</body>
</html>
