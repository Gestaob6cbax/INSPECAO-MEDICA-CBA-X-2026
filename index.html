<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSPEÇÃO DE SAÚDE 2026 - CBA X</title>

<style>
:root { --primary:#8b0000; --secondary:#ff0000; --bg:#f2f2f2; }

body{
font-family:'Segoe UI',sans-serif;
background:var(--bg);
margin:0;
padding:0;
}

.header-top{
background:linear-gradient(180deg,#9b0000 0%,#720000 100%);
color:white;
padding:30px 15px;
text-align:center;
border-bottom:5px solid #ff0000;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.header-top img{
max-width:100px;
margin-bottom:15px;
}

.header-top h2{
margin:0;
font-size:20px;
text-transform:uppercase;
}

.container{
max-width:450px;
margin:-20px auto 50px;
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
font-size:11px;
text-transform:uppercase;
}

input,select{
width:100%;
padding:14px;
margin-bottom:20px;
border-radius:8px;
border:1px solid #ccc;
background:#fafafa;
}

.btn-main{
background:var(--primary);
color:#fff;
border:none;
padding:18px;
width:100%;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

#vagasInfo{
padding:12px;
border-radius:8px;
text-align:center;
font-weight:bold;
margin-bottom:20px;
display:none;
}

.vagas-ok{
background:#eaffea;
color:#28a745;
border:1px solid #28a745;
}

.vagas-full{
background:#ffeaea;
color:#8b0000;
border:1px solid #8b0000;
}

</style>
</head>

<body>

<div class="header-top">
<img src="logo_cba_x.png">
<h2>INSPEÇÃO DE SAÚDE 2026</h2>
<p>COMANDO DE BOMBEIROS DE ÁREA - CBA X</p>
</div>

<div class="container">

<form id="formAgendamento">

<label>Nome Completo</label>
<input type="text" id="nome" required>

<label>RG Militar</label>
<input type="text" id="rg" required>

<label>Celular</label>
<input type="tel" id="telefone" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Local da Inspeção</label>

<select id="unidade" required>

<option value="">Selecione</option>

<option value="CER + 2º GMAR">CER + 2º GMAR - Barra</option>
<option value="3º GMAR">3º GMAR - Copacabana</option>
<option value="DBM 5/M">DBM5/M - Sepetiba</option>
<option value="CBA X">CBA X - Salvamento Marítimo</option>
<option value="1º GMAR + DBM1/M + DBM2/M">1º GMAR + DBM1/M + DBM2/M</option>
<option value="4º GMAR + DBM6/M">4º GMAR + DBM6/M</option>
<option value="DBM4/M + DBM3/M">DBM4/M + DBM3/M</option>

</select>

<label>Data</label>

<select id="dataSelect"></select>

<div id="campoTurno" style="display:none;">

<label>Turno</label>

<select id="turno">

<option value="">Selecione</option>
<option value="Manhã">Manhã</option>
<option value="Tarde">Tarde</option>

</select>

</div>

<div id="vagasInfo"></div>

<button class="btn-main" id="btnAgendar">
Finalizar Agendamento
</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"inspecao-saude-cbax.firebaseapp.com",
projectId:"inspecao-saude-cbax"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const unidade=document.getElementById("unidade");
const dataSelect=document.getElementById("dataSelect");
const turno=document.getElementById("turno");
const campoTurno=document.getElementById("campoTurno");
const vagasInfo=document.getElementById("vagasInfo");

const REGRAS={

"CER + 2º GMAR":{inicio:"2026-02-23",fim:"2026-07-31",dias:[1,2,3,4,5],vagas:5,turno:false},

"3º GMAR":{inicio:"2026-02-23",fim:"2026-07-31",dias:[1,2,3,4,5],vagas:5,turno:false},

"DBM 5/M":{inicio:"2026-02-23",fim:"2026-03-06",dias:[2,5],vagas:10,turno:true},

"CBA X":{inicio:"2026-03-10",fim:"2026-03-13",dias:[2,5],vagas:10,turno:true},

"1º GMAR + DBM1/M + DBM2/M":{inicio:"2026-03-17",fim:"2026-05-15",dias:[2,5],vagas:7,turno:true},

"4º GMAR + DBM6/M":{inicio:"2026-05-19",fim:"2026-06-26",dias:[2,5],vagas:7,turno:true},

"DBM4/M + DBM3/M":{inicio:"2026-06-30",fim:"2026-07-31",dias:[2,5],vagas:7,turno:true}

};

unidade.onchange=()=>{

dataSelect.innerHTML="";

const r=REGRAS[unidade.value];

campoTurno.style.display=r.turno?"block":"none";

let d=new Date(r.inicio);
const fim=new Date(r.fim);

while(d<=fim){

if(r.dias.includes(d.getDay())){

let iso=d.toISOString().split("T")[0];
let br=iso.split("-").reverse().join("/");

dataSelect.add(new Option(br,br));

}

d.setDate(d.getDate()+1);

}

};

async function conferirVagas(){

const local=unidade.value;
const data=dataSelect.value;
const t=REGRAS[local].turno?turno.value:"Geral";

if(!local||!data)return;

const q=query(
collection(db,"agendamentos_inspecao"),
where("localInspecao","==",local),
where("data_br","==",data),
where("turno","==",t)
);

const snap=await getDocs(q);

const usadas=snap.size;
const limite=REGRAS[local].vagas;

vagasInfo.style.display="block";

if(usadas>=limite){

vagasInfo.className="vagas-full";
vagasInfo.innerHTML=`❌ ESGOTADO (${limite} vagas já preenchidas)`;

}else{

const restantes=limite-usadas;

vagasInfo.className="vagas-ok";
vagasInfo.innerHTML=`✅ ${restantes} vagas restantes`;

}

}

dataSelect.onchange=conferirVagas;
turno.onchange=conferirVagas;

document.getElementById("formAgendamento").addEventListener("submit",async(e)=>{

e.preventDefault();

const nome=document.getElementById("nome").value;
const rg=document.getElementById("rg").value;
const telefone=document.getElementById("telefone").value;
const email=document.getElementById("email").value;
const local=unidade.value;
const data=dataSelect.value;
const t=REGRAS[local].turno?turno.value:"Geral";

await addDoc(collection(db,"agendamentos_inspecao"),{

nome:nome,
rg:rg,
telefone:telefone,
email:email,
localInspecao:local,
data_br:data,
turno:t

});

alert("Agendamento realizado com sucesso!");

location.reload();

});

</script>

</body>
</html>
