<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INSPEÇÃO DE SAÚDE – CBA X</title>
    <style>
        :root {
            --primary: #8b0000;
            --secondary: #ff0000;
            --bg: #f8f9fa;
            --text: #2d3436;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            margin:0; padding:0; color: var(--text);
        }

        /* HEADER PREMIUM */
        .header-top { 
            background: linear-gradient(135deg, #8b0000 0%, #4a0000 100%);
            color: white; 
            padding: 40px 10px; 
            text-align: center; 
            border-bottom: 6px solid var(--secondary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .header-top img { 
            max-width: 100px; 
            margin-bottom: 15px; 
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5)); 
        }
        .header-top h2 { 
            margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; font-weight: 800;
        }
        .header-top p { margin: 5px 0 0; opacity: 0.9; font-weight: 300; }

        /* CONTAINER COM EFEITO PREMIUM */
        .container { 
            max-width: 550px; 
            margin: -50px auto 60px; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; color: var(--primary); text-transform: uppercase; }

        input, select { 
            width:100%; padding:15px; margin-bottom:20px; 
            border-radius:12px; border: 2px solid #eee; 
            font-size:16px; box-sizing:border-box; transition: all 0.3s ease;
            background: #fdfdfd;
        }
        input:focus, select:focus { 
            border-color: var(--primary); outline: none; 
            box-shadow: 0 0 15px rgba(139,0,0,0.1); 
            background: #fff;
        }

        /* BOTÃO PREMIUM */
        button { 
            background: var(--primary); color:#fff; border:none; 
            cursor:pointer; font-weight:bold; font-size: 17px; 
            text-transform: uppercase; padding: 18px; border-radius: 12px;
            transition: all 0.4s; letter-spacing: 1px;
            box-shadow: 0 8px 15px rgba(139,0,0,0.3);
        }
        button:hover { 
            background: #a00000; transform: translateY(-3px); 
            box-shadow: 0 12px 20px rgba(139,0,0,0.4); 
        }
        button:active { transform: translateY(-1px); }
        button:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        #avisoAgenda { 
            display:none; background:#fff5f5; border-left: 5px solid var(--secondary); 
            padding:15px; border-radius:8px; margin-bottom:20px; 
            font-size:14px; color:#c53030; font-weight: 600; 
        }
        
        /* COMPROVANTE PREMIUM */
        #comprovanteBox { 
            display:none; text-align:left; background: #fff; 
            border-radius:20px; padding:30px; border: 2px dashed #d1d1d1;
            position: relative;
        }
        #comprovanteBox::before {
            content: "✓"; position: absolute; top: 10px; right: 20px;
            font-size: 80px; color: rgba(40, 167, 69, 0.1);
        }
        #comprovanteBox h3 { 
            margin:0 0 20px 0; color: #28a745; text-align: center; 
            font-size: 22px; border-bottom: 1px solid #eee; padding-bottom: 15px;
        }
        .linha { margin:15px 0; font-size: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #f9f9f9; padding-bottom: 8px; }
        .linha b { color: var(--primary); }
        
        .protocolo { 
            background: #f4f4f4; padding: 15px; border-radius: 10px; 
            text-align: center; font-family: 'Courier New', Courier, monospace;
            font-weight: bold; font-size: 18px; color: #333; margin: 20px 0;
            border: 1px solid #ddd;
        }

        @media print {
            body { background:#fff; }
            .container { max-width:100%; margin:0; box-shadow: none; border: none; }
            form, .header-top, #avisoAgenda, .no-print { display:none !important; }
            #comprovanteBox { display:block !important; border: 2px solid #000; }
        }
    </style>
</head>
