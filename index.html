<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSPEÇÃO DE SAÚDE 2026 - CBA X</title>

<style>
:root { --primary: #8b0000; --secondary: #b8860b; --bg: #f4f7f6; }
body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin:0; padding:0; }

.header-top{
background: linear-gradient(135deg,#9b0000 0%,#720000 100%);
color:white;
padding:30px;
text-align:center;
border-bottom:5px solid var(--secondary);
}

.header-top img{max-width:100px;margin-bottom:10px;}

.main-content{display:flex;justify-content:center;padding:40px 20px;}

.form-container{
width:100%;
max-width:500px;
background:#fff;
padding:35px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.form-group{margin-bottom:20px;}

label{
display:block;
margin-bottom:8px;
font-weight:700;
font-size:11px;
text-transform:uppercase;
color:var(--primary);
}

input,select{
width:100%;
padding:14px;
border-radius:8px;
border:1px solid #ddd;
box-sizing:border-box;
font-size:15px;
}

.btn-main{
background-color:var(--primary);
color:#fff;
border:none;
padding:18px;
width:100%;
border-radius:8px;
font-weight:700;
cursor:pointer;
text-transform:uppercase;
}

.btn-main:disabled{background:#ccc;}

#vagasInfo{
padding:12px;
border-radius:8px;
text-align:center;
font-weight:700;
margin-bottom:20px;
display:none;
}

.vagas-ok{background:#eaffea;color:#28a745;border:1px solid #c3e6cb;}
.vagas-full{background:#ffeaea;color:#8b0000;border:1px solid #f5c6cb;}

#comprovante{
display:none;
background:#fff;
padding:25px;
border:2px dashed var(--primary);
border-radius:12px;
text-align:center;
}

.ticket-info{
text-align:left;
margin:20px 0;
background:#f9f9f9;
padding:15px;
border-radius:8px;
}

.ticket-info p{
margin:8px 0;
font-size:14px;
border-bottom:1px solid #eee;
padding-bottom:4px;
}

</style>
</head>

<body>

<div class="header-top">
<img src="logo_cba_x.png">
<h2>INSPEÇÃO DE SAÚDE 2026</h2>
<p>CBA X - COMANDO DE BOMBEIROS DE ÁREA</p>
</div>

<div class="main-content">

<div class="form-container">

<form id="formAgendamento">

<div class="form-group">
<label>Unidade do Militar</label>
<select id="unidadeMilitar" required>
<option value="">Selecione sua unidade</option>
<option value="1º GMAR">1º GMAR</option>
<option value="2º GMAR">2º GMAR</option>
<option value="3º GMAR">3º GMAR</option>
<option value="4º GMAR">4º GMAR</option>
<option value="DBM1/M">DBM1/M</option>
<option value="DBM2/M">DBM2/M</option>
<option value="DBM3/M">DBM3/M</option>
<option value="DBM4/M">DBM4/M</option>
<option value="DBM5/M">DBM5/M</option>
<option value="DBM6/M">DBM6/M</option>

<option value="CER">CER</option>

</select>
</div>
  
<label>Nome Completo</label>
<input type="text" id="nome" required>
</div>

<div class="form-group">
<label>RG Militar</label>
<input type="text" id="rg" required>
</div>

<div class="form-group">
<label>Celular</label>
<input type="tel" id="telefone" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Local da Inspeção</label>

<select id="unidade" required>

<option value="">Selecione</option>

<option value="CER + 2º GMAR">CER + 2º GMAR - Barra</option>
<option value="3º GMAR">3º GMAR - Copacabana</option>
<option value="DBM 5/M">DBM5/M - Sepetiba</option>
<option value="CBA X">CBA X - Salvamento Marítimo</option>
<option value="1º GMAR + DBM1/M + DBM2/M">1º GMAR + DBM1/M + DBM2/M</option>
<option value="4º GMAR + DBM6/M">4º GMAR + DBM6/M</option>
<option value="DBM4/M + DBM3/M">DBM4/M + DBM3/M</option>

</select>
</div>

<div class="form-group">
<label>Data</label>
<select id="dataSelect"></select>
</div>

<div id="campoTurno" class="form-group" style="display:none;">
<label>Turno</label>

<select id="turno">
<option value="">Selecione</option>
<option value="Manhã">Manhã</option>
<option value="Tarde">Tarde</option>
</select>

</div>

<div id="vagasInfo"></div>

<button type="submit" class="btn-main" id="btnAgendar">
Finalizar Agendamento
</button>

</form>

<div id="comprovante">
<h3 style="color:#28a745;">AGENDAMENTO CONFIRMADO</h3>
<div class="ticket-info" id="dadosComprovante"></div>
<button class="btn-main" onclick="window.print()">Imprimir</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
addDoc,
doc,
getDoc,
setDoc
}
from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";


const firebaseConfig={
apiKey:"AIzaSy...",
authDomain:"inspecao-saude-cbax.firebaseapp.com",
projectId:"inspecao-saude-cbax"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const unidade=document.getElementById("unidade");
const dataSelect=document.getElementById("dataSelect");
const turno=document.getElementById("turno");
const campoTurno=document.getElementById("campoTurno");
const vagasInfo=document.getElementById("vagasInfo");
const btnAgendar=document.getElementById("btnAgendar");


const REGRAS={

"CER + 2º GMAR":{inicio:"2026-02-23",fim:"2026-07-31",dias:[1,2,3,4,5],vagas:5,turno:false},

"3º GMAR":{inicio:"2026-02-23",fim:"2026-07-31",dias:[1,2,3,4,5],vagas:5,turno:false},

"DBM 5/M":{inicio:"2026-02-23",fim:"2026-03-06",dias:[2,5],vagas:10,turno:true},

"CBA X":{inicio:"2026-03-10",fim:"2026-03-13",dias:[2,5],vagas:10,turno:true},

"1º GMAR + DBM1/M + DBM2/M":{inicio:"2026-03-17",fim:"2026-05-15",dias:[2,5],vagas:7,turno:true},

"4º GMAR + DBM6/M":{inicio:"2026-05-19",fim:"2026-06-26",dias:[2,5],vagas:7,turno:true},

"DBM4/M + DBM3/M":{inicio:"2026-06-30",fim:"2026-07-31",dias:[2,5],vagas:7,turno:true}

};


unidade.onchange=()=>{

dataSelect.innerHTML="";

const r=REGRAS[unidade.value];

campoTurno.style.display=r.turno?"block":"none";

let d=new Date(r.inicio);
const fim=new Date(r.fim);

while(d<=fim){

if(r.dias.includes(d.getDay())){

let br=d.toISOString().split("T")[0].split("-").reverse().join("/");

dataSelect.add(new Option(br,br));

}

d.setDate(d.getDate()+1);

}

};



async function conferirVagas(){

const local=unidade.value;
const data=dataSelect.value;

if(!local||!data)return;

const turnoFinal=REGRAS[local].turno?turno.value:"Geral";


const q1=query(collection(db,"agendamentos_inspecao"),
where("localInspecao","==",local),
where("data_br","==",data),
where("turno","==",turnoFinal)
);

const q2=query(collection(db,"agendamentos"),
where("unidade","==",local),
where("data","==",data),
where("turno","==",turnoFinal)
);

const [snap1,snap2]=await Promise.all([getDocs(q1),getDocs(q2)]);

const usadas=snap1.size+snap2.size;

const limite=REGRAS[local].vagas;

const restantes=limite-usadas;

vagasInfo.style.display="block";

if(restantes<=0){

vagasInfo.className="vagas-full";
vagasInfo.innerHTML="❌ ESGOTADO";

btnAgendar.disabled=true;

}else{

vagasInfo.className="vagas-ok";
vagasInfo.innerHTML=`✅ ${restantes} vagas restantes`;

btnAgendar.disabled=false;

}

}

dataSelect.onchange=conferirVagas;
turno.onchange=conferirVagas;



document.getElementById("formAgendamento").addEventListener("submit",async(e)=>{

e.preventDefault();

const nome=document.getElementById("nome").value.toUpperCase();
const rg=document.getElementById("rg").value;
const telefone=document.getElementById("telefone").value;
const email=document.getElementById("email").value;
const local=unidade.value;
const data=dataSelect.value;
const turnoFinal=REGRAS[local].turno?turno.value:"Geral";


const lockRef=doc(db,"rg_locks_inspecao",rg);
const lock=await getDoc(lockRef);

if(lock.exists()){
alert("RG já agendado");
return;
}


await addDoc(collection(db,"agendamentos_inspecao"),{

nome:nome,
rg:rg,
telefone:telefone,
email:email,
localInspecao:local,
data_br:data,
turno:turnoFinal

});

await setDoc(lockRef,{rg:rg});


document.getElementById("formAgendamento").style.display="none";
document.getElementById("comprovante").style.display="block";

document.getElementById("dadosComprovante").innerHTML=`

<p><b>Nome:</b> ${nome}</p>
<p><b>RG:</b> ${rg}</p>
<p><b>Telefone:</b> ${telefone}</p>
<p><b>Email:</b> ${email}</p>
<p><b>Local:</b> ${local}</p>
<p><b>Data:</b> ${data}</p>
<p><b>Turno:</b> ${turnoFinal}</p>

`;

});

</script>

</body>
</html>
