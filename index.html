<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento 2026 - CBA X</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .form-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; border-top: 8px solid #0a2c6d; }
        h2 { color: #0a2c6d; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        input, select { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #0a2c6d; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #001a4d; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>Agendamento Odontológico 2026</h2>
    
    <label>Posto/Graduação</label>
    <select id="posto" required>
        <option value="">Selecione...</option>
        <option value="Cel">Coronel</option>
        <option value="Ten Cel">Tenente Coronel</option>
        <option value="Maj">Major</option>
        <option value="Cap">Capitão</option>
        <option value="1º Ten">1º Tenente</option>
        <option value="2º Ten">2º Tenente</option>
        <option value="Subten">Subtenente</option>
        <option value="1º Sgt">1º Sargento</option>
        <option value="2º Sgt">2º Sargento</option>
        <option value="3º Sgt">3º Sargento</option>
        <option value="Cb">Cabo</option>
        <option value="Sd">Soldado</option>
    </select>

    <label>Nome Completo</label>
    <input type="text" id="nome" placeholder="Digite seu nome completo" required>

    <label>RG Militar</label>
    <input type="number" id="rg" placeholder="Somente números" required>

    <label>Unidade de Origem (Onde serve)</label>
    <input type="text" id="unidadeServe" placeholder="Ex: 2º GMAR, CBA X, etc" required>

    <label>Local da Inspeção (Onde quer ser atendido)</label>
    <select id="unidade" required>
        <option value="">Selecione o local...</option>
        <option value="1GMAR">1º GMAR - BOTAFOGO</option>
        <option value="2GMAR">2º GMAR - BARRA</option>
        <option value="3GMAR">3º GMAR - COPACABANA</option>
        <option value="4GMAR">4º GMAR - ITAIPU</option>
    </select>

    <label>Data Escolhida</label>
    <input type="date" id="data" required>

    <label>Horário</label>
    <input type="time" id="horario" required>

    <button onclick="salvarAgendamento()">Confirmar Agendamento</button>
</div>

<script>
    // Configuração do Firebase (A mesma do seu banco funcional)
    const firebaseConfig = {
        apiKey: "AIzaSyD3Z8mJPvGrRzwpYLymAXYcRQat2ccUqVM",
        authDomain: "agendamento-odonto-cbax.firebaseapp.com",
        projectId: "agendamento-odonto-cbax",
        storageBucket: "agendamento-odonto-cbax.firebasestorage.app",
        messagingSenderId: "545212689993",
        appId: "1:545212689993:web:b4b85a03bb2dcac9739998"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function salvarAgendamento() {
        const dados = {
            posto: document.getElementById("posto").value,
            nome: document.getElementById("nome").value,
            rg: document.getElementById("rg").value,
            unidadeServe: document.getElementById("unidadeServe").value,
            unidade: document.getElementById("unidade").value,
            data: document.getElementById("data").value,
            horario: document.getElementById("horario").value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (!dados.nome || !dados.rg || !dados.unidade) {
            alert("Por favor, preencha todos os campos obrigatórios.");
            return;
        }

        try {
            await db.collection("agendamentos").add(dados);
            alert("Agendamento realizado com sucesso!");
            location.reload(); // Limpa o formulário
        } catch (error) {
            console.error("Erro ao salvar: ", error);
            alert("Erro ao salvar agendamento. Tente novamente.");
        }
    }
</script>

</body>
</html>
