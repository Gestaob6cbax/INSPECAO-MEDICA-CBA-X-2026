<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspeção Médica 2026 - CBA X</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --cba-red: #b71c1c;
            --cba-vinho: #8e1616;
            --cba-blue: #0a2c6d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .premium-card {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 10px solid var(--cba-red);
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        header img {
            width: 80px;
        }

        .section-title {
            background: var(--cba-red);
            color: white;
            padding: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 5px;
            margin: 20px 0 10px;
            text-transform: uppercase;
            text-align: center;
        }

        label {
            display: block;
            margin-top: 12px;
            font-weight: bold;
            color: #333;
            font-size: 0.85rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 2px solid #dfe4ea;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .vagas-badge {
            margin-top: 10px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            display: none;
            font-size: 0.9rem;
        }

        .vagas-ok {
            background: #e8f5e9;
            color: #1b5e20;
            border: 1px solid #c8e6c9;
        }

        .vagas-esgotado {
            background: #ffebee;
            color: #b71c1c;
            border: 1px solid #ffcdd2;
        }

        .btn-confirmar {
            background: linear-gradient(135deg, var(--cba-red) 0%, var(--cba-vinho) 100%);
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            text-transform: uppercase;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-confirmar:disabled {
            background: #ccc !important;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #comprovante {
            display: none;
            text-align: center;
            padding: 20px;
            border: 3px dashed var(--cba-red);
            border-radius: 15px;
            background: #fff;
            margin-top: 10px;
        }

        @media print {
            .btn-confirmar,
            .section-title,
            header,
            button,
            .vagas-badge,
            label,
            input,
            select {
                display: none !important;
            }

            #comprovante {
                display: block !important;
                border: 2px solid #000;
                padding: 30px;
            }
        }
    </style>
</head>
<body>

<div class="premium-card">
    <header>
        <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" alt="CBA X">
        <h2 style="color: var(--cba-blue); margin: 10px 0;">Inspeção Médica 2026</h2>
        <p style="font-size: 0.85rem; font-weight: bold; color: #555;">CBA X - 6ª SEÇÃO</p>
    </header>

    <div id="form-content">
        <div class="section-title">Dados do Militar</div>

        <label>Unidade de Origem</label>
        <select id="unidadeOrigem">
            <option value="">Selecione a Unidade...</option>
            <option value="CBA X">CBA X</option>
            <option value="CER">CER</option>
            <option value="1º GMAR">1º GMAR - Botafogo</option>
            <option value="2º GMAR">2º GMAR - Barra da Tijuca</option>
            <option value="3º GMAR">3º GMAR - Copacabana</option>
            <option value="4º GMAR">4º GMAR - Itaipu</option>
            <option value="DBM 1/M">DBM 1/M - Paquetá</option>
            <option value="DBM 2/M">DBM 2/M - Piscinão de Ramos</option>
            <option value="DBM 3/M">DBM 3/M - Recreio dos Bandeirantes</option>
            <option value="DBM 4/M">DBM 4/M - Barra de Guaratiba</option>
            <option value="DBM 5/M">DBM 5/M - Sepetiba</option>
            <option value="DBM 6/M">DBM 6/M</option>
        </select>

        <label>Posto/Graduação</label>
        <select id="posto">
            <option value="">Selecione...</option>
            <option>SD BM</option>
            <option>CB BM</option>
            <option>3º SGT BM</option>
            <option>2º SGT BM</option>
            <option>1º SGT BM</option>
            <option>SUBTEN BM</option>
            <option>2º TEN BM</option>
            <option>1º TEN BM</option>
            <option>CAP BM</option>
            <option>MAJ BM</option>
            <option>TEN CEL BM</option>
            <option>CEL BM</option>
        </select>

        <label>Nome Completo</label>
        <input type="text" id="nome" placeholder="NOME SEM ABREVIAÇÕES" oninput="this.value = this.value.toUpperCase()">

        <label>RG Militar</label>
        <input type="number" id="rg" placeholder="DIGITE SEU RG">

        <label>E-mail</label>
        <input type="email" id="email" placeholder="email@exemplo.com">

        <label>Telefone / WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(21) 99999-9999">

        <div class="section-title">Local e Data da Inspeção</div>

        <label>Local da Inspeção</label>
        <select id="unidadeDestino" onchange="gerarDatas()">
            <option value="">Selecione o local...</option>
            <option value="CBA X">CBA X</option>
            <option value="CER X">CER + 2º GMAR</option>
            <option value="1º GMAR">1º GMAR + DBM 1/M + DBM 2/M</option>
            <option value="3º GMAR">3º GMAR</option>
            <option value="4º GMAR">4º GMAR + DBM 6/M</option>
            <option value="DBM 3/M">DBM 3/M + DBM 4/M</option>
            <option value="DBM 5/M">DBM 5/M (ENCERRADO)</option>
        </select>

        <label>Data Disponível</label>
        <select id="data" onchange="verificarVagas()">
            <option value="">Selecione o local primeiro...</option>
        </select>

        <div id="divTurno" style="display:none;">
            <label>Turno</label>
            <select id="turno" onchange="verificarVagas()">
                <option value="Manhã">Manhã (08:00 às 12:00)</option>
                <option value="Tarde">Tarde (13:00 às 17:00)</option>
            </select>
        </div>

        <div id="statusVagas" class="vagas-badge"></div>

        <button id="btnSalvar" class="btn-confirmar" onclick="salvar()" disabled>
            Confirmar Agendamento
        </button>
    </div>

    <div id="comprovante">
        <div style="color: var(--cba-vinho); font-weight: bold; font-size: 1.2rem; margin-bottom: 15px;">
            ✅ AGENDAMENTO MÉDICO CONFIRMADO
        </div>
        <p id="res-nome" style="font-weight: bold; color: var(--cba-blue); font-size: 1.1rem;"></p>
        <p id="res-info" style="font-size: 0.95rem; color: #333; line-height: 1.6; white-space: pre-line;"></p>
        <button class="btn-confirmar" onclick="window.print()">🖨️ IMPRIMIR / SALVAR PDF</button>
        <button onclick="location.reload()" style="background:none; border:none; color:blue; cursor:pointer; text-decoration:underline; font-size: 0.8rem; margin-top: 15px;">
            Realizar outro agendamento
        </button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const REGRAS = {
        "CER X":  { inicio: "2026-02-23", fim: "2026-07-31", dias: [1,2,3,4,5], vagas: 5, turno: false },
        "3º GMAR": { inicio: "2026-02-23", fim: "2026-07-31", dias: [1,2,3,4,5], vagas: 5, turno: false },
        "DBM 5/M": { inicio: "2026-02-23", fim: "2026-03-06", dias: [2,5], vagas: 0, turno: false },
        "CBA X":   { inicio: "2026-03-10", fim: "2026-03-13", dias: [2,5], vagas: 10, turno: true },
        "1º GMAR": { inicio: "2026-03-17", fim: "2026-05-15", dias: [2,5], vagas: 7, turno: true },
        "4º GMAR": { inicio: "2026-05-19", fim: "2026-06-26", dias: [2,5], vagas: 7, turno: true },
        "DBM 3/M": { inicio: "2026-06-30", fim: "2026-07-31", dias: [2,5], vagas: 7, turno: true }
    };

    const FERIADOS = new Set([
        "2026-01-01",
        "2026-02-17",
        "2026-04-03",
        "2026-04-21",
        "2026-05-01",
        "2026-06-04",
        "2026-09-07",
        "2026-10-12",
        "2026-11-02",
        "2026-11-15",
        "2026-11-20",
        "2026-12-25",
        "2026-12-31"
    ]);

    function gerarDatas() {
        const uni = document.getElementById("unidadeDestino").value;
        const selData = document.getElementById("data");
        const divT = document.getElementById("divTurno");
        const badge = document.getElementById("statusVagas");
        const btn = document.getElementById("btnSalvar");

        selData.innerHTML = '<option value="">Selecione...</option>';
        badge.style.display = "none";
        badge.innerText = "";
        btn.disabled = true;

        if (!uni || !REGRAS[uni]) return;

        const r = REGRAS[uni];
        divT.style.display = r.turno ? "block" : "none";

        let atual = new Date(r.inicio + "T12:00:00");
        let fim = new Date(r.fim + "T12:00:00");

        while (atual <= fim) {
            const diaSemana = atual.getDay();
            const dataISO = atual.toISOString().split("T")[0];

            if (r.dias.includes(diaSemana) && !FERIADOS.has(dataISO)) {
                const dStr = atual.toLocaleDateString("pt-BR");
                const opt = document.createElement("option");
                opt.value = dStr;
                opt.innerText = dStr;
                selData.appendChild(opt);
            }

            atual.setDate(atual.getDate() + 1);
        }
    }

    async function verificarVagas() {
        const uni = document.getElementById("unidadeDestino").value;
        const dt = document.getElementById("data").value;
        const turno = document.getElementById("turno").value;
        const badge = document.getElementById("statusVagas");
        const btn = document.getElementById("btnSalvar");

        if (!uni || !dt) {
            badge.style.display = "none";
            btn.disabled = true;
            return;
        }

        const partesData = dt.split("/");
        const dataISO = `${partesData[2]}-${partesData[1]}-${partesData[0]}`;

        if (FERIADOS.has(dataISO)) {
            badge.style.display = "block";
            badge.innerText = "❌ ESTA DATA É FERIADO";
            badge.className = "vagas-badge vagas-esgotado";
            btn.disabled = true;
            return;
        }

        badge.style.display = "block";
        badge.innerText = "🔍 Consultando disponibilidade...";
        badge.className = "vagas-badge";
        btn.disabled = true;

        const r = REGRAS[uni];

        if (r.vagas === 0) {
            badge.innerText = "❌ VAGAS ENCERRADAS PARA ESTA UNIDADE";
            badge.className = "vagas-badge vagas-esgotado";
            return;
        }

        let query = db.collection("agendamentos_saude")
            .where("unidadeDestino", "==", uni)
            .where("data", "==", dt);

        if (r.turno) {
            query = query.where("turno", "==", turno);
        }

        try {
            const snap = await query.get();
            const ocupadas = snap.size;
            const restam = r.vagas - ocupadas;

            if (restam <= 0) {
                badge.innerText = "❌ ESGOTADO";
                badge.className = "vagas-badge vagas-esgotado";
                btn.disabled = true;
            } else {
                badge.innerText = `✅ RESTAM ${restam} VAGAS`;
                badge.className = "vagas-badge vagas-ok";
                btn.disabled = false;
            }
        } catch (e) {
            console.error("Erro ao verificar vagas:", e);
            badge.innerText = "⚠️ Erro ao verificar vagas.";
            badge.className = "vagas-badge vagas-esgotado";
            btn.disabled = true;
        }
    }

    async function salvar() {
        const btn = document.getElementById("btnSalvar");
        const rg = document.getElementById("rg").value.trim();
        const data = document.getElementById("data").value;
        const uniDestino = document.getElementById("unidadeDestino").value;
        const uniOrigem = document.getElementById("unidadeOrigem").value;
        const nome = document.getElementById("nome").value.toUpperCase().trim();
        const posto = document.getElementById("posto").value;
        const r = REGRAS[uniDestino];

        if (!posto || !nome || !rg || !data || !uniOrigem || !uniDestino) {
            alert("⚠️ Por favor, preencha todos os campos obrigatórios!");
            return;
        }

        const partes = data.split("/");
        const dataISO = `${partes[2]}-${partes[1]}-${partes[0]}`;

        if (FERIADOS.has(dataISO)) {
            alert("❌ Esta data é feriado e não pode ser selecionada.");
            btn.innerText = "Confirmar Agendamento";
            btn.disabled = true;
            return;
        }

        btn.innerText = "⏳ PROCESSANDO...";
        btn.disabled = true;

        try {
            const consultaRG = await db.collection("agendamentos_saude")
                .where("rg", "==", rg)
                .get();

            if (!consultaRG.empty) {
                alert(`❌ ERRO: Este RG (${rg}) já possui um agendamento.`);
                btn.innerText = "Confirmar Agendamento";
                btn.disabled = false;
                return;
            }

            let query = db.collection("agendamentos_saude")
                .where("unidadeDestino", "==", uniDestino)
                .where("data", "==", data);

            if (r.turno) {
                query = query.where("turno", "==", document.getElementById("turno").value);
            }

            const snap = await query.get();

            if (snap.size >= r.vagas) {
                alert("❌ Não há mais vagas disponíveis para esta data/turno.");
                btn.innerText = "Confirmar Agendamento";
                btn.disabled = true;
                await verificarVagas();
                return;
            }

            const d = {
                unidadeOrigem: uniOrigem,
                origem: uniOrigem,
                posto: posto,
                nome: nome,
                rg: rg,
                email: document.getElementById("email").value || "Não informado",
                telefone: document.getElementById("telefone").value || "Não informado",
                unidadeDestino: uniDestino,
                unidadeID: uniDestino,
                data: data,
                dataISO: dataISO,
                turno: r.turno ? document.getElementById("turno").value : "Único",
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            await db.collection("agendamentos_saude").add(d);

            document.getElementById("form-content").style.display = "none";
            document.getElementById("comprovante").style.display = "block";
            document.getElementById("res-nome").innerText = `${d.posto} ${d.nome}`;
            document.getElementById("res-info").innerText =
                `FINALIDADE: INSPEÇÃO MÉDICA 2026\nRG: ${d.rg} | Local: ${d.unidadeDestino}\nData: ${d.data} | Turno: ${d.turno}`;

        } catch (e) {
            console.error("Erro ao salvar:", e);
            alert("⚠️ Erro ao salvar!");
            btn.innerText = "Confirmar Agendamento";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
