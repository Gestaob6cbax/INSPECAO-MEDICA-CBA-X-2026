<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INSPEÇÃO MÉDICA 2026 – CBA X</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background:#f2f4f8; margin:0; padding:40px 15px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 800px; width: 100%; background:#fff; padding:40px; border-radius:15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 10px solid #8b0000; }
        .logo { max-width:160px; display: block; margin: 0 auto 20px; }
        h2 { color: #8b0000; text-align: center; margin-bottom: 5px; text-transform: uppercase; font-size: 24px; }
        .sub { text-align: center; color: #666; margin-bottom: 30px; font-size: 18px; }

        .grid-campos { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: left; }
        .campo-cheio { grid-column: span 2; }

        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; font-size: 14px; }
        input, select, button { width:100%; padding:14px; border-radius:8px; border:2px solid #dce1e8; font-size:16px; box-sizing:border-box; }
        
        button { background:#8b0000; color:#fff; border:none; cursor:pointer; font-weight:bold; font-size: 18px; text-transform: uppercase; margin-top: 20px; transition: 0.3s; }
        button:hover { background:#a00000; transform: translateY(-2px); }
        button:disabled { opacity:0.6; cursor: not-allowed; }

        #avisoAgenda { display:none; background:#fff3cd; border:1px solid #ffeeba; padding:15px; border-radius:10px; margin:10px 0; font-size:14px; color:#856404; line-height:1.4; grid-column: span 2; }
        
        #comprovanteBox { display:none; text-align:left; background:#f8fafc; border:2px solid #8b0000; border-radius:12px; padding:30px; margin-top:20px; }
        #comprovanteBox h3 { margin:0 0 20px 0; color: #8b0000; border-bottom: 2px solid #eee; padding-bottom: 10px; text-align: center; }
        .linha { margin:12px 0; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 6px; display: flex; justify-content: space-between; }
        
        @media (max-width: 600px) { .grid-campos { grid-template-columns: 1fr; } .campo-cheio { grid-column: span 1; } }
        @media print { .container { box-shadow: none; border: none; padding: 0; } form, h2, .sub, .logo, #avisoAgenda { display:none !important; } #comprovanteBox { display:block !important; border:none; width: 100% !important; } .btn-print { display: none; } }
    </style>
</head>
<body>

<div class="container">
    <img src="logo_cba_x.png" alt="Logo CBA X" class="logo" onerror="this.style.display='none'">
    <h2>Inspeção Médica 2026</h2>
    <p class="sub">Sistema de Agendamento – CBA X</p>

    <form id="formAgendamento">
        <div class="grid-campos">
            <div class="campo-cheio">
                <label>Nome Completo</label>
                <input type="text" id="nome" placeholder="Nome sem abreviações" required />
            </div>

            <div>
                <label>RG Militar</label>
                <input type="text" id="rg" placeholder="Apenas números" required />
            </div>

            <div>
                <label>Posto / Graduação</label>
                <select id="posto" required>
                    <option value="">Selecione...</option>
                    <option>SD BM</option><option>CB BM</option><option>3º SGT BM</option>
                    <option>2º SGT BM</option><option>1º SGT BM</option><option>SUBTEN BM</option>
                    <option>2º TEN BM</option><option>1º TEN BM</option><option>CAP BM</option>
                    <option>MAJ BM</option><option>TEN CEL BM</option><option>CEL BM</option>
                </select>
            </div>

            <div class="campo-cheio">
                <label>Unidade onde serve</label>
                <select id="unidadeServe" required>
                    <option value="">Selecione sua unidade...</option>
                    <option>CBA X (Sede)</option><option>1º GMar - Botafogo</option>
                    <option>2º GMar - Barra da Tijuca</option><option>3º GMar - Copacabana</option>
                    <option>4º GMar - Itaipu</option><option>DBM 1/M - Paquetá</option>
                    <option>DBM 2/M - Ramos</option><option>DBM 3/M - Recreio</option>
                    <option>DBM 4/M - Guaratiba</option><option>DBM 5/M - Sepetiba</option>
                    <option>DBM 6/M - Itaipu</option><option>CER</option><option>Outra</option>
                </select>
            </div>

            <div class="campo-cheio">
                <label>Local da Inspeção (Onde quer ser atendido)</label>
                <select id="unidade" required>
                    <option value="">Selecione o local...</option>
                    <option>CER</option>
                    <option>2º GMar - Barra da Tijuca</option>
                    <option>3º GMar - Copacabana</option>
                    <option>DBM 5/M - Sepetiba</option>
                    <option>CBA X</option>
                    <option>1º GMar - Botafogo</option>
                    <option>DBM 1/M - Paquetá</option>
                    <option>DBM 2/M - Piscinão de Ramos</option>
                    <option>4º GMar - Itaipu</option>
                    <option>DBM 6/M - Itaipu</option>
                    <option>DBM 3/M - Recreio (Realizado no recreio)</option>
                    <option>DBM 4/M - Barra de Guaratiba</option>
                </select>
            </div>

            <div id="avisoAgenda">⚠️ <b>ATENÇÃO:</b> Esta unidade atende apenas às <b>TERÇAS e SEXTAS</b>.</div>

            <div>
                <label>Data Disponível</label>
                <select id="dataSelect" required><option value="">Escolha o local primeiro</option></select>
            </div>

            <div id="campoTurno" style="display:none;">
                <label>Turno</label>
                <select id="turno">
                    <option value="Manhã">Manhã (07:30 - 12:00)</option>
                    <option value="Tarde">Tarde (13:00 - 17:30)</option>
                </select>
            </div>

            <div class="campo-cheio">
                <button type="submit" id="btnAgendar">Confirmar Agendamento</button>
            </div>
        </div>
    </form>

    <div id="comprovanteBox">
        <h3>✅ AGENDAMENTO CONFIRMADO</h3>
        <div class="linha"><b>Militar:</b> <span id="cNome"></span></div>
        <div class="linha"><b>RG:</b> <span id="cRg"></span></div>
        <div class="linha"><b>Local:</b> <span id="cUnidade"></span></div>
        <div class="linha"><b>Data:</b> <span id="cData"></span></div>
        <div class="linha"><b>Turno/Horário:</b> <span id="cTurno"></span></div>
        <div class="linha" style="border:none; margin-top:20px;">
            <button type="button" class="btn-print" onclick="window.print()" style="background:#4b5563;">🖨️ Imprimir</button>
            <button type="button" class="btn-print" onclick="location.reload()">Sair</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const AGENDAS = [
        { tipo:"MF", inicio:"2026-02-23", fim:"2026-07-31", unidades:["CER","2º GMar - Barra da Tijuca","3º GMar - Copacabana"] },
        { tipo:"TS", inicio:"2026-02-23", fim:"2026-03-06", unidades:["DBM 5/M - Sepetiba"] },
        { tipo:"TS", inicio:"2026-03-10", fim:"2026-03-13", unidades:["CBA X"] },
        { tipo:"TS", inicio:"2026-03-17", fim:"2026-05-15", unidades:["1º GMar - Botafogo","DBM 1/M - Paquetá","DBM 2/M - Piscinão de Ramos"] },
        { tipo:"TS", inicio:"2026-05-19", fim:"2026-06-26", unidades:["4º GMar - Itaipu","DBM 6/M - Itaipu"] },
        { tipo:"TS", inicio:"2026-06-30", fim:"2026-07-31", unidades:["DBM 3/M - Recreio (Realizado no recreio)","DBM 4/M - Barra de Guaratiba"] }
    ];

    const uniEl = document.getElementById("unidade");
    const dataEl = document.getElementById("dataSelect");
    const aviso = document.getElementById("avisoAgenda");
    const campoT = document.getElementById("campoTurno");

    uniEl.addEventListener("change", () => {
        dataEl.innerHTML = '<option value="">Selecione a Data</option>';
        const agenda = AGENDAS.find(a => a.unidades.includes(uniEl.value));
        if (!agenda) return;

        aviso.style.display = (agenda.tipo === "TS") ? "block" : "none";
        campoT.style.display = (agenda.tipo === "TS") ? "block" : "none";

        let d = new Date(agenda.inicio + "T12:00:00");
        const fim = new Date(agenda.fim + "T12:00:00");
        const hoje = new Date(); hoje.setHours(0,0,0,0);

        while (d <= fim) {
            if (d >= hoje) {
                const sem = d.getDay();
                let pode = (agenda.tipo === "TS" && (sem==2 || sem==5)) || (agenda.tipo === "MF" && (sem>=1 && sem<=5));
                if (pode) {
                    const ymd = d.toISOString().split('T')[0];
                    const opt = document.createElement("option");
                    opt.value = ymd; opt.textContent = ymd.split('-').reverse().join('/');
                    dataEl.appendChild(opt);
                }
            }
            d.setDate(d.getDate() + 1);
        }
    });

    document.getElementById("formAgendamento").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnAgendar");
        btn.disabled = true; btn.innerText = "SALVANDO...";

        const dados = {
            nome: document.getElementById("nome").value,
            rg: document.getElementById("rg").value,
            posto: document.getElementById("posto").value,
            unidadeServe: document.getElementById("unidadeServe").value,
            unidade: uniEl.value,
            data: dataEl.value,
            turno: (campoT.style.display === "block") ? document.getElementById("turno").value : "Livre Demanda (Médico de Serviço)",
            criadoEm: serverTimestamp()
        };

        try {
            await addDoc(collection(db, "agendamentos"), dados);
            document.getElementById("cNome").textContent = dados.nome;
            document.getElementById("cRg").textContent = dados.rg;
            document.getElementById("cUnidade").textContent = dados.unidade;
            document.getElementById("cData").textContent = dados.data.split('-').reverse().join('/');
            document.getElementById("cTurno").textContent = dados.turno;
            
            document.getElementById("formAgendamento").style.display = "none";
            document.getElementById("comprovanteBox").style.display = "block";
        } catch (err) {
            alert("Erro ao salvar. Tente novamente.");
            btn.disabled = false; btn.innerText = "Confirmar Agendamento";
        }
    });
</script>
</body>
</html>
