<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - Inspeção Médica 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .form-container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid #d32f2f; }
        header { text-align: center; margin-bottom: 25px; }
        header h2 { color: #d32f2f; margin: 0; font-size: 20px; text-transform: uppercase; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #333; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        
        /* Estilo do Contador de Vagas */
        #statusVagas { 
            margin-top: 15px; 
            padding: 12px; 
            border-radius: 8px; 
            text-align: center; 
            font-weight: bold; 
            display: none; 
            font-size: 14px;
            border: 1px solid transparent;
        }
        .vagas-ok { background-color: #e8f5e9; color: #2e7d32; border-color: #c8e6c9; }
        .vagas-esgotado { background-color: #ffebee; color: #c62828; border-color: #ffcdd2; }
        
        button { 
            width: 100%; 
            background-color: #0a2c6d; 
            color: white; 
            padding: 15px; 
            border: none; 
            border-radius: 8px; 
            margin-top: 25px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            transition: 0.3s;
        }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        button:hover:not(:disabled) { background-color: #051a44; }
        .footer-info { text-align: center; font-size: 11px; color: #777; margin-top: 20px; }
    </style>
</head>
<body>

<div class="form-container">
    <header>
        <h2>Inspeção Médica 2026</h2>
        <p style="font-size: 12px; color: #666;">CBA X - Comando de Bombeiros de Área</p>
    </header>

    <form id="formAgendamento">
        <label>Local da Inspeção</label>
        <select id="unidadeDestino" required onchange="resetarCampos()">
            <option value="">Selecione a Unidade...</option>
            <option value="CBA X (Sede)">CBA X (Sede)</option>
            <option value="GPS (Ilha do Governador)">GPS (Ilha do Governador)</option>
            <option value="1º GMAR">1º GMAR</option>
        </select>

        <label>Data da Inspeção</label>
        <input type="date" id="data" required onchange="liberarTurno()">

        <div id="divTurno" style="display:none;">
            <label>Selecione o Turno</label>
            <select id="turno" required onchange="verificarVagas()">
                <option value="">Escolha o turno...</option>
                <option value="Manhã">Manhã (08:00 às 12:00)</option>
                <option value="Tarde">Tarde (13:00 às 17:00)</option>
            </select>
        </div>

        <div id="statusVagas"></div>

        <hr style="margin-top:20px; border: 0; border-top: 1px solid #eee;">

        <label>RG do Militar</label>
        <input type="number" id="rg" placeholder="Somente números" required>

        <label>Posto/Graduação e Nome Completo</label>
        <input type="text" id="nome" placeholder="Ex: SUBTEN BM FULANO" required>

        <label>E-mail Corporativo/Pessoal</label>
        <input type="email" id="email" placeholder="exemplo@gmail.com" required>

        <label>Telefone/WhatsApp</label>
        <input type="tel" id="telefone" placeholder="(21) 99999-9999" required>

        <button type="submit" id="btnSalvar">CONFIRMAR AGENDAMENTO</button>
    </form>

    <div class="footer-info">Sistema de Controle de Efetivo - 2026</div>
</div>

<script>
    // CONFIGURAÇÃO DO SEU FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function liberarTurno() {
        const data = document.getElementById("data").value;
        if (data) {
            document.getElementById("divTurno").style.display = "block";
            verificarVagas(); // Se mudar a data, re-checa as vagas
        }
    }

    function resetarCampos() {
        document.getElementById("data").value = "";
        document.getElementById("divTurno").style.display = "none";
        document.getElementById("statusVagas").style.display = "none";
    }

    // A LÓGICA DO CONTADOR DE VAGAS
    async function verificarVagas() {
        const uni = document.getElementById("unidadeDestino").value;
        const dt = document.getElementById("data").value;
        const turnoSel = document.getElementById("turno").value;
        const badge = document.getElementById("statusVagas");
        const btn = document.getElementById("btnSalvar");

        if (!uni || !dt || !turnoSel) return;

        badge.style.display = "block";
        badge.className = "";
        badge.style.background = "#f0f0f0";
        badge.innerText = "🔍 Verificando vagas...";
        btn.disabled = true;

        // DEFINIÇÃO DOS LIMITES (Regra: 10 para CBA X, 7 para outros)
        let limiteVagas = 7;
        if (uni.includes("CBA X")) { limiteVagas = 10; }

        try {
            // Consulta no Firebase (inclui os 531 que você importou no ADM)
            const snapshot = await db.collection("agendamentos_saude")
                                     .where("unidadeID", "==", uni)
                                     .where("data", "==", dt)
                                     .where("turno", "==", turnoSel)
                                     .get();

            const ocupadas = snapshot.size;
            const disponiveis = limiteVagas - ocupadas;

            if (disponiveis <= 0) {
                badge.className = "vagas-esgotado";
                badge.innerText = `❌ ESGOTADO para o turno da ${turnoSel.toUpperCase()}`;
                btn.disabled = true;
            } else {
                badge.className = "vagas-ok";
                badge.innerText = `✅ RESTAM ${disponiveis} VAGAS (Turno: ${turnoSel})`;
                btn.disabled = false;
            }
        } catch (e) {
            console.error(e);
            badge.innerText = "⚠️ Erro ao consultar vagas.";
        }
    }

    // SALVAMENTO DOS DADOS
    document.getElementById("formAgendamento").onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnSalvar");
        btn.disabled = true;
        btn.innerText = "PROCESSANDO...";

        const dados = {
            unidadeID: document.getElementById("unidadeDestino").value,
            data: document.getElementById("data").value,
            turno: document.getElementById("turno").value,
            rg: document.getElementById("rg").value,
            nome: document.getElementById("nome").value.toUpperCase(),
            email: document.getElementById("email").value,
            telefone: document.getElementById("telefone").value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            // Verifica se o militar já agendou para este dia (Evita duplicidade)
            const buscaRG = await db.collection("agendamentos_saude")
                                    .where("rg", "==", dados.rg)
                                    .where("data", "==", dados.data)
                                    .get();

            if (!buscaRG.empty) {
                alert("Atenção: Este RG já possui um agendamento para esta data!");
                btn.disabled = false;
                btn.innerText = "CONFIRMAR AGENDAMENTO";
                return;
            }

            await db.collection("agendamentos_saude").add(dados);
            alert("✅ Agendamento realizado com sucesso! Compareça no local e data escolhidos.");
            location.reload();
        } catch (error) {
            alert("Erro ao agendar. Tente novamente.");
            btn.disabled = false;
        }
    };
</script>

</body>
</html>
