<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - Inspeção de Saúde CBA X</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #0b3c5d; --bg: #f2f4f8; }
        body { font-family: Arial, sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { color: var(--primary); }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; margin-top: 25px; font-weight: bold; cursor: pointer; }
        #mensagem { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; font-weight: bold; }
        .sucesso { background: #d4edda; color: #155724; }
        .erro { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Inspeção de Saúde 2026</h2>
        <p>CBA X - Agendamento</p>
    </div>

    <form id="formAgendamento">
        <label>Local da Inspeção:</label>
        <select id="localInspecao" required>
            <option value="">Selecione...</option>
            <option>1º GMar - Botafogo</option>
            <option>2º GMar - Barra da Tijuca</option>
            <option>3º GMar - Copacabana</option>
            <option>4º GMar - Itaipu</option>
            <option>CBA X</option>
        </select>

        <label>Data:</label>
        <input type="date" id="dataInspecao" required>

        <label>Turno:</label>
        <select id="turno" required>
            <option value="Manhã">Manhã</option>
            <option value="Tarde">Tarde</option>
        </select>

        <label>Posto/Graduação:</label>
        <select id="posto" required>
            <option value="">Selecione...</option>
            <option>Coronel</option><option>Tenente-Coronel</option><option>Major</option>
            <option>Capitão</option><option>1º Tenente</option><option>2º Tenente</option>
            <option>Subtenente</option><option>1º Sargento</option><option>2º Sargento</option>
            <option>3º Sargento</option><option>Cabo</option><option>Soldado</option>
        </select>

        <label>RG:</label>
        <input type="number" id="rg" required>

        <label>Nome Completo:</label>
        <input type="text" id="nome" required>

        <label>Unidade em que Serve:</label>
        <select id="unidadeServe" required>
            <option value="">Selecione a sua unidade...</option>
            <option>CBA X (Sede)</option>
            <option>1º GMar - Botafogo</option>
            <option>2º GMar - Barra da Tijuca</option>
            <option>3º GMar - Copacabana</option>
            <option>4º GMar - Itaipu</option>
            <option>DBM 1/M - Paquetá</option>
            <option>DBM 2/M - Piscinão de Ramos</option>
            <option>DBM 3/M - Recreio dos Bandeirantes</option>
            <option>DBM 4/M - Barra de Guaratiba</option>
            <option>DBM 5/M - Sepetiba</option>
            <option>DBM 6/M - Itaipu</option>
            <option>CER</option>
            <option>Outra Unidade</option>
        </select>

        <label>Telefone:</label>
        <input type="tel" id="telefone" required>

        <label>E-mail:</label>
        <input type="email" id="email" required>

        <button type="submit" id="btnEnviar">Confirmar Agendamento</button>
    </form>

    <div id="mensagem"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    document.getElementById("formAgendamento").onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnEnviar");
        const msg = document.getElementById("mensagem");
        btn.disabled = true;

        const dados = {
            unidade: document.getElementById("localInspecao").value,
            data: document.getElementById("dataInspecao").value,
            data_br: document.getElementById("dataInspecao").value.split('-').reverse().join('/'),
            turno: document.getElementById("turno").value,
            posto: document.getElementById("posto").value,
            rg: document.getElementById("rg").value,
            nome: document.getElementById("nome").value.toUpperCase(),
            unidadeServe: document.getElementById("unidadeServe").value, // Captura do Select
            telefone: document.getElementById("telefone").value,
            email: document.getElementById("email").value,
            criadoEm: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            const check = await db.collection("rg_locks").doc(dados.rg).get();
            if (check.exists) throw new Error("RG já agendado.");

            await db.collection("agendamentos").add(dados);
            await db.collection("rg_locks").doc(dados.rg).set({ ocupado: true });

            msg.innerHTML = "✅ Agendado com sucesso!";
            msg.className = "sucesso";
            msg.style.display = "block";
            document.getElementById("formAgendamento").reset();
        } catch (error) {
            msg.innerHTML = "❌ " + error.message;
            msg.className = "erro";
            msg.style.display = "block";
        } finally {
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
