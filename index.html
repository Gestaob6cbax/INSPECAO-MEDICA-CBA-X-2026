<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>INSPEÇÃO DE SAÚDE – CBA X</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f4f8;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 30px auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
    }
    h1 {
      text-align: center;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      font-size: 14px;
    }
    button {
      background: #0b3c5d;
      color: #fff;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background: #092f49;
    }
  </style>
</head>

<body>
<div class="container">
  <h1>INSPEÇÃO DE SAÚDE – CBA X</h1>

  <form id="formAgendamento">

    <input type="text" name="nome" placeholder="Nome completo" required />
    <input type="text" name="rg" placeholder="RG" required />
    <input type="email" name="email" placeholder="E-mail" required />

    <select name="posto" required>
      <option value="">Posto / Graduação</option>
      <option>SDBM</option>
      <option>CB BM</option>
      <option>3º SGT BM</option>
      <option>2º SGT BM</option>
      <option>1º SGT BM</option>
      <option>SUBTEN BM</option>
      <option>2º TEN BM</option>
      <option>1º TEN BM</option>
      <option>CAP BM</option>
      <option>MAJ BM</option>
      <option>TEN CEL BM</option>
      <option>CEL BM</option>
    </select>

    <select name="unidade" required>
      <option value="">Unidade</option>
      <option>1º GMar - Botafogo</option>
      <option>2º GMar - Barra da Tijuca</option>
      <option>3º GMar - Copacabana</option>
      <option>4º GMar - Itaipu</option>
      <option>CBA X</option>
      <option>CER</option>
      <option>DBM 1/M - Paquetá</option>
      <option>DBM 2/M - Piscinão de Ramos</option>
      <option>DBM 3/M - Recreio</option>
      <option>DBM 4/M - Barra de Guaratiba</option>
      <option>DBM 5/M - Sepetiba</option>
      <option>DBM 6/M - Itaipu</option>
    </select>

    <input type="date" name="data" required />

    <select name="turno" required>
      <option value="">Turno</option>
      <option>Manhã</option>
      <option>Tarde</option>
    </select>

    <button type="submit">Agendar Inspeção</button>
  </form>
</div>

<script>
  (function () {
    emailjs.init("SUA_PUBLIC_KEY_AQUI"); // ⚠️ vamos preencher já já
  })();

  document.getElementById("formAgendamento").addEventListener("submit", function (e) {
    e.preventDefault();

    const dados = {
      nome: this.nome.value,
      rg: this.rg.value,
      email: this.email.value,
      posto: this.posto.value,
      unidade: this.unidade.value,
      data: this.data.value,
      turno: this.turno.value
    };

    // EMAIL PARA O ADM
    emailjs.send(
      "service_57r7wmp",
      "TEMPLATE_ADM_ID",
      dados
    );

    // EMAIL PARA O MILITAR
    emailjs.send(
      "service_57r7wmp",
      "TEMPLATE_MILITAR_ID",
      dados
    );

    alert("Agendamento realizado com sucesso! Verifique seu e-mail.");
    this.reset();
  });
</script>

</body>
</html>
