<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Inspeção Médica - CBA X</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        :root { --primary: #8b0000; --secondary: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .form-container { max-width: 600px; background: white; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        h2 { color: var(--primary); text-align: center; margin-top: 0; text-transform: uppercase; font-size: 22px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #444; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: var(--primary); outline: none; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        button:hover { background: #a50000; }
        .msg { padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; display: none; font-weight: bold; }
        .error { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Agendamento 2026<br><small>CBA X - Inspeção Médica</small></h2>
    
    <div id="statusMsg" class="msg"></div>

    <form id="formAgendamento">
        <label>Local da Inspeção</label>
        <select id="unidade" required>
            <option value="">Selecione...</option>
            <option>1º GMar - Botafogo</option>
            <option>2º GMar - Barra da Tijuca</option>
            <option>3º GMar - Copacabana</option>
            <option>4º GMar - Itaipu</option>
            <option>CBA X</option>
            <option>CER</option>
            <option>DBM 1/M - Paquetá</option>
            <option>DBM 2/M - Piscinão de Ramos</option>
            <option>DBM 3/M - Recreio</option>
            <option>DBM 5/M - Sepetiba</option>
        </select>

        <label>Sua Unidade de Origem (Onde serve)</label>
        <input type="text" id="unidadeServe" placeholder="Ex: 2º GMar" required>

        <label>Data da Inspeção</label>
        <input type="date" id="data" required>

        <label>Turno</label>
        <select id="turno" required>
            <option value="Manhã">Manhã (08h às 12h)</option>
            <option value="Tarde">Tarde (13h às 17h)</option>
        </select>

        <label>Nome Completo</label>
        <input type="text" id="nome" placeholder="Nome do militar" required>

        <label>Posto ou Graduação</label>
        <input type="text" id="posto" placeholder="Ex: SUBTEN BM" required>

        <label>RG Militar</label>
        <input type="number" id="rg" placeholder="Somente números" required>

        <button type="submit" id="btnEnviar">Confirmar Agendamento</button>
    </form>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxuNjVbW1FJ5l23Syh9UJJM5xeCpw0H5pOFAHPSO5txkZ1p0LizvJdrtlvyxoKS0Gy6SQ/exec";

    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const form = document.getElementById("formAgendamento");
    const statusMsg = document.getElementById("statusMsg");

    form.onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnEnviar");
        const rgValue = document.getElementById("rg").value;

        btn.disabled = true;
        btn.innerText = "Verificando...";

        try {
            // 1. VERIFICA NO FIREBASE
            const checkFirebase = await db.collection("agendamentos").where("rg", "==", rgValue).get();
            if (!checkFirebase.empty) {
                mostrarMsg("Este RG já possui um agendamento realizado no site.", "error");
                btn.disabled = false;
                btn.innerText = "Confirmar Agendamento";
                return;
            }

            // 2. VERIFICA NA PLANILHA
            const response = await fetch(`${SCRIPT_URL}?action=checkRG&rg=${rgValue}`);
            const result = await response.json();

            if (result.exists) {
                mostrarMsg(`O militar de RG ${rgValue} já consta como agendado na planilha oficial.`, "error");
                btn.disabled = false;
                btn.innerText = "Confirmar Agendamento";
                return;
            }

            // 3. SE NÃO EXISTE, SALVA
            await db.collection("agendamentos").add({
                unidade: document.getElementById("unidade").value,
                unidadeServe: document.getElementById("unidadeServe").value,
                data: document.getElementById("data").value,
                turno: document.getElementById("turno").value,
                nome: document.getElementById("nome").value.toUpperCase(),
                posto: document.getElementById("posto").value.toUpperCase(),
                rg: rgValue,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            mostrarMsg("Agendamento realizado com sucesso!", "success");
            form.reset();

        } catch (err) {
            console.error(err);
            mostrarMsg("Erro ao processar. Tente novamente.", "error");
        } finally {
            btn.disabled = false;
            btn.innerText = "Confirmar Agendamento";
        }
    };

    function mostrarMsg(texto, tipo) {
        statusMsg.innerText = texto;
        statusMsg.className = `msg ${tipo}`;
        statusMsg.style.display = "block";
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
