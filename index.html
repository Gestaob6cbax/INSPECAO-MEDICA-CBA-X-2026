<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspeção Médica 2026 - CBA X</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f9; margin: 0; padding: 0; }
        
        header { 
            background: #8b0000; color: white; text-align: center; 
            padding: 25px 15px; border-bottom: 5px solid #660000;
        }
        header img { width: 90px; height: auto; margin-bottom: 10px; }
        header h1 { font-size: 1.3rem; margin: 5px 0; text-transform: uppercase; }
        header p { margin: 0; font-size: 0.9rem; opacity: 0.9; }

        .container { 
            background: white; width: 94%; max-width: 550px; 
            margin: 20px auto; padding: 25px; 
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        .step { display: none; }
        .step.active { display: block; }

        h2 { font-size: 1.1rem; color: #8b0000; border-bottom: 2px solid #eee; padding-bottom: 8px; margin-top: 0; text-transform: uppercase; }
        label { font-weight: 600; margin-top: 15px; display: block; font-size: 0.9rem; color: #444; }
        input, select { width: 100%; padding: 12px; margin-top: 6px; border: 1px solid #ced4da; border-radius: 8px; font-size: 16px; }

        .aviso-unidade { 
            background: #fff3cd; color: #856404; padding: 12px; 
            border-radius: 8px; border-left: 5px solid #ffc107; 
            margin: 15px 0; font-size: 0.9rem; font-weight: bold; 
        }

        .vagas-box { 
            background: #e6fffa; color: #234e52; padding: 15px; 
            border-radius: 8px; border: 1px solid #b2f5ea; 
            margin: 15px 0; font-size: 1rem; font-weight: bold; text-align: center;
        }
        .lotado { background: #fff5f5 !important; color: #c53030 !important; border-color: #feb2b2 !important; }

        .btn-principal { 
            margin-top: 20px; padding: 18px; background: #8b0000; 
            color: white; border: none; width: 100%; 
            font-size: 17px; font-weight: bold; border-radius: 10px;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-principal:disabled { background: #ccc; cursor: not-allowed; }

        .resumo-item { margin-bottom: 10px; font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .resumo-label { font-weight: bold; color: #333; width: 130px; display: inline-block; }

        @media print {
            header, .btn-principal, .no-print { display: none !important; }
            .container { box-shadow: none; border: none; width: 100%; margin: 0; padding: 0; }
        }
