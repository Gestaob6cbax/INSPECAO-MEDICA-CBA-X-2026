<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INSPEÇÃO MÉDICA 2026 – CBA X</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background:#f4f4f4; margin:0; padding:0; }
        .header-top { background: #8b0000; color: white; padding: 25px 10px; text-align: center; border-bottom: 5px solid #ff0000; margin-bottom: 30px; }
        .header-top img { max-width: 90px; margin-bottom: 10px; }
        .container { max-width: 600px; margin: -40px auto 50px; background:#fff; padding:30px; border-radius:12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); border-top: 4px solid #8b0000; }
        input, select, button { width:100%; padding:14px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd; font-size:15px; box-sizing:border-box; }
        button { background:#8b0000; color:#fff; border:none; cursor:pointer; font-weight:bold; text-transform: uppercase; }
        button:hover { background:#a00000; }
        #vagasInfo { background: #e6fffa; border: 1px solid #b2f5ea; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; color: #2c7a7b; text-align: center; display: none; }
        #comprovanteBox { display:none; background:#fffafa; border:2px solid #f8d7da; border-radius:12px; padding:25px; }
        .linha { margin:10px 0; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .linha b { color: #8b0000; width: 140px; display: inline-block; }
        @media print { .header-top, form, button { display: none !important; } #comprovanteBox { display: block !important; border: none; } }
    </style>
</head>
<body>

<div class="header-top">
    <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" alt="Logo CBA X" />
    <h2>INSPEÇÃO MÉDICA – CBA X</h2>
    <p>Agendamento e Controle de Vagas 2026</p>
</div>

<div class="container">
    <form id="formAgendamento" autocomplete="off">
        <input type="text" id="nome" placeholder="Nome completo" required />
        <input type="text" id="rg" placeholder="RG Militar (Apenas números)" required />
        <input type="tel" id="telefone" placeholder="Telefone / WhatsApp" required />
        <input type="email" id="email" placeholder="E-mail funcional ou pessoal" required />
        
        <select id="posto" required>
            <option value="">Posto / Graduação</option>
            <option>SD BM</option><option>CB BM</option><option>3º SGT BM</option>
            <option>2º SGT BM</option><option>1º SGT BM</option><option>SUBTEN BM</option>
            <option>2º TEN BM</option><option>1º TEN BM</option><option>CAP BM</option>
            <option>MAJ BM</option><option>TEN CEL BM</option><option>CEL BM</option>
        </select>

        <select id="unidade" required>
            <option value="">Selecione o LOCAL da Inspeção</option>
            <option value="CER2GMAR">CER + 2º GMAR (Barra)</option>
            <option value="3GMAR">3º GMAR (Copacabana)</option>
            <option value="DBM5M">DBM 5/M (Sepetiba)</option>
            <option value="CBAX">CBA X (Sede)</option>
            <option value="GRUPO1">1º GMAR + DBM1/M + DBM2/M</option>
            <option value="GRUPO2">4º GMAR + DBM6/M (Itaipu)</option>
            <option value="RECREIO">DBM 3/M + DBM 4/M (No Recreio)</option>
        </select>

        <select id="dataSelect" required><option value="">Selecione a Data</option></select>

        <div id="campoTurno" style="display:none;">
            <select id="turno">
                <option value="">Selecione o Turno</option>
                <option value="Manha">Manhã (Início 07:30)</option>
                <option value="Tarde">Tarde (Início 13:00)</option>
            </select>
        </div>

        <div id="vagasInfo"></div>

        <button type="submit" id="btnAgendar">Confirmar Agendamento</button>
    </form>
    
    <div id="comprovanteBox">
        <h3 style="text-align:center; color:#8b0000;">✅ AGENDAMENTO CONFIRMADO</h3>
        <div class="linha"><b>Militar:</b> <span id="cNome"></span></div>
        <div class="linha"><b>RG:</b> <span id="cRg"></span></div>
        <div class="linha"><b>Local:</b> <span id="cUnidade"></span></div>
        <div class="linha"><b>Data:</b> <span id="cData"></span></div>
        <div class="linha"><b>Turno:</b> <span id="cTurno"></span></div>
        <div class="linha"><b>Protocolo:</b> <span id="cProto" style="font-family:monospace;"></span></div>
        <br>
        <button onclick="window.print()">🖨️ Imprimir</button>
        <button onclick="location.reload()" style="background:#4b5563;">Novo Agendamento</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, setDoc, serverTimestamp, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const REGRAS = {
        "CER2GMAR": { inicio: "2026-02-23", fim: "2026-07-31", dias: [1,2,3,4,5], vagas: 5, temTurno: false },
        "3GMAR":    { inicio: "2026-02-23", fim: "2026-07-31", dias: [1,2,3,4,5], vagas: 5, temTurno: false },
        "DBM5M":    { inicio: "2026-02-23", fim: "2026-03-05", dias: [2,5], vagas: 10, temTurno: true },
        "CBAX":     { inicio: "2026-03-10", fim: "2026-03-13", dias: [2,5], vagas: 10, temTurno: true },
        "GRUPO1":   { inicio: "2026-03-17", fim: "2026-05-15", dias: [2,5], vagas: 7,  temTurno: true },
        "GRUPO2":   { inicio: "2026-05-19", fim: "2026-06-26", dias: [2,5], vagas: 7,  temTurno: true },
        "RECREIO":  { inicio: "2026-06-30", fim: "2026-07-31", dias: [2,5], vagas: 7,  temTurno: true }
    };

    const unidadeEl = document.getElementById("unidade");
    const dataSelect = document.getElementById("dataSelect");
    const turnoEl = document.getElementById("turno");
    const campoTurno = document.getElementById("campoTurno");
    const vagasInfo = document.getElementById("vagasInfo");

    unidadeEl.addEventListener("change", () => {
        dataSelect.innerHTML = '<option value="">Selecione a Data</option>';
        campoTurno.style.display = "none";
        vagasInfo.style.display = "none";
        const regra = REGRAS[unidadeEl.value];
        if (!regra) return;

        let d = new Date(regra.inicio + "T12:00:00");
        let dFim = new Date(regra.fim + "T12:00:00");
        const hoje = new Date(); hoje.setHours(0,0,0,0);

        while (d <= dFim) {
            if (d >= hoje && regra.dias.includes(d.getDay())) {
                const ymd = d.toISOString().split('T')[0];
                const opt = document.createElement("option");
                opt.value = ymd; opt.textContent = ymd.split('-').reverse().join('/');
                dataSelect.appendChild(opt);
            }
            d.setDate(d.getDate() + 1);
        }
    });

    async function atualizarVagas() {
        const local = unidadeEl.value;
        const data = dataSelect.value;
        const regra = REGRAS[local];
        if (!regra) return;

        campoTurno.style.display = regra.temTurno ? "block" : "none";
        const turno = regra.temTurno ? turnoEl.value : "Geral";
        if (regra.temTurno && !turno) { vagasInfo.style.display = "none"; return; }

        const q = query(collection(db, "agendamentos"), where("unidadeId", "==", local), where("data", "==", data), where("turno", "==", turno));
        const snap = await getDocs(q);
        const ocupadas = snap.size;
        const restam = regra.vagas - ocupadas;

        vagasInfo.style.display = "block";
        vagasInfo.innerHTML = `Vagas disponíveis: ${restam} de ${regra.vagas}`;
        document.getElementById("btnAgendar").disabled = restam <= 0;
        if (restam <= 0) vagasInfo.innerHTML = "❌ Vagas Esgotadas!";
    }

    dataSelect.addEventListener("change", atualizarVagas);
    turnoEl.addEventListener("change", atualizarVagas);

    document.getElementById("formAgendamento").addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnAgendar");
        const rg = document.getElementById("rg").value.replace(/\D/g,"");
        btn.disabled = true; btn.innerText = "REGISTRANDO...";

        const local = unidadeEl.value;
        const data = dataSelect.value;
        const regra = REGRAS[local];
        const turno = regra.temTurno ? turnoEl.value : "Geral";

        try {
            const lockRef = doc(db, "rg_locks_medica", rg);
            await runTransaction(db, async (transaction) => {
                const lockDoc = await transaction.get(lockRef);
                if (lockDoc.exists()) throw "RG já possui agendamento!";

                const novoAgRef = doc(collection(db, "agendamentos"));
                const dados = {
                    nome: document.getElementById("nome").value.toUpperCase(),
                    rg: rg,
                    posto: document.getElementById("posto").value,
                    unidadeId: local,
                    unidadeNome: unidadeEl.options[unidadeEl.selectedIndex].text,
                    data: data,
                    turno: turno,
                    criadoEm: serverTimestamp()
                };

                transaction.set(novoAgRef, dados);
                transaction.set(lockRef, { rg: rg });

                // Enviar para Planilha (Ajuste o link se necessário)
                fetch("https://script.google.com/macros/s/AKfycbxIJt65s66K11eVJlBJQeg_6oJd02Zs3yu7gJ-Pdh3Q6lYGgM9e9vR8r-fFfggdQ95DHw/exec", {
                    method: "POST", mode: "no-cors",
                    body: JSON.stringify({ rg: dados.rg, tipo: "medica", data: data, local: dados.unidadeNome })
                });

                document.getElementById("cNome").innerText = dados.nome;
                document.getElementById("cRg").innerText = dados.rg;
                document.getElementById("cUnidade").innerText = dados.unidadeNome;
                document.getElementById("cData").innerText = data.split('-').reverse().join('/');
                document.getElementById("cTurno").innerText = turno;
                document.getElementById("cProto").innerText = `IM-${rg}-${data.replace(/-/g,"")}`;
            });

            document.getElementById("formAgendamento").style.display = "none";
            document.getElementById("comprovanteBox").style.display = "block";
        } catch (err) {
            alert(err); btn.disabled = false; btn.innerText = "Confirmar Agendamento";
        }
    });
</script>
</body>
</html>
