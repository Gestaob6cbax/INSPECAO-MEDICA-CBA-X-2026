<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Odontológico 2026 - CBA X</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --cba-blue: #0a2c6d; --cba-red: #b71c1c; --odonto-cyan: #00838f; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 15px; display: flex; justify-content: center; }
        .card { width: 100%; max-width: 480px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 12px solid var(--odonto-cyan); }
        header { text-align: center; margin-bottom: 20px; }
        header img { width: 80px; }
        .section { background: #e0f2f1; color: var(--odonto-cyan); padding: 8px; font-size: 0.8rem; font-weight: bold; border-radius: 5px; margin: 20px 0 10px; text-align: center; text-transform: uppercase; }
        label { display: block; margin-top: 12px; font-weight: bold; font-size: 0.85rem; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #dfe4ea; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .vagas-badget { margin-top: 15px; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; display: none; }
        .vagas-ok { background: #e8f5e9; color: #2e7d32; }
        .vagas-zero { background: #ffebee; color: #c62828; }
        .btn-enviar { background: var(--odonto-cyan); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 25px; text-transform: uppercase; }
        .btn-enviar:disabled { background: #ccc; }
        #comprovante { display: none; text-align: center; padding: 20px; border: 3px dashed var(--odonto-cyan); border-radius: 15px; }
    </style>
</head>
<body>

<div class="card">
    <header>
        <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" alt="CBA X">
        <h2 style="color: var(--cba-blue); margin: 10px 0;">Agendamento Odontológico</h2>
        <p style="font-size: 0.85rem; font-weight: bold; color: #555;">CBA X - DEPARTAMENTO ODONTOLÓGICO</p>
    </header>

    <div id="form-odonto">
        <div class="section">Identificação</div>
        <label>Posto/Graduação</label>
        <select id="posto">
            <option value="">Selecione...</option>
            <option>SD BM</option><option>CB BM</option><option>3º SGT BM</option><option>2º SGT BM</option><option>1º SGT BM</option><option>SUBTEN BM</option><option>OFICIAL</option>
        </select>
        <input type="text" id="nome" placeholder="NOME COMPLETO" style="margin-top:10px;" oninput="this.value = this.value.toUpperCase()">
        <input type="number" id="rg" placeholder="RG MILITAR" style="margin-top:10px;">

        <div class="section">Agendamento</div>
        <label>Local</label>
        <select id="unidade" onchange="gerarDatas()">
            <option value="">Selecione...</option>
            <option value="CBA X">CBA X</option>
        </select>
        <label>Data</label>
        <select id="data" onchange="checarVagas()"><option value="">Selecione o local...</option></select>
        <label>Turno</label>
        <select id="turno" onchange="checarVagas()">
            <option value="Manhã">Manhã (14 vagas)</option>
            <option value="Tarde">Tarde (07 vagas)</option>
        </select>

        <div id="statusVagas" class="vagas-badget"></div>
        <button id="btnSalvar" class="btn-enviar" onclick="salvar()">Confirmar Odonto</button>
    </div>

    <div id="comprovante">
        <h3 style="color: #00796b;">✅ AGENDAMENTO ODONTO OK!</h3>
        <p id="res-militar" style="font-weight: bold;"></p>
        <p id="res-data"></p>
        <button class="btn-enviar" onclick="window.print()">Imprimir PDF</button>
        <button onclick="location.reload()" style="background:none; border:none; color:blue; cursor:pointer; margin-top:10px;">Voltar</button>
    </div>
</div>

<script>
    const firebaseConfig = { /* USE O MESMO CONFIG DO MÉDICO */
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function gerarDatas() {
        const sel = document.getElementById("data");
        sel.innerHTML = '<option value="">Selecione...</option>';
        let dataInicio = new Date("2026-03-10T12:00:00");
        for(let i=0; i<30; i++) {
            if(dataInicio.getDay() !== 0 && dataInicio.getDay() !== 6) {
                let dStr = dataInicio.toLocaleDateString('pt-BR');
                let opt = document.createElement("option");
                opt.value = dStr; opt.innerText = dStr;
                sel.appendChild(opt);
            }
            dataInicio.setDate(dataInicio.getDate() + 1);
        }
    }

    async function checarVagas() {
        const dt = document.getElementById("data").value;
        const tr = document.getElementById("turno").value;
        const status = document.getElementById("statusVagas");
        if(!dt) return;

        status.style.display = "block";
        status.innerText = "Consultando...";
        
        const limite = (tr === "Manhã") ? 14 : 7;
        const snap = await db.collection("agendamentos_odonto").where("data", "==", dt).where("turno", "==", tr).get();
        const ocupadas = snap.size;
        const sobra = limite - ocupadas;

        if(sobra <= 0) {
            status.innerText = "❌ ESGOTADO"; status.className = "vagas-badget vagas-zero";
            document.getElementById("btnSalvar").disabled = true;
        } else {
            status.innerText = `✅ DISPONÍVEL: ${sobra} VAGAS`; status.className = "vagas-badget vagas-ok";
            document.getElementById("btnSalvar").disabled = false;
        }
    }

    async function salvar() {
        const dados = {
            posto: document.getElementById("posto").value,
            nome: document.getElementById("nome").value.toUpperCase(),
            rg: document.getElementById("rg").value,
            unidade: document.getElementById("unidade").value,
            data: document.getElementById("data").value,
            turno: document.getElementById("turno").value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };
        await db.collection("agendamentos_odonto").add(dados);
        document.getElementById("form-odonto").style.display = "none";
        document.getElementById("comprovante").style.display = "block";
        document.getElementById("res-militar").innerText = dados.posto + " " + dados.nome;
        document.getElementById("res-data").innerText = `${dados.data} - ${dados.turno}`;
    }
</script>
</body>
</html>
