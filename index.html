<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspeção Médica 2026 - CBA X</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root { --cba-red: #b71c1c; --cba-blue: #0a2c6d; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .premium-card { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 10px solid var(--cba-red); box-sizing: border-box; }
        header { text-align: center; margin-bottom: 15px; }
        header img { width: 80px; }
        .section-title { background: var(--cba-red); color: white; padding: 8px; font-size: 0.8rem; font-weight: bold; border-radius: 5px; margin: 20px 0 10px; text-transform: uppercase; text-align: center; }
        label { display: block; margin-top: 12px; font-weight: bold; color: #333; font-size: 0.85rem; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #dfe4ea; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .vagas-badge { margin-top: 10px; padding: 12px; border-radius: 10px; text-align: center; font-weight: bold; display: none; font-size: 0.9rem; }
        .vagas-ok { background: #e8f5e9; color: #1b5e20; border: 1px solid #c8e6c9; }
        .vagas-esgotado { background: #ffebee; color: #b71c1c; border: 1px solid #ffcdd2; }
        .btn-confirmar { background: linear-gradient(135deg, var(--cba-red) 0%, #8e1616 100%); color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 25px; text-transform: uppercase; font-size: 1rem; }
        
        /* PAINEL DE SUCESSO PADRONIZADO */
        #painel-sucesso { display: none; text-align: center; }
        .confirmacao-caixa { background: #f8f9fa; border: 1px solid #ddd; border-radius: 12px; padding: 20px; margin-top: 20px; text-align: left; }
        .item-resumo { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .item-resumo:last-child { border-bottom: none; }
        .label-resumo { font-weight: bold; color: var(--cba-blue); text-transform: uppercase; }
    </style>
</head>
<body>

<div class="premium-card">
    <header>
        <img src="https://raw.githubusercontent.com/gestaob6cbax/INSPECAO-MEDICA-CBA-X-2026/main/logo_cba_x.png" alt="CBA X">
        <h2 style="color: var(--cba-blue); margin: 10px 0;">Inspeção Médica 2026</h2>
        <p style="font-size: 0.85rem; font-weight: bold; color: #555;">CBA X - INSPEÇÃO DE SAÚDE</p>
    </header>

    <div id="form-content">
        <div class="section-title">Dados do Militar</div>
        
        <label>Unidade onde serve</label>
        <select id="unidadeOrigem">
            <option value="">Selecione sua unidade...</option>
            <option>CBA X</option><option>1º GMAR</option><option>2º GMAR</option>
            <option>3º GMAR</option><option>4º GMAR</option><option>DBM 1/M</option>
            <option>DBM 2/M</option><option>DBM 3/M</option><option>DBM 4/M</option>
            <option>DBM 5/M</option><option>DBM 6/M</option>
        </select>

        <label>Posto / Graduação</label>
        <select id="posto">
            <option value="">Selecione...</option>
            <option>SD BM</option><option>CB BM</option><option>3º SGT BM</option><option>2º SGT BM</option><option>1º SGT BM</option><option>SUBTEN BM</option>
            <option>2º TEN BM</option><option>1º TEN BM</option><option>CAP BM</option><option>MAJ BM</option><option>TEN CEL BM</option><option>CEL BM</option>
        </select>
        
        <input type="text" id="nome" placeholder="NOME COMPLETO" oninput="this.value = this.value.toUpperCase()">
        <input type="number" id="rg" placeholder="RG MILITAR">
        <input type="email" id="email" placeholder="E-MAIL">
        <input type="tel" id="telefone" placeholder="TELEFONE / WHATSAPP">

        <div class="section-title">Local e Data da Inspeção</div>
        
        <label>Local da Inspeção (Onde você irá realizar)</label>
        <select id="unidadeDestino" onchange="gerarDatas()">
            <option value="">Selecione o local...</option>
            <option value="CBA X">CBA X</option>
            <option value="1º GMAR">1º GMAR</option>
            <option value="4º GMAR">4º GMAR</option>
            <option value="DBM 4/M">DBM 4/M</option>
        </select>

        <label>Data Disponível</label>
        <select id="data" onchange="verificarVagas()">
            <option value="">Selecione o local primeiro...</option>
        </select>

        <div id="divTurno" style="display:none;">
            <label>Turno</label>
            <select id="turno" onchange="verificarVagas()">
                <option value="Manhã">Manhã (08:00 às 12:00)</option>
                <option value="Tarde">Tarde (13:00 às 17:00)</option>
            </select>
        </div>

        <div id="statusVagas" class="vagas-badge"></div>
        <button id="btnSalvar" class="btn-confirmar" onclick="salvar()">Confirmar Agendamento</button>
    </div>

    <div id="painel-sucesso">
        <div style="font-size: 50px;">✅</div>
        <h2 style="color: var(--cba-blue);">AGENDAMENTO REALIZADO</h2>
        
        <div class="confirmacao-caixa">
            <div class="item-resumo"><span class="label-resumo">Nome:</span> <span id="res-nome"></span></div>
            <div class="item-resumo"><span class="label-resumo">RG:</span> <span id="res-rg"></span></div>
            <div class="item-resumo"><span class="label-resumo">Data:</span> <span id="res-data"></span></div>
            <div class="item-resumo"><span class="label-resumo">Local:</span> <span id="res-local"></span></div>
        </div>
        
        <button class="btn-confirmar" onclick="location.reload()">Novo Agendamento</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
        authDomain: "inspecao-saude-cbax.firebaseapp.com",
        projectId: "inspecao-saude-cbax",
        storageBucket: "inspecao-saude-cbax.firebasestorage.app",
        messagingSenderId: "1011281662526",
        appId: "1:1011281662526:web:1028e8a8d140684e98376f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const REGRAS = {
        "CBA X":    { inicio: "2026-03-10", fim: "2026-03-13", dias: [2,5], vagas: 10, turno: true },
        "1º GMAR":  { inicio: "2026-03-17", fim: "2026-05-15", dias: [2,5], vagas: 7,  turno: true },
        "4º GMAR":  { inicio: "2026-05-19", fim: "2026-06-26", dias: [2,5], vagas: 7,  turno: true },
        "DBM 4/M":  { inicio: "2026-06-30", fim: "2026-07-31", dias: [2,5], vagas: 7,  turno: true }
    };

    function gerarDatas() {
        const uni = document.getElementById("unidadeDestino").value;
        const selData = document.getElementById("data");
        const divT = document.getElementById("divTurno");
        selData.innerHTML = '<option value="">Selecione...</option>';
        if (!uni) return;
        const r = REGRAS[uni];
        divT.style.display = r.turno ? "block" : "none";
        let atual = new Date(r.inicio + "T12:00:00");
        let fim = new Date(r.fim + "T12:00:00");
        while (atual <= fim) {
            if (r.dias.includes(atual.getDay())) {
                let dStr = atual.toLocaleDateString('pt-BR');
                let opt = document.createElement("option");
                opt.value = dStr; opt.innerText = dStr;
                selData.appendChild(opt);
            }
            atual.setDate(atual.getDate() + 1);
        }
    }

    async function verificarVagas() {
        const uni = document.getElementById("unidadeDestino").value;
        const dt = document.getElementById("data").value;
        const turno = document.getElementById("turno").value;
        const badge = document.getElementById("statusVagas");
        if (!uni || !dt) return;
        badge.style.display = "block";
        badge.innerText = "Consultando...";
        const snap = await db.collection("agendamentos_saude").where("unidadeID", "==", uni).where("data", "==", dt).where("turno", "==", turno).get();
        const restam = REGRAS[uni].vagas - snap.size;
        badge.innerText = restam > 0 ? `✅ RESTAM ${restam} VAGAS` : "❌ ESGOTADO";
        badge.className = restam > 0 ? "vagas-badge vagas-ok" : "vagas-badge vagas-esgotado";
    }

    async function salvar() {
        const btn = document.getElementById("btnSalvar");
        const d = {
            unidadeOrigem: document.getElementById("unidadeOrigem").value,
            posto: document.getElementById("posto").value,
            nome: document.getElementById("nome").value.toUpperCase(),
            rg: document.getElementById("rg").value,
            email: document.getElementById("email").value,
            unidadeID: document.getElementById("unidadeDestino").value,
            data: document.getElementById("data").value,
            turno: document.getElementById("turno").value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!d.unidadeOrigem || !d.nome || !d.rg || !d.data) { alert("Preencha tudo!"); return; }
        btn.innerText = "SALVANDO..."; btn.disabled = true;

        try {
            await db.collection("agendamentos_saude").add(d);
            document.getElementById("res-nome").innerText = d.nome;
            document.getElementById("res-rg").innerText = d.rg;
            document.getElementById("res-data").innerText = d.data;
            document.getElementById("res-local").innerText = d.unidadeID;
            document.getElementById("form-content").style.display = "none";
            document.getElementById("painel-sucesso").style.display = "block";
        } catch (e) { alert("Erro!"); btn.disabled = false; }
    }
</script>
</body>
</html>
