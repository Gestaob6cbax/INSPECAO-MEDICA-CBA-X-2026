<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSPEÇÃO DE SAÚDE 2026 - CBA X</title>

<style>
:root{
--primary:#8b0000;
--secondary:#ff0000;
--bg:#f2f2f2;
}

body{
font-family:'Segoe UI',sans-serif;
background:var(--bg);
margin:0;
padding:0;
}

.header-top{
background:linear-gradient(180deg,#9b0000 0%,#720000 100%);
color:white;
padding:30px 15px;
text-align:center;
border-bottom:5px solid #ff0000;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.header-top img{
max-width:100px;
height:auto;
margin-bottom:15px;
filter:drop-shadow(0px 4px 8px rgba(0,0,0,0.4));
}

.header-top h2{
margin:0;
font-size:20px;
text-transform:uppercase;
letter-spacing:1px;
}

.container{
max-width:450px;
margin:-20px auto 50px;
background:#fff;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
font-size:11px;
color:#444;
text-transform:uppercase;
}

input,select{
width:100%;
padding:14px;
margin-bottom:20px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
background:#fafafa;
font-size:15px;
}

.btn-main{
background:var(--primary);
color:#fff;
border:none;
padding:18px;
width:100%;
border-radius:8px;
font-weight:bold;
cursor:pointer;
text-transform:uppercase;
font-size:16px;
}

#vagasInfo{
padding:12px;
border-radius:8px;
text-align:center;
font-weight:bold;
margin-bottom:20px;
display:none;
font-size:14px;
}

.vagas-disponiveis{
background:#eaffea;
color:#28a745;
border:1px solid #28a745;
}

.vagas-esgotadas{
background:#ffeaea;
color:#8b0000;
border:1px solid #8b0000;
}

#comprovanteBox{
display:none;
text-align:center;
border:2px solid #eee;
padding:20px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="header-top">
<img src="logo_cba_x.png" alt="Logo CBA X">
<h2>INSPEÇÃO DE SAÚDE 2026</h2>
<p>COMANDO DE BOMBEIROS DE ÁREA - CBA X</p>
</div>

<div class="container">

<form id="formAgendamento">

<label>Nome Completo</label>
<input type="text" id="nome" required>

<label>RG Militar</label>
<input type="text" id="rg" required>

<label>Celular</label>
<input type="tel" id="telefone" required>

<label>E-mail</label>
<input type="email" id="email" required>

<label>Local da Inspeção</label>
<select id="unidade" required>
<option value="">SELECIONE...</option>
<option value="CER + 2º GMAR">CER + 2º GMAR</option>
<option value="3º GMAR">3º GMAR</option>
<option value="DBM 5/M">DBM 5/M</option>
<option value="CBA X">CBA X</option>
<option value="1º GMAR">1º GMAR</option>
<option value="4º GMAR">4º GMAR</option>
<option value="DBM 4/M">DBM 4/M</option>
</select>

<label>Data</label>
<select id="dataSelect">
<option>Selecione o local primeiro</option>
</select>

<div id="campoTurno" style="display:none;">
<label>Turno</label>
<select id="turno">
<option value="">Escolha</option>
<option value="Manhã">Manhã</option>
<option value="Tarde">Tarde</option>
</select>
</div>

<div id="vagasInfo"></div>

<button class="btn-main" id="btnAgendar">Finalizar Agendamento</button>

</form>

<div id="comprovanteBox">
<h3>AGENDAMENTO CONFIRMADO</h3>
<div id="resumo"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
authDomain: "inspecao-saude-cbax.firebaseapp.com",
projectId: "inspecao-saude-cbax",
storageBucket: "inspecao-saude-cbax.firebasestorage.app",
messagingSenderId: "1011281662526",
appId: "1:1011281662526:web:1028e8a8d140684e98376f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const unidade = document.getElementById("unidade");
const dataSelect = document.getElementById("dataSelect");
const vagasInfo = document.getElementById("vagasInfo");

unidade.onchange = async () => {

dataSelect.innerHTML = "<option>Carregando...</option>";

const q = query(collection(db,"agendamentos_inspecao"), where("localInspecao","==",unidade.value));

const snap = await getDocs(q);

const total = snap.size;

vagasInfo.style.display="block";
vagasInfo.innerHTML="Agendamentos existentes: "+total;

}

</script>

</body>
</html>
