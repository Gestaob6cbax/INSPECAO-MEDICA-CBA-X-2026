<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INSPEÇÃO DE SAÚDE – CBA X</title>

  <style>.logo {
  max-width: 180px;
  width: 100%;
  margin-bottom: 15px;
}
    
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f4f8;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 600px;
      margin: 30px auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="logo-cbax.png" alt="Logo CBA X" class="logo">
    <h1>INSPEÇÃO DE SAÚDE – CBA X</h1>
    <p>Sistema de Agendamento de Inspeção de Saúde</p>
    <form class="form-agendamento">

  <input type="text" placeholder="Nome completo" required>

  <input type="text" placeholder="RG" required>

  <input type="text" placeholder="Posto / Graduação" required>

  <select required>
    <option value="">Selecione a Unidade</option>
    <option>1º GMar - Botafogo</option>
    <option>2º GMar - Barra da Tijuca</option>
    <option>3º GMar - Copacabana</option>
    <option>4º GMar - Itaipu</option>
    <option>CBA X</option>
    <option>CER</option>
    <option>DBM 1/M - Paquetá</option>
    <option>DBM 2/M - Piscinão de Ramos</option>
    <option>DBM 3/M - Recreio</option>
    <option>DBM 4/M - Barra de Guaratiba</option>
    <option>DBM 5/M - Sepetiba</option>
    <option>DBM 6/M - Itaipu</option>
  </select>

  <input type="date" required>

  <select required>
    <option value="">Selecione o Turno</option>
    <option>Manhã</option>
    <option>Tarde</option>
  </select>

  <button type="submit">Agendar</button>
</form>
    
  </div>

</body>
</html>
