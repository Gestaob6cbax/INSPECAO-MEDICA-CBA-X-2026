<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSPEÇÃO DE SAÚDE – CBA X</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f2f4f8;
  margin:0;
  padding:0;
}

.container {
  max-width:600px;
  margin:30px auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

.logo {
  max-width:180px;
  margin-bottom:15px;
}

input, select, button {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
  box-sizing:border-box;
}

button {
  background:#0b3c5d;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover {
  background:#092f49;
}

#campoTurno { display:none; }

.msg {
  display:none;
  margin-top:10px;
  padding:10px;
  border-radius:8px;
  font-weight:bold;
}

.ok {
  background:#eef9f0;
  color:#1f5b2b;
}

.err {
  background:#fff2f2;
  color:#8a1f1f;
}
</style>
</head>

<body>
<div class="container">
  <img src="logo-cbax.png" class="logo">

  <h2>INSPEÇÃO DE SAÚDE – CBA X</h2>
  <p>Sistema de Agendamento</p>

  <form id="formAgendamento">

    <input type="text" id="nome" placeholder="Nome completo" required>
    <input type="text" id="rg" placeholder="RG" required>
    <input type="email" id="email" placeholder="E-mail" required>

    <select id="posto" required>
      <option value="">Selecione o Posto / Graduação</option>
      <option>SDBM</option>
      <option>CB BM</option>
      <option>3º SGT BM</option>
      <option>2º SGT BM</option>
      <option>1º SGT BM</option>
      <option>SUBTEN BM</option>
      <option>2º TEN BM</option>
      <option>1º TEN BM</option>
      <option>CAP BM</option>
      <option>MAJ BM</option>
      <option>TEN CEL BM</option>
      <option>CEL BM</option>
    </select>

    <select id="unidade" required>
      <option value="">Selecione a Unidade</option>
      <option>1º GMar - Botafogo</option>
      <option>DBM 1/M - Paquetá</option>
      <option>DBM 2/M - Piscinão de Ramos</option>
      <option>2º GMar - Barra da Tijuca</option>
      <option>CER</option>
      <option>3º GMar - Copacabana</option>
      <option>4º GMar - Itaipu</option>
      <option>DBM 6/M - Itaipu</option>
      <option>CBA X</option>
      <option>DBM 3/M - Recreio</option>
      <option>DBM 4/M - Barra de Guaratiba</option>
      <option>DBM 5/M - Sepetiba</option>
    </select>

    <select id="dataSelect" required>
      <option value="">Selecione a Data</option>
    </select>

    <div id="campoTurno">
      <select id="turno">
        <option value="">Selecione o Turno</option>
        <option>Manhã</option>
        <option>Tarde</option>
      </select>
    </div>

    <button type="submit">Agendar</button>

    <div id="msgOk" class="msg ok">✅ Agendamento realizado com sucesso.</div>
    <div id="msgErro" class="msg err">❌ Erro ao agendar.</div>

  </form>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore, collection, addDoc, doc, getDoc,
  runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
  authDomain: "inspecao-saude-cbax.firebaseapp.com",
  projectId: "inspecao-saude-cbax",
  storageBucket: "inspecao-saude-cbax.firebasestorage.app",
  messagingSenderId: "1011281662526",
  appId: "1:1011281662526:web:1028e8a8d140684e98376f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form = document.getElementById("formAgendamento");
const msgOk = document.getElementById("msgOk");
const msgErro = document.getElementById("msgErro");

function gerarDatas() {
  const select = document.getElementById("dataSelect");
  const inicio = new Date("2026-02-23");
  const fim = new Date("2026-07-31");

  while (inicio <= fim) {
    const dia = inicio.getDay();
    if (dia !== 0 && dia !== 6) {
      const ymd = inicio.toISOString().split("T")[0];
      const option = document.createElement("option");
      option.value = ymd;
      option.textContent = inicio.toLocaleDateString("pt-BR");
      select.appendChild(option);
    }
    inicio.setDate(inicio.getDate() + 1);
  }
}
gerarDatas();

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  msgOk.style.display="none";
  msgErro.style.display="none";

  const nome = nome.value;
  const rg = rg.value;
  const email = email.value;
  const posto = posto.value;
  const unidade = unidade.value;
  const data = dataSelect.value;
  const turno = turno.value;

  try {
    await addDoc(collection(db,"agendamentos"),{
      nome, rg, email, posto, unidade,
      data,
      turno,
      data_br: new Date(data).toLocaleDateString("pt-BR")
    });

    msgOk.style.display="block";
    form.reset();
  } catch(err){
    console.error(err);
    msgErro.style.display="block";
  }
});
</script>

emailjs.init("GySnRXpCdioddGW-7");
</script>

</body>
</html>
