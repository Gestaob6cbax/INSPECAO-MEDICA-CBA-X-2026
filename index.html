<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INSPEÇÃO DE SAÚDE – CBA X</title>

<style>
body{font-family:Arial;background:#f2f4f8;margin:0;padding:0}
.container{max-width:700px;margin:30px auto;background:#fff;padding:20px;border-radius:12px;text-align:center}
.logo{max-width:180px;margin-bottom:10px}
input,select,button{
width:100%;padding:10px;margin-bottom:10px;border-radius:10px;
border:1px solid #ccc;font-size:14px;box-sizing:border-box}
button{background:#0b3c5d;color:#fff;border:none;font-weight:bold;cursor:pointer}
button:hover{background:#092f49}
button:disabled{opacity:0.6}
#campoTurno{display:none}
.msg{display:none;margin-top:10px;padding:10px;border-radius:10px;font-weight:bold}
.ok{background:#eef9f0;border:1px solid #cfe9d3;color:#1f5b2b}
.err{background:#fff2f2;border:1px solid #f2c2c2;color:#8a1f1f}
#contador{display:none;background:#eef4ff;border:1px solid #cfe0ff;padding:10px;border-radius:10px;font-size:13px;text-align:left}
#comprovante{display:none;margin-top:15px;background:#eef9f0;border:1px solid #cfe9d3;padding:15px;border-radius:12px;text-align:left}
.small{font-size:12px;color:#666;margin-top:10px}
</style>
</head>

<body>
<div class="container">

<img src="logo-cbax.png" class="logo">
<h2>INSPEÇÃO DE SAÚDE – CBA X</h2>
<p>Sistema de Agendamento</p>

<form id="formAgendamento">

<input type="text" id="nome" placeholder="Nome completo" required>
<input type="text" id="rg" placeholder="RG" required>
<input type="email" id="email" placeholder="E-mail" required>

<select id="posto" required>
<option value="">Posto / Graduação</option>
<option>SD BM</option>
<option>CB BM</option>
<option>3º SGT BM</option>
<option>2º SGT BM</option>
<option>1º SGT BM</option>
<option>SUBTEN BM</option>
<option>2º TEN BM</option>
<option>1º TEN BM</option>
<option>CAP BM</option>
<option>MAJ BM</option>
<option>TEN CEL BM</option>
<option>CEL BM</option>
</select>

<select id="unidade" required>
<option value="">Selecione a Unidade</option>
<option>DBM 5/M - Sepetiba</option>
</select>

<select id="dataSelect" required>
<option value="">Selecione a Data</option>
</select>

<div id="contador"></div>

<div id="campoTurno">
<select id="turno">
<option value="">Selecione o Turno</option>
<option>Manhã</option>
<option>Tarde</option>
</select>
</div>

<button type="submit" id="btnAgendar">Agendar</button>

<div id="msgOk" class="msg ok">✅ Agendamento realizado.</div>
<div id="msgErr" class="msg err">❌ Não foi possível agendar.</div>

</form>

<div id="comprovante">
<b>✅ COMPROVANTE DE AGENDAMENTO</b><br><br>
<b>Nome:</b> <span id="cNome"></span><br>
<b>RG:</b> <span id="cRG"></span><br>
<b>Unidade:</b> <span id="cUnidade"></span><br>
<b>Data:</b> <span id="cData"></span><br>
<b>Turno:</b> <span id="cTurno"></span><br><br>
<button onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
</div>

<div class="small">
Área administrativa: admin.html
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, doc, getDoc, getDocs, query, where, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBkq2D8JFuxzPTI2z_Iirg3rYfSFfPJRXY",
authDomain: "inspecao-saude-cbax.firebaseapp.com",
projectId: "inspecao-saude-cbax",
storageBucket: "inspecao-saude-cbax.firebasestorage.app",
messagingSenderId: "1011281662526",
appId: "1:1011281662526:web:1028e8a8d140684e98376f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const inicio = new Date("2026-02-24T00:00:00Z");
const fim = new Date("2026-03-06T00:00:00Z");

function ymd(d){return d.toISOString().slice(0,10)}
function formatBR(d){return new Date(d+"T00:00:00Z").toLocaleDateString("pt-BR")}

const dataSelect = document.getElementById("dataSelect");
const contador = document.getElementById("contador");
const campoTurno = document.getElementById("campoTurno");
const turnoEl = document.getElementById("turno");
const msgOk = document.getElementById("msgOk");
const msgErr = document.getElementById("msgErr");

function preencherDatas(){
dataSelect.innerHTML='<option value="">Selecione a Data</option>';
for(let d=new Date(inicio);d<=fim;d.setUTCDate(d.getUTCDate()+1)){
const day=d.getUTCDay();
if(day===2||day===5){
const opt=document.createElement("option");
opt.value=ymd(d);
opt.textContent=formatBR(ymd(d));
dataSelect.appendChild(opt);
}}
campoTurno.style.display="block";
turnoEl.required=true;
}
preencherDatas();

document.getElementById("formAgendamento").addEventListener("submit",async(e)=>{
e.preventDefault();
msgOk.style.display="none";
msgErr.style.display="none";

const nome=document.getElementById("nome").value.trim();
const rg=document.getElementById("rg").value.trim();
const email=document.getElementById("email").value.trim();
const posto=document.getElementById("posto").value;
const unidade=document.getElementById("unidade").value;
const data=dataSelect.value;
const turno=turnoEl.value;

if(!data||!turno){
msgErr.textContent="❌ Selecione data e turno.";
msgErr.style.display="block";
return;
}

// 🔴 BLOQUEIA RG DUPLICADO
const q = query(collection(db,"agendamentos"),where("rg","==",rg));
const snap = await getDocs(q);
if(!snap.empty){
msgErr.textContent="❌ Este RG já possui agendamento.";
msgErr.style.display="block";
return;
}

try{
await runTransaction(db,async(tx)=>{
const counterRef=doc(db,"counters","SEP_"+data);
const snap=await tx.get(counterRef);
const dados=snap.exists()?snap.data():{manha:0,tarde:0};

if(turno==="Manhã"){
if(dados.manha>=10) throw "LOTADO";
dados.manha++;
}else{
if(dados.tarde>=10) throw "LOTADO";
dados.tarde++;
}

tx.set(counterRef,dados);
tx.set(doc(collection(db,"agendamentos")),{
nome,rg,email,posto,unidade,data,data_br:formatBR(data),turno
});
});

msgOk.style.display="block";

document.getElementById("cNome").textContent=nome;
document.getElementById("cRG").textContent=rg;
document.getElementById("cUnidade").textContent=unidade;
document.getElementById("cData").textContent=formatBR(data);
document.getElementById("cTurno").textContent=turno;
document.getElementById("comprovante").style.display="block";

e.target.reset();

}catch(err){
msgErr.textContent="❌ Vagas esgotadas.";
msgErr.style.display="block";
}

});

</script>
</body>
</html>
